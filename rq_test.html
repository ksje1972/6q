<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RQテスト（回復力指数テスト）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
  --text:#1a1a18;--text2:#6b6b66;--text3:#9a9a94;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --accent:#9F1239;--accent-bg:#FFE4E6;--accent-border:rgba(159,18,57,0.3);
  --success:#2d7a3a;--success-bg:#eef6f0;--success-border:rgba(45,122,58,0.3);
  --info-bg:#eef3fb;--info-border:rgba(40,80,160,0.25);--info:#1a4fa0;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252522;--bg3:#2e2e2b;
  --text:#f0f0ec;--text2:#a0a09a;--text3:#686862;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --accent:#FDA4AF;--accent-bg:rgba(159,18,57,0.15);--accent-border:rgba(253,164,175,0.4);
  --success:#4caf60;--success-bg:rgba(76,175,96,0.12);--success-border:rgba(76,175,96,0.35);
  --info-bg:rgba(60,100,200,0.12);--info-border:rgba(100,150,255,0.3);--info:#7aaaff;
}}
body{background:var(--bg3);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  padding:24px 16px 60px}
#app{width:100%;max-width:560px}
.screen{animation:fi .28s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* カード */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:12px}
.card-sm{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px}

/* イントロ ヘッダー */
.intro-header{display:flex;align-items:center;gap:14px;padding-bottom:18px;
  border-bottom:0.5px solid var(--border);margin-bottom:20px}
.intro-logo{width:52px;height:52px;border-radius:50%;background:var(--accent-bg);
  border:0.5px solid var(--accent-border);display:flex;align-items:center;
  justify-content:center;font-size:26px;flex-shrink:0}
.intro-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:3px}
.intro-sub{font-size:11px;color:var(--accent);font-weight:500;letter-spacing:.4px}

/* メタグリッド */
.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.meta-box{background:var(--bg2);border-radius:var(--radius);padding:12px 8px;text-align:center}
.meta-n{font-size:18px;font-weight:700;color:var(--accent)}.meta-l{font-size:10px;color:var(--text3);margin-top:2px}

/* カテゴリピル */
.cats-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.cat-pill{font-size:11px;padding:3px 10px;border-radius:100px;
  background:var(--accent-bg);color:var(--accent);border:0.5px solid var(--accent-border)}

/* 注意書き */
.notice-box{background:var(--accent-bg);border:0.5px solid var(--accent-border);
  border-radius:var(--radius);padding:12px 14px;font-size:12px;color:var(--accent);
  margin-bottom:18px;line-height:1.75}

/* 名前入力 */
.name-section{margin-bottom:16px}
.name-row-input{display:flex;align-items:center;gap:10px;padding:11px 14px;
  border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2)}
.name-row-input:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.name-label{font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0}
.name-input{flex:1;border:none;outline:none;font-size:15px;background:transparent;
  color:var(--text);font-family:inherit}
.name-input::placeholder{color:var(--text3)}
.name-error{font-size:12px;color:#c0392b;margin-top:6px;display:none}

/* ボタン */
.btn-primary{display:block;width:100%;padding:14px;background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius);font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-primary:hover{opacity:.85}.btn-primary:active{transform:scale(.98)}
.btn-ghost{display:block;width:100%;padding:12px;background:var(--bg);color:var(--text);
  border:0.5px solid var(--border2);border-radius:var(--radius);font-size:14px;
  font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-ghost:hover{background:var(--bg2)}.btn-ghost:active{transform:scale(.98)}
.btn-sm{padding:5px 10px;background:var(--bg);color:var(--text2);
  border:0.5px solid var(--border2);border-radius:var(--radius);
  font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-sm:hover{background:var(--bg2)}

/* 履歴 */
.hist-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hist-ttl{font-size:12px;font-weight:500;color:var(--text2)}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 0;
  border-bottom:0.5px solid var(--border);font-size:13px}
.hist-item:last-child{border-bottom:none}
.hist-eq{font-size:18px;font-weight:700;color:var(--accent);min-width:36px}
.hist-meta{flex:1;min-width:0}
.hist-name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-date{font-size:11px;color:var(--text3);margin-top:1px}
.hist-score{font-size:12px;color:var(--text2);text-align:right;white-space:nowrap;flex-shrink:0}
.hist-empty{font-size:13px;color:var(--text3);padding:12px 0;text-align:center}

/* テスト画面 */
.test-hdr{margin-bottom:14px}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.q-label{font-size:13px;color:var(--text2)}
.timer{font-size:12px;font-variant-numeric:tabular-nums;color:var(--text2);
  background:var(--bg2);padding:3px 10px;border-radius:100px;border:0.5px solid var(--border)}
.sub-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.name-badge{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.pbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:2px}
.pfill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}

/* 問題カード */
.q-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:10px}
.cat-badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;
  font-weight:500;margin-bottom:10px;background:var(--accent-bg);
  color:var(--accent);border:0.5px solid var(--accent-border)}
.q-text{font-size:15px;line-height:1.85;white-space:pre-line;color:var(--text)}
.opts{display:grid;gap:7px;margin-bottom:8px}
.opt{text-align:left;padding:12px 14px;background:var(--bg);border:0.5px solid var(--border);
  border-radius:var(--radius);font-size:14px;cursor:pointer;color:var(--text);
  display:flex;align-items:flex-start;gap:11px;font-family:inherit;
  transition:background .12s,border-color .12s;width:100%;line-height:1.6}
.opt:hover:not(.disabled){background:var(--accent-bg);border-color:var(--accent-border)}
.opt.selected{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.opt.disabled{cursor:default;pointer-events:none}
.opt-lbl{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;
  flex-shrink:0;background:var(--bg2);color:var(--text2);margin-top:1px}
.opt.selected .opt-lbl{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.expl{font-size:13px;padding:11px 14px;background:var(--accent-bg);
  border:0.5px solid var(--accent-border);border-radius:var(--radius);
  margin-top:8px;color:var(--accent);line-height:1.7;animation:fi .2s ease}
.next-wrap{margin-top:8px}

/* 結果画面 */
.result-hero{text-align:center;padding:20px 0 16px}
.result-name{font-size:13px;color:var(--text2);margin-bottom:10px}
.eq-ring{width:136px;height:136px;border-radius:50%;border:2.5px solid var(--accent);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 12px;background:var(--bg2)}
.eq-lbl-sm{font-size:10px;color:var(--text2);letter-spacing:.5px;margin-bottom:2px}
.eq-val{font-size:46px;font-weight:700;color:var(--accent);line-height:1}
.result-title{font-size:20px;font-weight:700;margin-bottom:8px}
.result-desc{font-size:13px;color:var(--text2);line-height:1.75;max-width:380px;margin:0 auto}
.save-notice{display:flex;align-items:center;gap:8px;font-size:11px;padding:9px 12px;
  background:var(--info-bg);border:0.5px solid var(--info-border);
  border-radius:var(--radius);color:var(--info);margin-top:12px}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.stat-box{background:var(--bg2);border-radius:var(--radius);padding:12px;text-align:center}
.stat-n{font-size:20px;font-weight:700;color:var(--accent)}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px}
.bkdn-ttl{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;
  letter-spacing:.3px;text-transform:uppercase}
.cat-result{padding:11px 0;border-bottom:0.5px solid var(--border)}
.cat-result:last-child{border-bottom:none}
.cat-result-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.cat-name{font-size:13px;font-weight:500;flex:1}
.cat-pts{font-size:12px;color:var(--accent);font-weight:600;white-space:nowrap}
.cat-bar-wrap{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.cat-bar-fill{height:100%;background:var(--accent);border-radius:3px}
.cat-comment{font-size:12px;color:var(--text3);margin-top:5px;line-height:1.6}
.retry-wrap{display:grid;gap:8px}
.note-sm{font-size:11px;color:var(--text3);text-align:center;line-height:1.7}
</style>
</head>
<body>
<div id="app">
  <div id="s-intro" class="screen"></div>
  <div id="s-test"  class="screen" style="display:none"></div>
  <div id="s-result" class="screen" style="display:none"></div>
</div>
<script>
// ═══════════════════════════════════════════════════════════
//  問題バンク（100問）
//
//  設計方針：
//  ・4択すべてが「普通の人が選びそうな行動」として書く
//  ・EQの落とし穴を仕込む
//    例）「いつもポジティブでいる」→感情抑圧で低スコア
//       「相手のために我慢する」→自己管理ではなく回避
//       「すぐ謝る」→反射的謝罪は自己認識の欠如
//       「共感してあげる」→主語が「あげる」は上から目線
//  ・点数差は微妙にする（5-4-3-2 でなく 5-4-4-3 も多用）
//  ・正解が「地味で当たり前」に見えるものを多く含める
// ═══════════════════════════════════════════════════════════
const BANK=[{"cat": "感情の調整", "text": "今日、重要なクライアントとの会議が\n予想外に厳しい展開になった。\n会議室を出た直後の、今のあなたは？", "opts": ["「次どう対処するか」をすぐ考え始める", "「今自分がどれだけダメージを受けているか」をまず確認する", "信頼できる同僚に電話して話す", "気持ちを切り替えて次の業務に進む"], "scores": [3, 5, 4, 3], "exp": "「自分が今どれだけダメージを受けているか」を確認することが感情調整の第一歩です。すぐ次を考えるのは感情処理の省略で、後で疲弊につながります。"}, {"cat": "感情の調整", "text": "今週ずっと上司の態度が気になっていて、\nイライラが蓄積している。\n今のあなたが取る行動は？", "opts": ["「気にしすぎだ」と自分に言い聞かせる", "「具体的に何が引っかかっているのか」を言語化してみる", "上司と直接話し合いの場を設ける", "週末にリフレッシュして忘れる"], "scores": [2, 5, 4, 3], "exp": "「気にしすぎ」は感情の否定、「忘れる」は回避です。「何が引っかかっているか」を言語化することで、漠然としたイライラが具体的な問題になり対処可能になります。"}, {"cat": "感情の調整", "text": "今朝、プロジェクトチームのメンバーに\n強い口調で指摘してしまった。\n今のあなたの内側は？", "opts": ["「あの言い方は良くなかった」と後悔が続いている", "「なぜあの場面でああなったのか」を振り返っている", "謝罪のメッセージをすぐ送った", "「仕事上のことだから仕方ない」と整理した"], "scores": [3, 5, 4, 3], "exp": "謝罪は関係修復に必要ですが、再発を防ぎません。「なぜああなったか」の振り返りが感情調整を改善する学習になります。後悔だけ続けることは感情の処理ではなく消耗です。"}, {"cat": "感情の調整", "text": "今日は朝から気分が重く、原因がよくわからない。\n今のあなたはどうしている？", "opts": ["「やるべきことがある」と気合いで動く", "「いつもより感情が不安定かも」と認識して無理なスケジュールを調整", "コーヒーを飲んで気分転換する", "原因を探って考え込む"], "scores": [2, 5, 3, 3], "exp": "気合い・気分転換は対処ですが根拠を変えません。「感情が不安定な状態と認識してスケジュールを調整する」という先手の対処が感情調整の予防的な実践です。"}, {"cat": "感情の調整", "text": "大事なプレゼンを10分後に控えている。\n今のあなたの状態は緊張でかなり強張っている。\nどうする？", "opts": ["「大丈夫、うまくいく」と自分に言い聞かせる", "緊張していることを認めた上で、事前に決めた呼吸法を実践する", "「緊張するのは当然だ」と開き直る", "過去の成功したプレゼンを思い出す"], "scores": [3, 5, 3, 4], "exp": "「大丈夫」は根拠なき否定で逆効果になることがあります。「緊張を認めた上で具体的な方法を実践する」という準備済みの対処が感情調整の実践力です。"}, {"cat": "感情の調整", "text": "今日、同僚の何気ない一言がひどく刺さった。\nおそらく悪意はないと思う。\n今のあなたは？", "opts": ["「悪意はないのだからと」自分を納得させる", "「なぜそこまで刺さったのか」を少し考える", "「気にしていない」ように振る舞う", "その同僚との関係が心配になる"], "scores": [3, 5, 2, 3], "exp": "「悪意はない」は事実ですが、なぜ刺さったかとは別の問題です。「なぜそこまで刺さったか」を考えることが自分の感情パターンの理解につながります。"}, {"cat": "感情の調整", "text": "今週は失敗が重なり、自己嫌悪に陥っている。\n今の自分にどんな言葉をかけている？", "opts": ["「もっとしっかりしろ」と自分を叱咤する", "「こんなに失敗が続くのは何かある」と状況を俯瞰する", "「失敗は誰でもある」と自分を慰める", "「次頑張れば挽回できる」と前向きに考える"], "scores": [1, 5, 3, 4], "exp": "「もっとしっかりしろ」は自己批判で回復を遅らせます。「次頑張れば」は感情を飛ばした切替えです。「何かある」と状況を俯瞰することが感情を情報として扱う成熟した調整力です。"}, {"cat": "感情の調整", "text": "今、誰かの感情的な話を聞いていて\n自分も引きずられてしんどくなってきた。\nどうする？", "opts": ["「聴いてあげなきゃ」と続ける", "「今自分が相手の感情を受け取りすぎている」と気づいて、少し境界を作る", "「もう聴けない」と話を切り上げる", "しんどさを感じないように意識を他に向ける"], "scores": [3, 5, 2, 2], "exp": "「聴かなきゃ」で続けると自分が消耗します。「引きずられすぎている」という気づきと「境界を作る」という行動が、共感しながらも自分を守る感情調整の実践です。"}, {"cat": "感情の調整", "text": "今日は感情的に平静を保てていると感じている。\nその理由として最も近いのは？", "opts": ["今日は嫌なことが特になかった", "自分の状態に気づいていて、意識的に調整している", "性格的に感情的にならないタイプ", "よく眠れた"], "scores": [2, 5, 2, 3], "exp": "外部要因（嫌なことがない・よく眠れた）は「平静」の理由としては不安定です。「自分の状態に気づいて意識的に調整している」という主体的な調整が持続的な感情の安定につながります。"}, {"cat": "感情の調整", "text": "今、締め切りのプレッシャーで焦りが強くなっている。\n今のあなたがまず取る行動は？", "opts": ["「焦っている場合ではない」と集中して作業を進める", "焦りを感じながらも、今できる最優先の一つに絞る", "誰かに「大丈夫?」と声をかけてもらう", "「どうにかなる」と言い聞かせて続ける"], "scores": [3, 5, 3, 2], "exp": "「焦っている場合ではない」という否定は焦りを押し込みます。「焦りを感じながらも最優先の一つに絞る」ことが感情を持ちながら機能し続ける感情調整の実践です。"}, {"cat": "感情の調整", "text": "今、ある決断を迫られているが、不安で判断できない。\n今のあなたは何をしている？", "opts": ["「不安があっても決めるしかない」と気合いで決める", "不安の正体を具体的に書き出してみる", "信頼できる人に判断を委ねる", "「もう少し情報を集めてから」と先延ばしにする"], "scores": [3, 5, 3, 3], "exp": "気合いと先延ばしは対極ですがどちらも感情を処理していません。「不安の正体を書き出す」ことで漠然とした不安が具体的な懸念になり、判断できる状態に近づきます。"}, {"cat": "感情の調整", "text": "今月は感情的に波が激しく、\n良い日と悪い日の差が大きい。\n今のあなたはどう対処している？", "opts": ["良い日に集中して仕事を進める", "悪い日のパターン（前触れ・状況）を記録して把握する", "悪い日は無理をしないようにする", "波は自然なものと受け入れる"], "scores": [3, 5, 3, 4], "exp": "「良い日に進める」「悪い日は無理しない」は対処です。「受け入れる」は必要ですが変化しません。「パターンを記録して把握する」という自己モニタリングが感情の波を予測・管理できるようにします。"}, {"cat": "感情の調整", "text": "今、重要な場面で感情が高ぶってきた。\n一時停止のために今のあなたがすることは？", "opts": ["「落ち着け」と自分に言い聞かせる", "数秒の深呼吸か、一言「少し考えます」と間を作る", "感情が出ないよう意識を逸らす", "高ぶりが収まるまで黙る"], "scores": [2, 5, 2, 3], "exp": "「落ち着け」という内的命令は逆効果になりやすいです。「深呼吸か間を作る」という物理的な一時停止が感情と行動の間に隙間を作る最も実践的な方法です。"}, {"cat": "感情の調整", "text": "今日、過去の失敗を突然思い出してモヤモヤしている。\n今のあなたはどう扱う？", "opts": ["「今更考えても仕方ない」と追い払う", "「なぜ今それが浮かんだのか」に少し関心を向ける", "信頼できる人に話して発散する", "「次はうまくやる」と前向きに変換する"], "scores": [2, 5, 3, 3], "exp": "「今更」は感情の追い払いです。「次はうまく」は飛躍した切替えです。「なぜ今それが浮かんだのか」という問いが、感情からのメッセージを受け取る感情調整の繊細な実践です。"}, {"cat": "感情の調整", "text": "今、仕事で怒りが湧いてくる出来事があった。\nその場での今のあなたの反応は？", "opts": ["怒りをぐっと抑えてその場を乗り切る", "「今自分は怒っている」と認識して反応の選択肢を考える", "すぐに感情を表明して状況を変えようとする", "怒りを感じていないように振る舞う"], "scores": [3, 5, 3, 1], "exp": "「ぐっと抑える」は後の爆発につながりやすいです。「感じていないように振る舞う」は抑圧です。「怒っていると認識した上で反応を選ぶ」という主体性が感情調整の核心です。"}, {"cat": "感情の調整", "text": "今、仕事とプライベートの両方でストレスが重なっている。\n今のあなたが最初にすることは？", "opts": ["「仕事とプライベートを分けて考えよう」と切り替える", "「今自分がどの程度消耗しているか」を正直に把握する", "最も急ぎの問題から解決する", "「なんとかなる」と気を取り直す"], "scores": [3, 5, 3, 3], "exp": "切り替えや解決への行動も大切ですが、「自分の消耗度を正直に把握する」という現状認識が、適切なペースの調整を可能にします。"}, {"cat": "感情の調整", "text": "今日の自分の感情の状態は、\n10点満点で何点くらいと感じている？\nその点数をどう使っている？", "opts": ["特に点数をつけたことがない", "状態を把握して今日の動き方を調整する参考にしている", "「低い点数」を上げようと努力している", "気分が良い悪いは意識しないようにしている"], "scores": [2, 5, 3, 2], "exp": "感情の状態を数値化して「今日の動き方の調整に使う」という実践的な自己観察が感情調整の日常的な応用力です。"}, {"cat": "感情の調整", "text": "今、誰かから批判を受けてかなりへこんでいる。\n今夜のあなたはどう過ごす？", "opts": ["「気にしないようにする」ために気分転換に集中する", "「どの部分が刺さったのか、なぜか」を少し内省する", "信頼できる人に話してスッキリさせる", "「批判は的外れだ」と整理して気持ちを落ち着ける"], "scores": [3, 5, 4, 3], "exp": "気分転換は有効ですが「なぜへこんだか」は残ります。「話してスッキリ」も一時的です。「どの部分がなぜ刺さったか」を内省することが感情の情報を学びに変える調整力です。"}, {"cat": "感情の調整", "text": "今、感情的に安定していると感じている。\nこの状態を意識的に維持するために\n今のあなたがしていることは？", "opts": ["特に何もしていない、自然にこうなっている", "自分の感情状態を定期的に確認して調整している", "嫌なことや人を避けるようにしている", "良いことに集中するようにしている"], "scores": [2, 5, 3, 3], "exp": "「自然にこうなっている」は状況依存で脆弱です。「避ける」は回避。「定期的に確認して調整する」という意識的な維持が感情調整の持続的な実践力です。"}, {"cat": "感情の調整", "text": "今、長期プロジェクトの疲弊感が蓄積している。\n今のあなたがまず認識すべきことは？", "opts": ["「ゴールまでもう少しだから頑張れる」", "「今自分の消耗レベルはどこまできているか」", "「どこが一番しんどいか」", "「チームも同じように疲れているはず」"], "scores": [3, 5, 4, 3], "exp": "「もう少し」は事実でも感情処理ではありません。「どこが一番しんどいか」も良いですが、「消耗レベルの把握」という客観的な自己認識が適切な対処の前提になります。"}, {"cat": "感情の調整", "text": "今夜、明日への不安で眠れそうにない。\n今のあなたはどうする？", "opts": ["「なんとかなる」と思い込もうとする", "不安の内容を紙に書き出して頭の外に出す", "好きなことをして気を紛らわす", "「不安を感じること自体がいけない」と思う"], "scores": [2, 5, 4, 1], "exp": "「なんとかなる」は根拠なき楽観です。「不安自体がいけない」は感情の否定です。「不安を紙に書き出す」ことで頭の中で循環していた思考が整理され、脳が休める状態に近づきます。"}, {"cat": "感情の調整", "text": "今、チームの雰囲気が重くなっていて\n自分もその影響を受けている。\n今のあなたはどうしている？", "opts": ["「自分だけでも明るくしよう」と振る舞う", "「今自分が集団の感情の影響を受けている」と気づいて、自分の状態と集団の状態を分けて考える", "雰囲気が変わるのを待つ", "重い雰囲気の原因を探る"], "scores": [3, 5, 3, 4], "exp": "「明るくしよう」は演技になりやすいです。「自分の状態と集団の状態を分ける」という認識が、集団感情に飲まれずに自分の調整を保つ力です。"}, {"cat": "感情の調整", "text": "今月の自分の感情調整を振り返ると、\nどんな場面が最も難しかった？\n今のあなたはそれについて何をしている？", "opts": ["「仕方なかった」と受け入れている", "「なぜその場面が難しかったか」を具体的に振り返っている", "「次はうまくやろう」と意欲を持っている", "難しかった場面を思い出さないようにしている"], "scores": [3, 5, 4, 2], "exp": "「受け入れる」「次はうまく」は前向きですが分析が浅い。「思い出さない」は回避。「なぜ難しかったか」という具体的な振り返りが感情調整の継続的な改善につながります。"}, {"cat": "感情の調整", "text": "今日は珍しく感情的になってしまった。\n今のあなたは自分に何と言っている？", "opts": ["「弱かった、もっとしっかりしなければ」", "「感情が出たことで、何か気づけることがあるかも」", "「まあ人間だからたまにはある」", "「謝罪して関係を修復しよう」"], "scores": [1, 5, 3, 4], "exp": "「弱かった」は自己批判で成長を遅らせます。「たまにはある」は一般化で学びが浅い。「感情が出たことで気づけることがある」という好奇心のフレームが感情を情報に変える調整力です。"}, {"cat": "感情の調整", "text": "今、感情的に消耗していることに気づいた。\n今のあなたがまず取る「回復の一歩」は？", "opts": ["「消耗している場合ではない」と切り替えようとする", "消耗のレベルと原因を確認して、小さな回復行動を一つ選ぶ", "誰かに話して楽になる", "好きなことをして気分を変える"], "scores": [1, 5, 4, 3], "exp": "「消耗している場合ではない」は否定です。話すや気分転換も有効ですが、「消耗のレベルと原因を確認して一つ選ぶ」という主体的・計画的な回復行動が感情調整の能動的な実践です。"}, {"cat": "楽観的思考", "text": "今、自分が「感情的になりかけている」と\nリアルタイムに気づいた。\n次の行動は？", "opts": ["気づいたのでそのまま感情を表に出す", "気づいたことで少し立ち止まり、反応を選ぶ", "「気づけた、大丈夫だ」と自信を持つ", "気づかないようにして状況を乗り切る"], "scores": [3, 5, 4, 1], "exp": "気づくことは素晴らしいですが「そのまま出す」は気づきを活かせていません。「気づいて立ち止まり反応を選ぶ」という選択的な行動が感情調整の最も重要な実践です。"}, {"cat": "楽観的思考", "text": "今、困難なプロジェクトの真っ只中にいる。\n未来について、今のあなたが持っている感覚は？", "opts": ["「きっとうまくいく」という根拠のない確信", "「何を変えれば状況が動くか」という具体的な問い", "「このままではまずい」という現実的な懸念", "「頑張ればなんとかなる」という気合い"], "scores": [3, 5, 4, 3], "exp": "「きっとうまくいく」「頑張ればなんとか」は根拠のない楽観です。「現実的な懸念」は重要ですが前進力がありません。「何を変えれば動くか」という問いが根拠のある楽観の実践形です。"}, {"cat": "楽観的思考", "text": "今、何度試みてもうまくいっていない仕事がある。\n今のあなたの内側の声は？", "opts": ["「自分には向いていないのかも」", "「まだ試していない方法がある」", "「もう少し続ければきっと変わる」", "「このやり方で合っているはず」"], "scores": [2, 5, 3, 2], "exp": "「向いていない」は早計な結論です。「もう少し続ければ」「このやり方で合っている」は現状への固執です。「まだ試していない方法がある」という視点が方法を変える楽観的思考です。"}, {"cat": "楽観的思考", "text": "今日、大事な場面で失敗してしまった。\n明日の朝、今のあなたはどんな言葉を自分にかけている？", "opts": ["「昨日は失敗だった、気を引き締めよう」", "「昨日の失敗から、今日使える学びは何か」", "「失敗したけど、またやれば大丈夫」", "「あの失敗はたまたまだった」"], "scores": [3, 5, 3, 2], "exp": "「気を引き締めよう」は決意ですが学びが薄い。「たまたまだった」は原因を回避しています。「今日使える学びは何か」という問いが失敗を未来の根拠に変える楽観的思考です。"}, {"cat": "楽観的思考", "text": "今、長期間うまくいかない状況が続いている。\n前向きさを保つために今のあなたが\n意識的にしていることは？", "opts": ["「絶対にいつかうまくいく」と信じ続ける", "「今続けていることが将来の何かにつながっている」という意味を探す", "周囲のポジティブな人と過ごすようにしている", "うまくいっていないことを一時的に考えないようにしている"], "scores": [3, 5, 3, 2], "exp": "「絶対にいつか」は根拠なき信念です。「考えないようにする」は回避。「今続けていることの意味を探す」という内発的な意味づけが最も持続的な楽観性の源泉です。"}, {"cat": "楽観的思考", "text": "今、チームのプロジェクトが行き詰まっている。\n会議でのあなたの発言として最も近いのは？", "opts": ["「一旦立ち止まって状況を整理しましょう」", "「まだ試していないアプローチから可能性を探しましょう」", "「なぜここまで来てしまったかを振り返りましょう」", "「このままでは厳しいですね」"], "scores": [4, 5, 4, 3], "exp": "「立ち止まる」「振り返る」も必要ですが消極的です。「厳しい」は現実的ですが前進力がありません。「まだ試していないアプローチ」という前向きな可能性の探索が楽観的思考の集団的な実践です。"}, {"cat": "楽観的思考", "text": "今、自分の将来について漠然とした不安がある。\n今のあなたはその不安をどう扱っている？", "opts": ["「なんとかなる」と気持ちを切り替えている", "不安の正体を特定して、コントロールできる部分に集中している", "将来について考えないようにしている", "明るい未来を具体的にイメージしている"], "scores": [3, 5, 2, 4], "exp": "「なんとかなる」は根拠なき楽観。「考えない」は回避。「明るいイメージ」は動機にはなりますが行動の代わりにはなりません。「不安の正体を特定してコントロールできる部分に集中する」が根拠のある楽観の実践です。"}, {"cat": "楽観的思考", "text": "今、ある挑戦をしようとしているが\n「失敗するかもしれない」という思いがある。\n今のあなたの考え方は？", "opts": ["「失敗しても学びがある」と言い聞かせる", "「失敗のリスクを把握した上で、それでも挑戦する理由」を確認する", "「失敗しても仕方ない」と開き直る", "「失敗しないように慎重に準備する」"], "scores": [3, 5, 3, 4], "exp": "「失敗しても学びがある」は前向きですが準備が薄い。「慎重に準備する」は実践的ですが不安への直接的な対処がありません。「リスクを把握した上で挑戦する理由を確認する」が根拠のある楽観の挑戦の形です。"}, {"cat": "楽観的思考", "text": "今、逆境の中にいる。\n「これには意味がある」と今のあなたは感じられている？", "opts": ["全くそう思えない", "「あるかもしれない」と思いながら意味を少し探している", "「意味があると思うようにしている」", "「今は意味より対処が先だ」と思っている"], "scores": [2, 5, 3, 4], "exp": "「全く思えない」「思うようにしている」は両極端です。「対処が先」は実践的です。「あるかもしれないと思いながら少し探す」という開かれた探索姿勢が逆境での楽観的思考の現実的な形です。"}, {"cat": "楽観的思考", "text": "今日、他者の成功を目にした。\n今のあなたの内側は？", "opts": ["「自分にはあそこまで無理かも」と感じる", "「この人から学べることがある」という関心が湧く", "「自分もいつかは」と思う", "「すごいな」と素直に思う"], "scores": [1, 5, 3, 3], "exp": "「無理かも」は固定的思考です。「いつかは」「すごいな」は受動的な感想です。「この人から学べることがある」という積極的な関心が成功体験を自己効力感に転換する楽観的思考です。"}, {"cat": "楽観的思考", "text": "今のあなたは「状況が変わる」とどれくらい信じられている？\nその信念の根拠として最も近いのは？", "opts": ["「信じることにしているから」", "「過去に状況が変わってきた経験があるから」", "「変わらなくても仕方ないと思っているから」", "「周りの人が変わると言っているから」"], "scores": [3, 5, 2, 3], "exp": "「信じることにした」「周りが言っている」は外発的で不安定です。「変わらなくても仕方ない」は楽観ではなく諦めです。「過去に変わってきた経験」が最も確かな楽観性の根拠です。"}, {"cat": "楽観的思考", "text": "今、ネガティブな見通しを持ちそうになっている。\n今のあなたが取るアプローチは？", "opts": ["「ポジティブに考えよう」と意識的に切り替える", "「この見通しの根拠は何か」を問う", "「最悪の場合に備えよう」と準備する", "「なんとかなる」と楽観して進む"], "scores": [3, 5, 4, 3], "exp": "「ポジティブに切り替える」は感情の上書きです。「なんとかなる」は根拠なき楽観。「最悪への備え」は現実的。「この見通しの根拠は何か」という問いが認知の正確さを高める楽観的思考の実践です。"}, {"cat": "楽観的思考", "text": "今月、成果がなかなか出ていない。\n今のあなたの最も正直な内側は？", "opts": ["「このまま続けても変わらないかも」", "「何かが機能していないはず、探してみよう」", "「もう少し待てば変わるはず」", "「自分の力不足だ」"], "scores": [2, 5, 3, 2], "exp": "「変わらないかも」「力不足」は悲観的帰属です。「待てば変わる」は根拠なき楽観。「何かが機能していないはず、探してみよう」という探索的な姿勢が根拠のある楽観の行動的な表れです。"}, {"cat": "楽観的思考", "text": "今、「もう無理かも」という思いが浮かんでいる。\n今のあなたはその思いをどう扱っている？", "opts": ["「そんなことはない」と否定する", "「今そう感じているんだな」と受け止めた上で、根拠を確認してみる", "「無理なら方向転換を考えよう」と現実的に考える", "誰かに「大丈夫」と言ってもらう"], "scores": [2, 5, 4, 3], "exp": "否定は感情の抑圧です。「方向転換を考える」は有効な選択肢ですが根拠確認の前です。「受け止めた上で根拠を確認する」という感情と思考の両方を扱う姿勢が成熟した楽観的思考です。"}, {"cat": "楽観的思考", "text": "今のあなたの「楽観性」は、\nどこから来ていると感じている？", "opts": ["生まれつきの性格", "過去に困難を乗り越えてきた経験の蓄積", "周囲の前向きな人の影響", "「楽観的でいよう」と意識しているから"], "scores": [2, 5, 3, 3], "exp": "性格・意識・他者影響は不安定な基盤です。「過去に乗り越えてきた経験の蓄積」が最も実証的で持続的な楽観性の根拠です。これがRQの楽観的思考の核心です。"}, {"cat": "楽観的思考", "text": "今、困難な状況を「一時的なもの」と\nどれくらい捉えられている？", "opts": ["全くそう思えない", "「永遠に続くわけではない」と頭ではわかっているが感じられない", "「一時的かもしれない」と思いながら今できることをしている", "「一時的だから大丈夫」と切り替えられている"], "scores": [1, 3, 5, 4], "exp": "「頭ではわかっている」と「感じられない」のギャップは正直な状態です。「一時的かもしれないと思いながら今できることをする」という行動への接続が最も現実的で建設的な楽観的思考の実践です。"}, {"cat": "楽観的思考", "text": "今、同じ失敗を2回繰り返してしまった。\n今のあなたが自分に言う言葉は？", "opts": ["「また同じミスをするような人間だ」", "「2回繰り返したということは、まだ原因を理解できていない」", "「次こそは気をつけよう」", "「誰でも繰り返すことはある」"], "scores": [1, 5, 3, 3], "exp": "「そういう人間だ」は固定的思考です。「次こそは」「誰でも」は学びが浅い。「まだ原因を理解できていない」という問いの形への変換が繰り返しを止める楽観的な成長思考です。"}, {"cat": "楽観的思考", "text": "今、予想外の障害でプロジェクトが止まっている。\n今のあなたの最初の思考は？", "opts": ["「なぜこうなった」と原因を考える", "「これで何が変わるか、どう動けるか」を考える", "「最悪の場合のシナリオ」を考える", "「誰の責任か」を考える"], "scores": [3, 5, 3, 2], "exp": "「なぜ」「最悪」「誰の責任」は後向きの思考です。「これで何が変わるか、どう動けるか」という問いが障害を「変化の文脈」として捉える楽観的思考の実践的な形です。"}, {"cat": "楽観的思考", "text": "今、「自分はこの困難を乗り越えられる」という\n感覚はどれくらいある？", "opts": ["あまりない", "「過去に似た困難を乗り越えたことがある」という記憶がある", "「なんとかなる」という漠然とした感覚", "周りが「大丈夫」と言ってくれている"], "scores": [2, 5, 3, 3], "exp": "「なんとかなる」「周りが言っている」は不安定な根拠です。「過去に乗り越えた記憶」という実証的な経験が、最も信頼できる乗り越えられるという確信の根拠です。"}, {"cat": "楽観的思考", "text": "今、不確実性の高い状況の中にいる。\n今のあなたはその不確実性をどう扱っている？", "opts": ["不確実性をなくすために情報を集め続ける", "不確実性の中にある可能性に目を向けながら動いている", "不確実性が解消されるまで動きを止めている", "「不確実でも大丈夫」と言い聞かせている"], "scores": [3, 5, 2, 3], "exp": "情報収集は有効ですが、不確実性は完全には解消されません。「動きを止める」は機会損失。「大丈夫と言い聞かせる」は根拠なき楽観。「可能性に目を向けながら動く」が不確実性と共存する楽観的思考の成熟した形です。"}, {"cat": "楽観的思考", "text": "今のあなたにとって、「諦めない」の\n最も正直な意味は？", "opts": ["どんな状況でも続けること", "方法を変えながら目的に向かい続けること", "諦めることへの恐れで続けること", "周囲への手前があるので続けること"], "scores": [2, 5, 1, 1], "exp": "「どんな状況でも続ける」は固執になるリスクがあります。恐れや手前は外発的で持続しません。「方法を変えながら目的に向かい続ける」という柔軟な継続が楽観的思考に基づく「諦めない」の実践的な意味です。"}, {"cat": "楽観的思考", "text": "今日、何かうまくいったことがあった。\n今のあなたはそれをどう扱っている？", "opts": ["「たまたまうまくいった」と思っている", "「なぜうまくいったか」を少し振り返っている", "「次もこの調子で」と前向きな気持ちになっている", "特に意識せず次に進んでいる"], "scores": [2, 5, 3, 2], "exp": "「たまたま」は成功を偶然に帰属する楽観の逆です。「前向きな気持ち」は感情ですが学びが薄い。「なぜうまくいったか」の振り返りが成功の再現性を高め楽観性の根拠を積み上げます。"}, {"cat": "楽観的思考", "text": "今のあなたは、困難を「成長の機会」として\nどれくらいリアルに感じられている？", "opts": ["全くそう感じられない", "「そうかもしれない」と思いながら、何を学んでいるか考えている", "「成長の機会だ」と頭では思っているが実感がない", "「成長のために困難がある」と自然に感じられている"], "scores": [2, 5, 3, 4], "exp": "「頭ではわかっているが実感がない」のは正直な状態です。「そうかもしれないと思いながら何を学んでいるか考える」という行動への接続が、「成長の機会」を実感に変える楽観的思考の実践です。"}, {"cat": "楽観的思考", "text": "今、長い逆境の中にいる。\n今のあなたが「これは永遠には続かない」と\n信じられる理由は？", "opts": ["「そう信じることにしている」", "「今まで全ての困難が変化してきた」という自分の経験", "「時間が解決する」という一般論", "「周りがそう言ってくれている」"], "scores": [3, 5, 3, 3], "exp": "「信じることにした」「一般論」「周り」は根拠として薄い。「今まで全ての困難が変化してきた」という自分自身の経験の積み重ねが最も実証的な楽観性の根拠です。"}, {"cat": "原因分析", "text": "今日、仕事でミスをした。\n今のあなたはそのミスをどう分析している？", "opts": ["「自分の注意力が足りなかった」と内省している", "「何が・どこで・なぜ」を複数の視点から整理している", "「今日は調子が悪かった」と状況に帰している", "「次は気をつければいい」と前向きに切り替えている"], "scores": [3, 5, 3, 3], "exp": "「注意力不足」は表面的で再発防止につながりにくい。「次は気をつける」は意志力依存。「調子が悪かった」は状況帰属。「何が・どこで・なぜ」の複数視点が再発を防ぐ原因分析の深さです。"}, {"cat": "原因分析", "text": "今、同じ種類の問題が3回繰り返されている。\n今のあなたはどこに原因を見ている？", "opts": ["「自分の性格的な問題」", "「なぜ繰り返されるのかというパターンの構造」", "「毎回状況が悪かっただけ」", "「気のせいかもしれない」"], "scores": [3, 5, 2, 1], "exp": "「性格の問題」は固定的で変えにくい。「状況が悪かった」は外部帰属。「気のせい」は問題の回避。「繰り返すパターンの構造」への着目が根本的な変化につながる原因分析です。"}, {"cat": "原因分析", "text": "今、困難が続いている原因が\n「自分のせい」なのか「状況のせい」なのか\n判断できていない。今のあなたはどうしている？", "opts": ["「どちらかといえば自分のせい」と思うことにしている", "「自分が関与した部分」と「環境的な要因」を分けて整理する", "「状況が悪かった」と思うことにしている", "誰かに判断してもらう"], "scores": [3, 5, 2, 3], "exp": "どちらかに決めつけるのは不正確な分析です。「自分の関与部分と環境要因を分けて整理する」というバランスのとれた分析が、建設的な行動を生む正確な原因理解の方法です。"}, {"cat": "原因分析", "text": "今日の失敗が「永続する自分の問題」なのか\n「この場面での出来事」なのか、\n今のあなたはどう捉えている？", "opts": ["「自分はいつもこうだ」と感じてしまっている", "「この場面での特定の要因が重なった」として捉えている", "「まあたまたま」と思っている", "「どちらとも言えない」と混乱している"], "scores": [1, 5, 3, 3], "exp": "「自分はいつもこうだ」は永続的・全体的な帰属で回復を妨げます。「この場面での特定の要因」という限定した帰属が、失敗から素早く学んで前進するRQの原因分析の核心です。"}, {"cat": "原因分析", "text": "今、仕事で人間関係のトラブルが起きている。\n今のあなたはどこに原因を見ている？", "opts": ["「相手の性格の問題」", "「自分の伝え方の問題」", "「状況・タイミング・双方のズレが重なった」", "「お互い様だから仕方ない」"], "scores": [2, 3, 5, 3], "exp": "相手の性格・自分の伝え方はどちらも単一帰属です。「お互い様」は問題を曖昧にします。「状況・タイミング・双方のズレ」という複合的な視点が対人問題の正確な原因分析の深さです。"}, {"cat": "原因分析", "text": "今日、うまくいった仕事があった。\n今のあなたはその原因をどう捉えている？", "opts": ["「自分の実力がついてきた」", "「今日は運が良かった」", "「準備・状況・自分の努力が重なった」", "「特に考えずに前に進んでいる」"], "scores": [3, 2, 5, 2], "exp": "「自力だ」は過剰な内部帰属、「運」は過剰な外部帰属です。「考えずに進む」は学びを逃します。「準備・状況・努力の複合」という正確な分析が成功を再現可能にします。"}, {"cat": "原因分析", "text": "今、努力しているのに成果が出ていない。\n今のあなたはどこを疑っている？", "opts": ["「努力の量が足りない」", "「努力の方向性や方法が合っていないかもしれない」", "「今は結果が出にくい時期だ」", "「周囲の環境が悪い」"], "scores": [2, 5, 4, 3], "exp": "「量が足りない」は消耗を増やします。「時期が悪い」「環境が悪い」は外部帰属です。「方向性や方法が合っていないかも」という質への問いが成果につながる原因分析の視点です。"}, {"cat": "原因分析", "text": "今、プロジェクトが失敗に近い状況にある。\nチームの会議で今のあなたが最初に発言するとしたら？", "opts": ["「誰の責任か整理しましょう」", "「何が・いつから・なぜこうなったかを時系列で確認しましょう」", "「次どうするかを話しましょう」", "「外部要因が大きかったですね」"], "scores": [1, 5, 3, 3], "exp": "「誰の責任」は犯人探しで学びが浅い。「次どうするか」は原因を飛ばした解決。「外部要因」は単純帰属。「何が・いつから・なぜ」の時系列分析が正確な原因理解の基礎です。"}, {"cat": "原因分析", "text": "今、「なんとなくうまくいかない」という\n漠然とした不調が続いている。\n今のあなたのアプローチは？", "opts": ["「気分転換すれば変わる」と思っている", "「不調の具体的な現れはどこか」を観察して特定しようとしている", "「しばらく様子を見よう」と思っている", "「誰かに状況を話して整理する」"], "scores": [3, 5, 3, 3], "exp": "「気分転換」「様子見」は対処ですが根本に迫りません。「話して整理」も有効ですが分析は自分の中にあります。「不調の具体的な現れを観察して特定する」という内側からのボトムアップ分析が原因に近づく方法です。"}, {"cat": "原因分析", "text": "今のあなたは、自分の思い込みや\nバイアスが原因分析に影響していると\n意識することはある？", "opts": ["「自分は客観的に分析できている」", "「分析する前に自分の先入観を確認する習慣がある」", "「バイアスがあっても大きな影響はない」", "「バイアスは誰にでもあるので仕方ない」"], "scores": [2, 5, 2, 3], "exp": "「客観的に分析できている」という確信自体がバイアスの典型です。「バイアスがある」という認識と「確認する習慣」の両方があることが原因分析の精度を守る最も重要な前提です。"}, {"cat": "原因分析", "text": "今、関係が悪化している相手がいる。\nその相手の「なぜそうしたか」を、\n今のあなたはどれくらい考えている？", "opts": ["考えていない（相手が悪いと思っている）", "「相手がそうした背景・動機・状況」を想像しようとしている", "「お互い悪かった」とまとめている", "時間が解決すると思っている"], "scores": [1, 5, 3, 2], "exp": "相手への帰属・お互い様・時間任せはどれも相手を深く理解しません。「相手の背景・動機・状況を想像する」という共感的な視点が対人問題の正確な原因分析に不可欠な要素です。"}, {"cat": "原因分析", "text": "今、「気合いが足りなかった」という説明で\n自分のミスを片付けそうになっている。\n今のあなたはどう踏みとどまる？", "opts": ["「気合いを次は出そう」と決意する", "「気合いという言葉の下に何があるか」を掘り下げる", "「気合いで説明できるなら十分だ」と思う", "「気合いじゃなくてスキルの問題だ」と変える"], "scores": [2, 5, 2, 3], "exp": "「気合い」への帰属は最も表面的な原因分析です。「スキルの問題」への変換も一段階浅い。「気合いという言葉の下に何があるか」を掘り下げることが根本的な原因に迫る分析力です。"}, {"cat": "原因分析", "text": "今、問題の原因として複数の要因が思い浮かんでいる。\n今のあなたはその中から何を探している？", "opts": ["「最も重要な原因」を一つに絞ろうとしている", "「どの要因が最も変えやすいか」を探っている", "「全部が原因だ」と整理せずにいる", "「もっと情報を集めてから判断しよう」としている"], "scores": [4, 5, 2, 3], "exp": "「一つに絞る」は単純化ですが行動しやすい。「全部が原因」は整理できていません。「情報収集継続」は行動を遅らせます。「最も変えやすい要因」を探すことが行動への接続を優先した原因分析の実践的な視点です。"}, {"cat": "原因分析", "text": "今日も同じパターンの反応をしてしまった\n（すぐ焦る・過剰に心配するなど）。\n今のあなたはそのパターンについて何を考えている？", "opts": ["「性格だから仕方ない」", "「このパターンはどんな状況で発動するか」を観察している", "「意志力で変えよう」と思っている", "「誰でもそういうことはある」と思っている"], "scores": [1, 5, 3, 3], "exp": "「性格」「誰でも」は変化を諦める帰属です。「意志力で変える」は持続しにくい。「どんな状況で発動するか」を観察することが、パターンの根本原因を探るための観察的な原因分析の出発点です。"}, {"cat": "原因分析", "text": "今、成功した経験を振り返る機会がある。\nその成功について今のあなたが分析することは？", "opts": ["「うまくいったので特に分析しない」", "「なぜうまくいったか」を言語化して次に活かせるかを確認する", "「運が良かっただけ」と思っている", "「また同じようにやれば良い」と思っている"], "scores": [2, 5, 2, 3], "exp": "「特に分析しない」「運だけ」は成功から学びません。「また同じように」は状況の変化に対応できません。「なぜうまくいったか」を言語化することが成功を再現可能にする原因分析の力です。"}, {"cat": "原因分析", "text": "今、「自分には向いていない」という感覚がある。\n今のあなたはその感覚をどう扱っている？", "opts": ["「向いていないのは事実だ」と受け入れている", "「どんな場面でそう感じるか」を具体的に特定している", "「向いていると思うようにしている」", "「もっと経験を積めば変わる」と思っている"], "scores": [1, 5, 3, 3], "exp": "「事実だ」は早計な結論です。「思うようにする」は感情の上書き。「経験を積めば」は時間任せ。「どんな場面でそう感じるか」を特定することが「向いていない」という感覚の正確な原因に近づく分析です。"}, {"cat": "原因分析", "text": "今月の自分の仕事の質を振り返ると、\nムラがある。今のあなたはその原因を何に見ている？", "opts": ["「気分のムラ」", "「どんな条件が揃うと質が上がるか」を観察している", "「その日の体調やコンディション」", "「やる気の問題」"], "scores": [3, 5, 3, 2], "exp": "「気分・体調・やる気」はどれも表面的な帰属です。「どんな条件が揃うと質が上がるか」という逆算的な観察が、ムラを構造的に理解して管理できるようにする原因分析の実践力です。"}, {"cat": "原因分析", "text": "今、「自分のパターン」を客観的に理解するために\n今のあなたがしていることは？", "opts": ["特にしていない", "日々の出来事と自分の反応を観察・記録して傾向を把握している", "信頼できる人からのフィードバックを定期的に求めている", "問題が起きた時だけ振り返る"], "scores": [1, 5, 4, 3], "exp": "「問題が起きた時だけ」の振り返りは後手に回ります。「フィードバックを求める」は他者視点で有効です。「日々の出来事と反応を観察・記録する」という継続的な自己モニタリングが最も精度の高いパターン把握の方法です。"}, {"cat": "原因分析", "text": "今のあなたは、困難の原因分析が\n「自己批判」ではなく「学習」になるために\n何を意識している？", "opts": ["感情を排除して論理的に分析する", "「何が起きたか・なぜか」を知るための好奇心で分析する", "素直に反省する", "他者の視点を参考にする"], "scores": [3, 5, 3, 3], "exp": "「感情を排除する」は困難で、排除しようとすること自体が感情を抑圧します。「好奇心で分析する」というスタンスが、自己批判ではなく学習としての原因分析を可能にする最も重要な姿勢です。"}, {"cat": "原因分析", "text": "今日、ある問題が解決した。\n今のあなたはその解決をどう捉えている？", "opts": ["「解決したので次に進む」", "「何が解決につながったか」を確認する", "「運良く解決した」", "「自分の力で解決できた」"], "scores": [2, 5, 2, 4], "exp": "「次に進む」「運」は解決から学びません。「自分の力で」は功績への帰属ですが再現性の分析が薄い。「何が解決につながったか」という原因の確認が次の問題への応用力を高めます。"}, {"cat": "原因分析", "text": "今、「原因を分析しても何も変わらない」と\n感じることがある。今のあなたはその感覚をどう扱う？", "opts": ["「そうかもしれない」と分析をやめる", "「分析した後に行動に変えられているか」を確認する", "「分析は大切だ」と言い聞かせる", "「今は分析より行動だ」と切り替える"], "scores": [1, 5, 3, 3], "exp": "「分析をやめる」は問題への盲目化です。「行動だ」と切り替えるのも有効ですが根本の問いを回避します。「分析した後に行動に変えられているか」という確認が分析と行動のつながりを検証する成熟した視点です。"}, {"cat": "原因分析", "text": "今、自分の反応パターン（すぐ謝る・過剰に配慮するなど）が\n問題を生んでいる気がしている。\n今のあなたはそのパターンをどう見ている？", "opts": ["「直さなければいけない欠点」", "「いつ・どんな状況で発動するかのパターン」を観察している", "「自分の個性だから変えなくていい」", "「以前より改善されている」"], "scores": [3, 5, 2, 3], "exp": "「欠点」「個性」は二項対立で分析を止めます。「改善されている」は現状把握です。「いつ・どんな状況で発動するか」の観察が、パターンをコントロールするための原因分析の実践的な入口です。"}, {"cat": "自己効力感", "text": "今、難しい課題に取り組んでいる。\n今のあなたの内側に最も近い声は？", "opts": ["「自分には難しすぎるかも」", "「どこから始めれば進めるか」という問い", "「なんとかなる」という感覚", "「他にもっとできる人がいる」"], "scores": [2, 5, 3, 2], "exp": "「難しすぎる」「他にできる人が」は自己効力感を下げる帰属です。「なんとかなる」は根拠なき楽観。「どこから始めれば進めるか」という問いが自己効力感の高い状態での思考パターンです。"}, {"cat": "自己効力感", "text": "今のあなたが「自分にはできる」と感じる時、\nその感覚の根拠として最も強いのは？", "opts": ["「できると思い込んでいるから」", "「過去に似たことをやり遂げた経験があるから」", "「誰かが「できる」と言ってくれているから」", "「やるしかない状況だから」"], "scores": [3, 5, 3, 3], "exp": "思い込み・他者の言葉・状況の強制はいずれも不安定な根拠です。「過去に似たことをやり遂げた経験」という自分の実績が最も安定した自己効力感の根拠です。"}, {"cat": "自己効力感", "text": "今、失敗が続いている。\n今のあなたが自分に対してしていることは？", "opts": ["「もっとしっかりしなければ」と叱咤する", "「今まで乗り越えてきた経験」を思い出して根拠を確認する", "「頑張れば変わる」と気合いを入れる", "誰かに「大丈夫だよ」と言ってもらう"], "scores": [1, 5, 3, 3], "exp": "叱咤は自己批判で消耗します。「頑張れば変わる」は根拠なき楽観。「大丈夫」と言ってもらうのは一時的。「乗り越えてきた経験を思い出す」ことが失敗の中でも自己効力感を再確認する実証的な方法です。"}, {"cat": "自己効力感", "text": "今、「自分には無理かも」という思いがある。\nその思いに対して今のあなたがすることは？", "opts": ["「そんなことはない」と否定する", "「なぜそう感じるのか・根拠はあるか」を検証する", "「無理なら他の人に任せよう」と判断する", "気持ちを変えるために誰かに話す"], "scores": [3, 5, 3, 3], "exp": "否定は感情を抑圧します。「他の人に任せる」は一つの選択肢ですが根拠確認なしには早い。「なぜそう感じるか・根拠はあるか」の検証が自己効力感を現実に基づかせる力です。"}, {"cat": "自己効力感", "text": "今日、初めての大きな仕事を任された。\n今のあなたの内側で起きていることは？", "opts": ["「失敗したらどうしよう」という不安", "「どんなスキルや経験が活かせるか」を探している", "「なんとかなる」という楽観", "「なぜ自分が選ばれたのか」という疑問"], "scores": [3, 5, 3, 3], "exp": "「失敗したら」「なぜ自分が」は自己効力感を下げる思考です。「なんとかなる」は根拠なき楽観。「どんなスキルや経験が活かせるか」を探すことが、過去の経験を根拠にした自己効力感の実践的な構築方法です。"}, {"cat": "自己効力感", "text": "今、困難なプロジェクトの途中で\n自信が揺らいでいる。今のあなたがすることは？", "opts": ["「必ずできる」と自分に言い聞かせる", "「ここまで何を達成してきたか」を振り返る", "誰かに「大丈夫?」と聞いてもらう", "「できなくても仕方ない」と準備する"], "scores": [3, 5, 3, 2], "exp": "「必ずできる」は根拠なき確信です。「できなくても仕方ない」は諦めの準備。「大丈夫?」は一時的。「ここまで何を達成したか」の振り返りが自信の根拠を再確認する最も実践的な方法です。"}, {"cat": "自己効力感", "text": "今、批判的なフィードバックを受けた。\n今のあなたの自己効力感への影響は？", "opts": ["「批判されると自信がなくなる」", "「批判から学べる部分と自分の核心（強み）は分けて考える」", "「批判した相手が間違っている」", "「全て改善しようとする」"], "scores": [2, 5, 2, 3], "exp": "批判で「自信がなくなる」のは外部依存の自己効力感です。「全改善」は自分の核心を失います。「批判を否定する」は学びを失います。「学べる部分と自分の核心を分ける」ことが批判に揺れない自己効力感の守り方です。"}, {"cat": "自己効力感", "text": "今、苦手なことに取り組まなければならない。\n今のあなたのアプローチは？", "opts": ["「苦手なことは向いていない」と思う", "「なぜ苦手なのか・何が難しいのか」を特定してから取り組む", "「得意な人に任せる」", "「苦手でも慣れれば変わる」と思って進める"], "scores": [1, 5, 3, 3], "exp": "「向いていない」は固定的思考です。「得意な人に任せる」は回避。「慣れれば変わる」は根拠が薄い。「なぜ苦手か・何が難しいか」を特定することが苦手の根本に迫り、適切な対処を可能にします。"}, {"cat": "自己効力感", "text": "今のあなたの「自分には価値がある」という感覚は\n何に基づいている？", "opts": ["他者からの評価や承認", "自分の行動・貢献・成長への内的な実感", "成果や実績の積み重ね", "「価値があると思うことにしている」"], "scores": [2, 5, 4, 2], "exp": "他者評価・意識的な決意は外部依存で不安定です。成果・実績は変動します。「自分の行動・貢献・成長への内的な実感」が最も外部環境に揺れにくい自己効力感の基盤です。"}, {"cat": "自己効力感", "text": "今、長期的な目標に向けて行動を続けているが\n迷いが出てきた。今のあなたはどうしている？", "opts": ["「迷っている場合ではない」と進める", "「ここまでの学びを振り返り、方向性を確認する」", "「誰かに判断してもらう」", "「迷いは弱さだ」と押し込める"], "scores": [2, 5, 3, 1], "exp": "「迷いを押し込む」「判断を委ねる」は主体性の放棄です。「進めるだけ」は迷いの放置。「ここまでの学びを振り返り、方向性を確認する」という主体的な立ち止まりと確認が自己効力感の成熟した実践です。"}, {"cat": "自己効力感", "text": "今のあなたは、「自分にはできない」という\n固定的な見方を変えようとしている。\n最も助けになっていることは？", "opts": ["「できる」と繰り返し言い聞かせること", "小さな成功体験を意識的に積み重ねること", "できている他者の様子を観察すること", "「できない」と思っていた自分を否定すること"], "scores": [3, 5, 4, 1], "exp": "「言い聞かせ」は根拠なき信念です。「自分の否定」は自己批判。「他者を観察する」はBanduraの代理経験として有効。「小さな成功体験を積み重ねる」が自己効力感変化の最も確実な科学的方法（達成経験）です。"}, {"cat": "自己効力感", "text": "今、他者が自分と同じ課題に苦戦しているのを見た。\n今のあなたはどう感じる？", "opts": ["「自分だけが苦戦しているわけではない」と安心する", "「あの人の経験から学べることがある」という関心", "「自分はもっとうまくやれる」と思う", "特に何も感じない"], "scores": [3, 4, 3, 2], "exp": "「安心する」は一時的な感情の安定。「自分はもっとうまく」は比較。「学べることがある」という関心が他者の経験を自己効力感の根拠（代理経験）として活用する最も建設的な姿勢です。"}, {"cat": "自己効力感", "text": "今のあなたが「諦めない」でいる理由として\n最も正直なのは？", "opts": ["「諦めることへの恐れ」", "「続けることに内発的な意味を感じているから」", "「周囲への手前があるから」", "「今更やめられないから」"], "scores": [2, 5, 2, 2], "exp": "恐れ・手前・今更はどれも外発的・回避的な動機で長続きしません。「内発的な意味を感じているから」という動機が最も持続的な自己効力感のエネルギー源です。"}, {"cat": "自己効力感", "text": "今月、自分が「できた」と感じる小さなことは\nいくつかあった。今のあなたはそれをどう扱っている？", "opts": ["特に意識していない", "意識的に記録して自信の根拠として積み上げている", "「こんな小さなことは普通だ」と流している", "「もっと大きなことができないと意味がない」と思っている"], "scores": [2, 5, 2, 1], "exp": "小さな成功を「普通」「意味がない」と流すことは自己効力感の根拠を捨てることです。「意識的に記録して積み上げる」という行為が、自己効力感を実証的に育てる日常的な実践です。"}, {"cat": "自己効力感", "text": "今、「もう一度挑戦する」か「方向転換する」かで\n迷っている。今のあなたは何を基準に考えている？", "opts": ["「まだ諦めたくない」という感情", "「過去の取り組みから何を学んで変えられるか」という根拠", "「周囲の意見」", "「これ以上時間をかけられない」という状況"], "scores": [3, 5, 3, 3], "exp": "感情・周囲・状況はどれも外発的な判断基準です。「過去から何を学んで変えられるか」という根拠ベースの検討が、自己効力感に基づいた最も主体的な判断の基準です。"}, {"cat": "自己効力感", "text": "今のあなたの「成長できている」という実感は\nどこから来ている？", "opts": ["他者に「成長した」と言われること", "以前の自分と比べた具体的な変化の実感", "成果が出ていること", "成長しているかどうか正直わからない"], "scores": [3, 5, 4, 3], "exp": "他者の言葉・成果は外部基準で変動します。「以前の自分と比べた具体的な変化の実感」という内部基準が、外部環境に左右されない安定した自己効力感の源泉です。"}, {"cat": "自己効力感", "text": "今のあなたは、自己効力感が低くなっている時\n何がきっかけでそれに気づく？", "opts": ["「やる気がない」という感覚", "取り組みへの回避が増えていると気づく", "誰かに「最近元気ない?」と言われる", "特に気づかないことが多い"], "scores": [3, 5, 3, 2], "exp": "「やる気がない」は感情。「言われて気づく」は他者依存。「特に気づかない」は自己観察が薄い。「回避が増えている」という行動パターンの変化への気づきが自己効力感の変化を早期に察知する自己観察力です。"}, {"cat": "自己効力感", "text": "今のあなたにとって「自分を信じる」とは\n最も正直にどういうこと？", "opts": ["「自分はできると根拠なく信じること」", "「過去の経験と現在の努力を根拠に可能性を信じること」", "「他者が信じてくれているから信じること」", "「信じると決めたから信じること」"], "scores": [3, 5, 3, 3], "exp": "根拠なき信念・他者依存・決意はどれも外発的で不安定です。「過去の経験と現在の努力を根拠に可能性を信じる」という実証的な自己への信頼がRQ自己効力感の最も成熟した形です。"}, {"cat": "自己効力感", "text": "今、仕事で「うまくいかないのは自分が弱いから」\nという思いが浮かんでいる。\n今のあなたはその思いをどう扱っている？", "opts": ["「その通りだ、強くならなければ」", "「弱いという評価の根拠は何か」を検証している", "「弱くて当然だ」と受け入れている", "「そんなことはない」と否定している"], "scores": [1, 5, 3, 2], "exp": "「その通りだ」は自己批判の固定化。「弱くて当然」は諦め。「そんなことはない」は否定による抑圧。「弱いという評価の根拠は何か」を検証することが、感情的な自己評価を現実に基づかせる自己効力感の実践です。"}, {"cat": "楽観的思考", "text": "今のあなたは、逆境を経験したことが\n「自分の強さの根拠」になっていると感じられる？", "opts": ["全くそう感じられない", "「あの経験があるから今の自分がある」と少し感じている", "「強さの根拠」とまでは思えないが、経験として残っている", "「あの経験のおかげだ」と自然に思える"], "scores": [1, 5, 4, 4], "exp": "「あの経験があるから今の自分がある」という統合的な意味づけが過去の困難を未来の楽観性の根拠に変えます。強さの根拠として実感できることがRQ楽観的思考の深さです。"}, {"cat": "原因分析", "text": "今、チームで起きた問題の原因を話し合っている。\n今のあなたが会議に持ち込む視点は？", "opts": ["「誰が何をすべきだったか」", "「何がこのシステムやプロセスを機能させなかったか」", "「次にどう改善するか」", "「外部要因がどれだけ影響したか」"], "scores": [2, 5, 3, 3], "exp": "「誰が」は犯人探しです。「次にどう改善するか」は原因を飛ばした解決。「外部要因」は一側面だけ。「何がシステムやプロセスを機能させなかったか」という構造的な視点が最も再発防止につながる原因分析です。"}, {"cat": "原因分析", "text": "今のあなたは、失敗の原因を\n「自分の中」と「外部」のどちらに見がち？\nそのバランスについて、今どう思っている？", "opts": ["「自分の中」に見がちで、もう少し外部要因も見るべきかも", "「外部」に見がちで、もう少し自分の部分も見るべきかも", "バランスよく見られていると思う", "原因をどちらに見るかあまり意識していない"], "scores": [4, 4, 5, 2], "exp": "「バランスよく見られている」という認識と「どちらかに偏っている」という自覚はどちらも重要な自己観察です。重要なのはどちらが正しいかではなく、自分のパターンを知っていることです。"}, {"cat": "原因分析", "text": "今、「自分が思っていたより問題は複雑だった」と気づいた。\n今のあなたはどうしている？", "opts": ["「複雑なら仕方ない」と受け入れる", "「何が複雑にしているのか」の要素を分解する", "「誰かに相談しよう」と外部リソースを探す", "「シンプルに考えよう」と複雑さを減らす"], "scores": [3, 5, 3, 3], "exp": "「仕方ない」は問題の放棄。「シンプルに」は複雑さの無視。「相談」は有効ですが分析は自分が担う必要があります。「何が複雑にしているかを分解する」という構造化が複雑な問題の原因分析の入口です。"}, {"cat": "自己効力感", "text": "今のあなたが「自分はこの仕事に向いている」と\n感じられる根拠は？", "opts": ["「得意だと思っているから」", "「うまくいった具体的な場面や経験がある」", "「周りに向いていると言われているから」", "「好きだから向いているはず」"], "scores": [3, 5, 3, 3], "exp": "「得意だと思う」「好きだから」「周りが言う」はどれも不安定な根拠です。「うまくいった具体的な場面や経験」という実証的な根拠が最も信頼できる自己効力感の基盤です。"}, {"cat": "自己効力感", "text": "今、大きなプレッシャーの下にいる。\n今のあなたが自分を支えているのは何？", "opts": ["「なんとかなる」という感覚", "「今まで似たプレッシャーを乗り越えてきた」という記憶", "周囲からの期待と応援", "「やるしかない」という状況の強制力"], "scores": [3, 5, 3, 3], "exp": "感覚・期待・強制はどれも外発的・不安定です。「今まで乗り越えてきた記憶」という自分の実績が最も安定した自己効力感の内的なサポートです。"}, {"cat": "自己効力感", "text": "今のあなたは、1年前の自分と比べて\n「できること」がどれくらい変化していると感じている？", "opts": ["あまり変化していない気がする", "具体的に「あれができるようになった」と言える変化がある", "良くなっているのか悪くなっているのか分からない", "変化を考えたことがない"], "scores": [2, 5, 2, 2], "exp": "「具体的に言える変化がある」という自己観察が自己効力感の根拠を積み上げる最も実践的な方法です。変化を具体的に言語化できることが成長を実感に変える力です。"}, {"cat": "自己効力感", "text": "今のあなたは、誰かから「あなたならできる」と\n言われた時、どう受け取っている？", "opts": ["「社交辞令かも」と半信半疑", "「本当にそう思うかは分からないが、参考にする」", "「そう言ってもらえると嬉しい」", "「自分でもそう思う」と一致感がある"], "scores": [3, 4, 3, 5], "exp": "「社交辞令」は他者の言葉を否定します。「嬉しい」は感情的反応。「参考にする」は適度です。「自分でもそう思う」という一致感が、他者の言葉が自己効力感の根拠として機能している最も健全な状態です。"}, {"cat": "自己効力感", "text": "今、自信が持てない仕事に挑戦しようとしている。\n今のあなたが踏み出せる理由は？", "opts": ["「失敗してもいい」という開き直り", "「過去の挑戦で得た経験が今回も使える」という実感", "「応援してくれる人がいる」という安心感", "「挑戦しないと後悔する」という恐れ"], "scores": [3, 5, 4, 3], "exp": "開き直り・恐れはどちらも感情的な動機です。応援も有効ですが外発的。「過去の経験が今回も使える」という実感が最も根拠のある自己効力感に基づいた踏み出す理由です。"}, {"cat": "自己効力感", "text": "今のあなたは、「自分への信頼」を\nどうやって日常的に育てている？", "opts": ["特に意識していない", "小さな約束を自分自身に守ることを積み重ねている", "自己啓発の本や学習で知識を増やしている", "ポジティブな言葉を意識的に使うようにしている"], "scores": [2, 5, 3, 3], "exp": "本・知識・ポジティブな言葉は補助的です。「小さな約束を自分自身に守る」という行動の積み重ねが、自分への信頼（自己効力感）を実証的に育てる最も本質的な日常的実践です。"}];

  {min:48,label:'平均的な RQ',desc:'回復力指数は一般的な水準です。特定のカテゴリに意識を向けることで大きな成長が見込まれます。'},
  {min:0,label:'成長の余地あり',desc:'回復力を高めることで、ストレス・困難からの立ち直りの質が大きく改善する可能性があります。'},
];
const CAT_COMMENTS={
  '感情の調整':{hi:'感情を認識・処理しながら機能し続ける力が高く、困難の中でも感情と行動を両立できています。',mid:'感情調整の意識はあります。「感情が出た後の振り返り」を習慣化するとさらに深まります。',lo:'まず「今自分はどんな感情の状態にあるか」を一日一回確認する習慣から始めましょう。'},
  '楽観的思考':{hi:'根拠のある希望を持ち、困難の中にも可能性を見出して前進できています。',mid:'楽観性はあります。「なぜ変わると思えるか」という根拠を言語化する練習でさらに深まります。',lo:'まず過去に乗り越えた困難を一つ振り返り「なぜ乗り越えられたか」を具体的に考える習慣から始めましょう。'},
  '原因分析':{hi:'困難の原因を正確・多角的に分析し、再発防止と学習につなげられています。',mid:'原因分析はある程度できています。「自責・他責・状況」の三つを毎回確認する習慣でさらに深まります。',lo:'まず問題が起きた時に「原因は一つだけではないかもしれない」と立ち止まる習慣から始めましょう。'},
  '自己効力感':{hi:'「自分にはできる」という根拠のある確信を持ち、困難でも主体的に動けています。',mid:'自己効力感はある程度あります。「小さな成功体験」を意識的に記録することでさらに強化されます。',lo:'まず今日達成した小さなことを一つ見つけて記録する習慣から始めましょう。'}
};

// ═══════════════════════════════════════════════════════════
//  定数・状態
// ═══════════════════════════════════════════════════════════
const PER_SESSION=20,CAT_PER=5;
const STORAGE_KEY='rq_test_results_v1';
const GAS_URL='https://script.google.com/macros/s/AKfycbzRKMVdPcDS0bUschN29ITAL9Twa1rp7NZWHK1wnDsFCslzNLKxzbKHwymDMKeliy1lQA/exec';
let questions=[],cur=0,totalScore=0,elapsed=0,startTime=0,timerID=null,catScores={},currentName='';

function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ★ 選択肢と点数をセットでシャッフル
function shuffleOpts(q){
  const pairs=shuffle(q.opts.map((o,i)=>({o,s:q.scores[i]})));
  return {...q,opts:pairs.map(p=>p.o),scores:pairs.map(p=>p.s)};
}

function pickQuestions(){
  const cats=[...new Set(BANK.map(q=>q.cat))];
  let sel=[];
  cats.forEach(c=>{const pool=shuffle(BANK.filter(q=>q.cat===c));sel.push(...pool.slice(0,CAT_PER));});
  return shuffle(sel).map(q=>shuffleOpts(q));
}

function show(id){['s-intro','s-test','s-result'].forEach(s=>{document.getElementById(s).style.display=(s===id?'block':'none');});}
function fmtDate(iso){const d=new Date(iso);return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function loadResults(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch{return[];}}
function saveResult(r){const all=loadResults();all.push(r);localStorage.setItem(STORAGE_KEY,JSON.stringify(all));}
async function sendToServer(record){
  try{await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(record)});return true;}
  catch(e){return false;}
}

function showIntro(){
  const all=loadResults();
  const urlName=new URLSearchParams(window.location.search).get('name')||'';
  const storedName=localStorage.getItem('test_player_name')||'';
  const recentName=urlName||storedName||(all.length?all[all.length-1].name:'');
  const histHTML=all.length===0?`<p class="hist-empty">まだ記録がありません</p>`
    :all.slice().reverse().slice(0,5).map(r=>`
      <div class="hist-item">
        <span class="hist-eq">${r.eq}</span>
        <div class="hist-meta"><div class="hist-name">${r.name}</div><div class="hist-date">${fmtDate(r.date)}</div></div>
        <div class="hist-score">${r.score}/${PER_SESSION*5}点<br><span style="color:var(--text3);font-size:11px">${r.level}</span></div>
      </div>`).join('');

  document.getElementById('s-intro').innerHTML=`
    <div class="card">
      <div class="intro-header">
        <div class="intro-logo">🌱</div>
        <div>
          <div class="intro-title">RQ テスト</div>
          <div class="intro-sub">回復力指数テスト（Resilience Quotient）</div>
        </div>
      </div>
      <div class="meta-grid">
        <div class="meta-box"><div class="meta-n">${PER_SESSION}</div><div class="meta-l">出題数</div></div>
        <div class="meta-box"><div class="meta-n">100</div><div class="meta-l">満点</div></div>
        <div class="meta-box"><div class="meta-n">4択</div><div class="meta-l">回答形式</div></div>
      </div>
      <div class="cats-row"><span class="cat-pill">感情の調整</span><span class="cat-pill">楽観的思考</span><span class="cat-pill">原因分析</span><span class="cat-pill">自己効力感</span></div>
      <div class="notice-box">
        ✔ 選択肢の順番は毎回ランダムです<br>
        ✔ 点数は最後まで表示されません<br>
        ✔ <strong>「正しそう」ではなく「実際の自分」を選んでください</strong><br>
        ✔ どれも正解に見える問題が多いです
      </div>
      <div class="name-section">
        <div class="name-row-input">
          <span class="name-label">名前</span>
          <input class="name-input" id="name-input" type="text" maxlength="30" placeholder="山田 太郎"
            value="${recentName.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}"
            oninput="document.getElementById('name-err').style.display='none'"
            onkeydown="if(event.key==='Enter')startTest()">
        </div>
        <p id="name-err" class="name-error">名前を入力してください</p>
      </div>
      <button class="btn-primary" onclick="startTest()">テストを開始する →</button>
    </div>
    <div class="card-sm">
      <div class="hist-hdr">
        <span class="hist-ttl">過去の記録${all.length?`（${all.length}件）`:''}</span>
        ${all.length?`<button class="btn-sm" onclick="exportCSV()">CSV出力</button>`:''}
      </div>
      ${histHTML}
    </div>
    <p class="note-sm">このテストは簡易的な目安です。正式な評価は専門家にご相談ください。<br>Created by S.O.Y</p>`;
  show('s-intro');
}

function startTest(){
  const input=document.getElementById('name-input');
  const name=(input?input.value:'').trim();
  if(!name){const err=document.getElementById('name-err');if(err)err.style.display='block';input&&input.focus();return;}
  currentName=name;questions=pickQuestions();cur=0;totalScore=0;elapsed=0;catScores={};
  questions.forEach(q=>{if(!catScores[q.cat])catScores[q.cat]=0;});
  startTime=Date.now();show('s-test');
  timerID=setInterval(()=>{elapsed=Math.floor((Date.now()-startTime)/1000);const t=document.getElementById('timer-el');if(t)t.textContent=fmt(elapsed);},500);
  renderQ();
}

function renderQ(){
  const q=questions[cur];
  const pct=Math.round((cur/PER_SESSION)*100);
  const lbls=['A','B','C','D'];
  document.getElementById('s-test').innerHTML=`
    <div class="test-hdr">
      <div class="hdr-row">
        <span class="q-label">問題 ${cur+1} <span style="color:var(--text3)">/ ${PER_SESSION}</span></span>
        <span class="timer" id="timer-el">${fmt(elapsed)}</span>
      </div>
      <div class="sub-row">
        <span class="name-badge">${currentName}</span>
        <span style="font-size:11px;color:var(--text3)">${q.cat}</span>
      </div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-card">
      <span class="cat-badge">${q.cat}</span>
      <p class="q-text">${q.text}</p>
    </div>
    <div class="opts" id="opts-area">
      ${q.opts.map((o,i)=>`
        <button class="opt" onclick="answer(${i})">
          <span class="opt-lbl">${lbls[i]}</span>
          <span style="flex:1">${o}</span>
        </button>`).join('')}
    </div>
    <div id="expl-area"></div>`;
}

function answer(idx){
  const q=questions[cur];
  const pts=q.scores[idx];
  totalScore+=pts;catScores[q.cat]=(catScores[q.cat]||0)+pts;
  document.querySelectorAll('.opt').forEach((b,i)=>{b.classList.add('disabled');if(i===idx)b.classList.add('selected');});
  // ★ 点数は非表示・解説のみ
  document.getElementById('expl-area').innerHTML=`
    <div class="expl">${q.exp}</div>
    <div class="next-wrap">
      <button class="btn-ghost" onclick="nextQ()">${cur+1<PER_SESSION?'次の問題へ →':'結果を見る →'}</button>
    </div>`;
}

function nextQ(){
  cur++;
  if(cur>=PER_SESSION){clearInterval(timerID);elapsed=Math.floor((Date.now()-startTime)/1000);showResult();}
  else renderQ();
}

function showResult(){
  const eq=totalScore;
  const lvl=LEVELS.find(l=>eq>=l.min)||LEVELS[LEVELS.length-1];
  const catMax=CAT_PER*5;
  const catResults=Object.entries(catScores).map(([cat,sc])=>({
    cat,sc,pct:Math.round((sc/catMax)*100),
    comment:sc/catMax>=0.8?CAT_COMMENTS[cat].hi:sc/catMax>=0.6?CAT_COMMENTS[cat].mid:CAT_COMMENTS[cat].lo
  }));
  const catBreakdown={};catResults.forEach(r=>{catBreakdown[r.cat]={score:r.sc,max:catMax,pct:r.pct};});
  const record={testType:'RQ',name:currentName,eq,score:totalScore,maxScore:PER_SESSION*5,acc:Math.round((totalScore/(PER_SESSION*5))*100),secs:elapsed,level:lvl.label,date:new Date().toISOString(),catBreakdown};
  saveResult(record);
  sendToServer(record).then(ok=>{
    const el=document.getElementById('save-status');
    if(el)el.innerHTML=ok
      ?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Googleスプレッドシートに送信しました'
      :'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ローカルに保存（送信失敗）';
  });
  document.getElementById('s-result').innerHTML=`
    <div class="card">
      <div class="result-hero">
        <p class="result-name">${currentName} さんの結果</p>
        <div class="eq-ring"><span class="eq-lbl-sm">RQ</span><span class="eq-val">${eq}</span></div>
        <h2 class="result-title">${lvl.label}</h2>
        <p class="result-desc">${lvl.desc}</p>
        <div id="save-status" class="save-notice">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          送信中...
        </div>
      </div>
      <div class="stats">
        <div class="stat-box"><div class="stat-n">${eq}</div><div class="stat-l">RQスコア（/100）</div></div>
        <div class="stat-box"><div class="stat-n">${Math.round((totalScore/(PER_SESSION*5))*100)}%</div><div class="stat-l">達成率</div></div>
        <div class="stat-box"><div class="stat-n">${fmt(elapsed)}</div><div class="stat-l">所要時間</div></div>
      </div>
    </div>
    <div class="card">
      <p class="bkdn-ttl">カテゴリ別スコアと改善ポイント</p>
      ${catResults.map(r=>`
        <div class="cat-result">
          <div class="cat-result-row">
            <span class="cat-name">${r.cat}</span>
            <span class="cat-pts">${r.sc}/${catMax}点（${r.pct}%）</span>
          </div>
          <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${r.pct}%"></div></div>
          <p class="cat-comment">${r.comment}</p>
        </div>`).join('')}
    </div>
    <div class="retry-wrap">
      <button class="btn-primary" onclick="startTest()">もう一度挑戦する（新しい20問）→</button>
      <button class="btn-ghost" onclick="exportCSV()">結果をCSVでダウンロード</button>
      <button class="btn-ghost" onclick="showIntro()">トップへ戻る</button>
      <button class="btn-ghost" onclick="goToResults()">📊 結果をまとめて確認する →</button>
    </div>
    <p class="note-sm" style="margin-top:12px">※このテストは簡易的な目安です。正式な評価は専門家にご相談ください。<br>Created by S.O.Y</p>`;
  show('s-result');
}

function goToResults(){
  const name = currentName || localStorage.getItem('test_player_name') || '';
  window.location.href = 'results.html' + (name ? '?name=' + encodeURIComponent(name) : '');
}
function exportCSV(){
  const all=loadResults();if(!all.length){alert('まだ記録がありません。');return;}
  const header='名前,RQスコア,達成率(%),所要時間(秒),レベル,実施日時';
  const rows=all.map(r=>[`"${(r.name||'').replace(/"/g,'""')}"`,r.eq,r.acc,r.secs,`"${(r.level||'').replace(/"/g,'""')}"`,`"${fmtDate(r.date)}"`].join(','));
  const csv='\uFEFF'+header+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`RQテスト結果_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

showIntro();
</script>
</body>
</html>
