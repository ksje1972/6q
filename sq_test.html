<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQテスト（社会的知性テスト）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
  --text:#1a1a18;--text2:#6b6b66;--text3:#9a9a94;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --accent:#166534;--accent-bg:#DCFCE7;--accent-border:rgba(22,101,52,0.3);
  --success:#2d7a3a;--success-bg:#eef6f0;--success-border:rgba(45,122,58,0.3);
  --info-bg:#eef3fb;--info-border:rgba(40,80,160,0.25);--info:#1a4fa0;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252522;--bg3:#2e2e2b;
  --text:#f0f0ec;--text2:#a0a09a;--text3:#686862;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --accent:#86EFAC;--accent-bg:rgba(22,101,52,0.15);--accent-border:rgba(134,239,172,0.4);
  --success:#4caf60;--success-bg:rgba(76,175,96,0.12);--success-border:rgba(76,175,96,0.35);
  --info-bg:rgba(60,100,200,0.12);--info-border:rgba(100,150,255,0.3);--info:#7aaaff;
}}
body{background:var(--bg3);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  padding:24px 16px 60px}
#app{width:100%;max-width:560px}
.screen{animation:fi .28s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* カード */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:12px}
.card-sm{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px}

/* イントロ ヘッダー */
.intro-header{display:flex;align-items:center;gap:14px;padding-bottom:18px;
  border-bottom:0.5px solid var(--border);margin-bottom:20px}
.intro-logo{width:52px;height:52px;border-radius:50%;background:var(--accent-bg);
  border:0.5px solid var(--accent-border);display:flex;align-items:center;
  justify-content:center;font-size:26px;flex-shrink:0}
.intro-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:3px}
.intro-sub{font-size:11px;color:var(--accent);font-weight:500;letter-spacing:.4px}

/* メタグリッド */
.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.meta-box{background:var(--bg2);border-radius:var(--radius);padding:12px 8px;text-align:center}
.meta-n{font-size:18px;font-weight:700;color:var(--accent)}.meta-l{font-size:10px;color:var(--text3);margin-top:2px}

/* カテゴリピル */
.cats-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.cat-pill{font-size:11px;padding:3px 10px;border-radius:100px;
  background:var(--accent-bg);color:var(--accent);border:0.5px solid var(--accent-border)}

/* 注意書き */
.notice-box{background:var(--accent-bg);border:0.5px solid var(--accent-border);
  border-radius:var(--radius);padding:12px 14px;font-size:12px;color:var(--accent);
  margin-bottom:18px;line-height:1.75}

/* 名前入力 */
.name-section{margin-bottom:16px}
.name-row-input{display:flex;align-items:center;gap:10px;padding:11px 14px;
  border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2)}
.name-row-input:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.name-label{font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0}
.name-input{flex:1;border:none;outline:none;font-size:15px;background:transparent;
  color:var(--text);font-family:inherit}
.name-input::placeholder{color:var(--text3)}
.name-error{font-size:12px;color:#c0392b;margin-top:6px;display:none}

/* ボタン */
.btn-primary{display:block;width:100%;padding:14px;background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius);font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-primary:hover{opacity:.85}.btn-primary:active{transform:scale(.98)}
.btn-ghost{display:block;width:100%;padding:12px;background:var(--bg);color:var(--text);
  border:0.5px solid var(--border2);border-radius:var(--radius);font-size:14px;
  font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-ghost:hover{background:var(--bg2)}.btn-ghost:active{transform:scale(.98)}
.btn-sm{padding:5px 10px;background:var(--bg);color:var(--text2);
  border:0.5px solid var(--border2);border-radius:var(--radius);
  font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-sm:hover{background:var(--bg2)}

/* 履歴 */
.hist-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hist-ttl{font-size:12px;font-weight:500;color:var(--text2)}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 0;
  border-bottom:0.5px solid var(--border);font-size:13px}
.hist-item:last-child{border-bottom:none}
.hist-eq{font-size:18px;font-weight:700;color:var(--accent);min-width:36px}
.hist-meta{flex:1;min-width:0}
.hist-name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-date{font-size:11px;color:var(--text3);margin-top:1px}
.hist-score{font-size:12px;color:var(--text2);text-align:right;white-space:nowrap;flex-shrink:0}
.hist-empty{font-size:13px;color:var(--text3);padding:12px 0;text-align:center}

/* テスト画面 */
.test-hdr{margin-bottom:14px}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.q-label{font-size:13px;color:var(--text2)}
.timer{font-size:12px;font-variant-numeric:tabular-nums;color:var(--text2);
  background:var(--bg2);padding:3px 10px;border-radius:100px;border:0.5px solid var(--border)}
.sub-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.name-badge{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.pbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:2px}
.pfill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}

/* 問題カード */
.q-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:10px}
.cat-badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;
  font-weight:500;margin-bottom:10px;background:var(--accent-bg);
  color:var(--accent);border:0.5px solid var(--accent-border)}
.q-text{font-size:15px;line-height:1.85;white-space:pre-line;color:var(--text)}
.opts{display:grid;gap:7px;margin-bottom:8px}
.opt{text-align:left;padding:12px 14px;background:var(--bg);border:0.5px solid var(--border);
  border-radius:var(--radius);font-size:14px;cursor:pointer;color:var(--text);
  display:flex;align-items:flex-start;gap:11px;font-family:inherit;
  transition:background .12s,border-color .12s;width:100%;line-height:1.6}
.opt:hover:not(.disabled){background:var(--accent-bg);border-color:var(--accent-border)}
.opt.selected{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.opt.disabled{cursor:default;pointer-events:none}
.opt-lbl{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;
  flex-shrink:0;background:var(--bg2);color:var(--text2);margin-top:1px}
.opt.selected .opt-lbl{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.expl{font-size:13px;padding:11px 14px;background:var(--accent-bg);
  border:0.5px solid var(--accent-border);border-radius:var(--radius);
  margin-top:8px;color:var(--accent);line-height:1.7;animation:fi .2s ease}
.next-wrap{margin-top:8px}

/* 結果画面 */
.result-hero{text-align:center;padding:20px 0 16px}
.result-name{font-size:13px;color:var(--text2);margin-bottom:10px}
.eq-ring{width:136px;height:136px;border-radius:50%;border:2.5px solid var(--accent);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 12px;background:var(--bg2)}
.eq-lbl-sm{font-size:10px;color:var(--text2);letter-spacing:.5px;margin-bottom:2px}
.eq-val{font-size:46px;font-weight:700;color:var(--accent);line-height:1}
.result-title{font-size:20px;font-weight:700;margin-bottom:8px}
.result-desc{font-size:13px;color:var(--text2);line-height:1.75;max-width:380px;margin:0 auto}
.save-notice{display:flex;align-items:center;gap:8px;font-size:11px;padding:9px 12px;
  background:var(--info-bg);border:0.5px solid var(--info-border);
  border-radius:var(--radius);color:var(--info);margin-top:12px}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.stat-box{background:var(--bg2);border-radius:var(--radius);padding:12px;text-align:center}
.stat-n{font-size:20px;font-weight:700;color:var(--accent)}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px}
.bkdn-ttl{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;
  letter-spacing:.3px;text-transform:uppercase}
.cat-result{padding:11px 0;border-bottom:0.5px solid var(--border)}
.cat-result:last-child{border-bottom:none}
.cat-result-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.cat-name{font-size:13px;font-weight:500;flex:1}
.cat-pts{font-size:12px;color:var(--accent);font-weight:600;white-space:nowrap}
.cat-bar-wrap{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.cat-bar-fill{height:100%;background:var(--accent);border-radius:3px}
.cat-comment{font-size:12px;color:var(--text3);margin-top:5px;line-height:1.6}
.retry-wrap{display:grid;gap:8px}
.note-sm{font-size:11px;color:var(--text3);text-align:center;line-height:1.7}
</style>
</head>
<body>
<div id="app">
  <div id="s-intro" class="screen"></div>
  <div id="s-test"  class="screen" style="display:none"></div>
  <div id="s-result" class="screen" style="display:none"></div>
</div>
<script>
// ═══════════════════════════════════════════════════════════
//  問題バンク（100問）
//
//  設計方針：
//  ・4択すべてが「普通の人が選びそうな行動」として書く
//  ・EQの落とし穴を仕込む
//    例）「いつもポジティブでいる」→感情抑圧で低スコア
//       「相手のために我慢する」→自己管理ではなく回避
//       「すぐ謝る」→反射的謝罪は自己認識の欠如
//       「共感してあげる」→主語が「あげる」は上から目線
//  ・点数差は微妙にする（5-4-3-2 でなく 5-4-4-3 も多用）
//  ・正解が「地味で当たり前」に見えるものを多く含める
// ═══════════════════════════════════════════════════════════
const BANK=[{"cat": "社会的認識", "text": "会議で発言が少ないメンバーがいる。\nあなたの最初の内的反応は？", "opts": ["「内向的な人なんだろう」と性格で解釈する", "「何か言いにくい事情があるかも」と背景を想像する", "「準備不足なのかも」と能力で解釈する", "「今日は調子が悪いのかも」と体調で解釈する"], "scores": [2, 5, 3, 3], "exp": "性格・能力・体調はどれも「解釈」で止まっています。「何か言いにくい事情がある」という視点は、集団のダイナミクスや心理的安全性を視野に入れた社会的認識の深さです。"}, {"cat": "社会的認識", "text": "いつも明るい同僚が今日は元気がない。\n気づくのはいつ？", "opts": ["顔色や声のトーンですぐに気づく", "話の内容が少ないと気づく", "他のメンバーに指摘されて気づく", "本人から「実は…」と話して気づく"], "scores": [5, 4, 2, 2], "exp": "非言語サイン（顔色・声のトーン）から早期に察知できることが社会的認識の鋭敏さです。話の内容は言語情報に頼っており、気づくタイミングが遅くなります。"}, {"cat": "社会的認識", "text": "会議のテーマが変わった途端に場の空気が重くなった。\nどう対応する？", "opts": ["空気を変えるために明るい話題を振る", "空気が変わった原因を観察してから次の行動を考える", "議題を進めながら様子を見る", "ファシリテーターに任せる"], "scores": [3, 5, 4, 3], "exp": "「空気を変える」は行動ですが、原因を理解しないまま動くと的外れになります。まず「何がこの空気を作ったか」を観察することが社会的認識の基本です。"}, {"cat": "社会的認識", "text": "初対面の相手と話す時、どの情報に最も多くの注意を向けている？", "opts": ["相手が話している内容", "相手の表情・声のトーン・姿勢などの非言語情報", "相手が選ぶ話題", "会話の間合いや沈黙のタイミング"], "scores": [3, 4, 4, 5], "exp": "「会話の間合いや沈黙」は文化・関係性・感情状態が最も反映される情報です。非言語情報も重要ですが、間合いはさらに繊細な社会的読解力を示します。"}, {"cat": "社会的認識", "text": "プレゼン中に聴衆の集中力が落ちてきた気がする。\n何で気づく？", "opts": ["誰も質問してこなくなる", "表情・姿勢・視線の変化をリアルタイムで感じ取る", "発言者が増える", "後でアンケートに「難しかった」と書かれる"], "scores": [3, 5, 4, 2], "exp": "リアルタイムの非言語観察が社会的認識の実践力です。質問の有無は「理解度の欠如」より「参加の意欲」を反映します。"}, {"cat": "社会的認識", "text": "電話会議で参加者の一人の話し方が普段と違う。\nどう察知する？", "opts": ["内容が本題からずれていると気づく", "声のトーン・言葉の選び方から状態を推測する", "他の参加者の反応で気づく", "直接「何かあった？」と聞く"], "scores": [3, 5, 3, 3], "exp": "視覚情報のない電話会議でも「声のトーンと言葉の選び方」から状態を読み取れることが社会的認識の応用力です。"}, {"cat": "社会的認識", "text": "交渉相手が「それでいいと思います」と言いながら、\n少し表情が固い。どう解釈する？", "opts": ["言葉通り了解と受け取って次に進む", "言語と非言語のズレから本音が違うかもしれないと読む", "「疲れているんだろう」と別の理由に帰す", "「細かいことが気になる性格なんだろう」と性格で説明する"], "scores": [2, 5, 3, 3], "exp": "言語と非言語のズレを読み取れることが社会的認識の精度です。「性格」「疲れ」への帰属は観察を止める解釈です。"}, {"cat": "社会的認識", "text": "上司が特定のメンバーだけ会議後に個別で話しかけている。\nどう認識する？", "opts": ["仕事上の必要で話しているだけ", "組織内の力関係や優遇の偏りを観察する", "プライベートな話をしているだけ", "上司の好みの問題"], "scores": [3, 5, 3, 2], "exp": "組織内の権力ダイナミクスや関係性の偏りを客観的に観察できることが社会的認識の組織的な側面です。"}, {"cat": "社会的認識", "text": "会食の席で一人だけお酒を全く飲まない人がいる。\nどう察する？", "opts": ["健康的な人なんだと思う", "宗教・医療・個人的な理由があると察して自然に配慮する", "飲めない体質なんだと思う", "運転があるんだと思う"], "scores": [3, 5, 3, 3], "exp": "単一の理由に収束させるのではなく「何か理由があると察する」ことが社会的認識の繊細さです。配慮は理由を特定しなくても可能です。"}, {"cat": "社会的認識", "text": "チームの活気が以前より明らかに落ちている。\n最初に何をする？", "opts": ["チームビルディングのイベントを企画する", "変化の原因を個々の言動から観察して把握する", "上司に状況を報告する", "「最近どう？」とメンバー全員に声をかける"], "scores": [3, 5, 3, 4], "exp": "「全員に声をかける」は良い行動ですが、原因を観察・把握する前の行動は的外れになるリスクがあります。まず読む→動くの順序が社会的認識です。"}, {"cat": "社会的認識", "text": "会議で誰かが発言するたびに別の人が少し表情を変える。\n気づく？", "opts": ["会議の内容に集中していて気づかない", "二人の間に何か関係性の問題があるかもしれないと察する", "その人の癖だと思う", "誰でもそういう反応はすると思う"], "scores": [2, 5, 3, 3], "exp": "個人の癖として処理するか、関係性のシグナルとして読むかに社会的認識の深さが現れます。"}, {"cat": "社会的認識", "text": "自分が発言した後、場の空気が微妙に変わった気がした。\nどう対応する？", "opts": ["気にしない", "何が空気を変えたかを観察し、必要なら補足や確認をする", "続けて話す", "後で別の人に確認する"], "scores": [2, 5, 3, 3], "exp": "自分の発言が場に与えた影響を感知して適切に対応できることが社会的認識の双方向的な実践力です。"}, {"cat": "社会的認識", "text": "メールの返信が普段より短く素っ気ない。\n何を感じる？", "opts": ["忙しいんだろうと思う", "何か気になることがあるのかもしれないと感じる", "失礼な人だと感じる", "特に気にしない"], "scores": [3, 5, 2, 2], "exp": "文字コミュニケーションの変化から感情・状態の変化を察知する力が社会的認識の応用力です。"}, {"cat": "社会的認識", "text": "グループ内で特定の人だけがいつも話に加われていない。\nどう認識する？", "opts": ["その人が内向的", "グループのダイナミクスに何か排他的な動きがある", "話題に関心がない", "自分から発言しないだけ"], "scores": [2, 5, 3, 3], "exp": "個人の性格や意欲に帰すより、集団が生み出している構造を見ることが社会的認識の広さです。"}, {"cat": "社会的認識", "text": "クライアントの会議で、発言は少ないが全員から\n意見を求められる人がいる。その人は？", "opts": ["役職が高い", "集団の中で影響力を持つキーパーソン", "発言が的確な専門家", "ファシリテーター役"], "scores": [3, 5, 4, 3], "exp": "発言量ではなく「他者からどう扱われているか」を観察することがキーパーソンを見極める社会的認識の力です。"}, {"cat": "社会的認識", "text": "新入社員が会議中ずっと下を向いている。\n最も深い観察は？", "opts": ["スマホを見ている", "発言したいが言い出せない状態かもしれない", "疲れている", "内容を理解していない"], "scores": [3, 5, 3, 3], "exp": "行動の複数の意味を探る中で、「心理的安全性の問題」という観点を持てることが社会的認識の深さです。"}, {"cat": "社会的認識", "text": "チームで長く一緒に働いてきた人が最近「大丈夫です」\nばかり言うようになった。どう感じる？", "opts": ["本当に大丈夫なんだろうと受け取る", "「大丈夫」の裏に何かあるかもしれないと察する", "忙しいだけ", "自分に心を開かなくなった"], "scores": [2, 5, 3, 3], "exp": "言葉の表面より「変化のパターン」を読む力が社会的認識の継続的な観察力です。"}, {"cat": "社会的認識", "text": "会議で一人だけが常に最初に発言する。\nどう読む？", "opts": ["積極的で良いメンバー", "その人の影響力や他のメンバーへの心理的な影響を観察する", "会議の進行役", "発言が多い性格"], "scores": [3, 5, 3, 3], "exp": "個人の積極性として見るより「グループ全体のダイナミクスへの影響」を読む視点が社会的認識の組織的な深さです。"}, {"cat": "社会的認識", "text": "オンライン会議で特定の話題になると皆がカメラをオフにする。\n何を感じる？", "opts": ["通信が不安定", "その話題に対して心理的な距離が生まれている", "偶然", "個人の好みの問題"], "scores": [3, 5, 3, 2], "exp": "集団の行動パターンの変化から感情的な反応を読み取ることが社会的認識の集団的な読解力です。"}, {"cat": "社会的認識", "text": "二人のメンバーが最近廊下で立ち話をしなくなった。\n気づく？", "opts": ["気づかない", "関係性に何か変化があるかもしれないと察する", "仕事が忙しいだけ", "働き方が変わっただけ"], "scores": [2, 5, 3, 3], "exp": "日常的な行動パターンの微細な変化から対人関係の変化を察知できることが社会的認識の鋭敏さです。"}, {"cat": "社会的認識", "text": "クライアントへのプレゼン後、参加者の半数が\nすぐスマホを見始めた。どう解釈する？", "opts": ["仕事の連絡が多い人たちだった", "プレゼンへの関与が下がったサイン", "次の予定を確認している", "マナーの問題"], "scores": [3, 5, 3, 2], "exp": "集団的な行動の変化を「個人のマナー」ではなく「集団の関与度」のシグナルとして読む視点が社会的認識の実践です。"}, {"cat": "社会的認識", "text": "会議の議事録を後で読んだら、実際の場の雰囲気と\nかなり違う印象を受けた。なぜ？", "opts": ["議事録の書き方が悪かった", "言語情報だけでは場の感情的なダイナミクスが失われる", "内容は正確に記録されていた", "会議の記憶が曖昧だった"], "scores": [3, 5, 4, 3], "exp": "「言語情報だけでは感情的なダイナミクスが失われる」という認識自体が社会的認識の本質的な理解を示します。"}, {"cat": "社会的認識", "text": "チーム全員が賛成しているが、誰も積極的に意見を言っていない。\nどう読む？", "opts": ["本当に全員賛成", "賛成とも反対とも言えない空気になっている可能性がある", "議論が尽きた", "内容が明快で疑問がない"], "scores": [3, 5, 3, 3], "exp": "「全員賛成」の表面より「発言が出ない理由」を読む力が集団思考（グループシンク）を防ぐ社会的認識です。"}, {"cat": "社会的認識", "text": "上司が会議中に特定の人の意見だけに頷く。\nどう観察する？", "opts": ["その人の意見が正しいから", "上司の関心・好み・関係性のパターンを観察する", "偶然そのタイミングで頷いている", "議題への同意"], "scores": [3, 5, 3, 3], "exp": "上司の非言語的な反応パターンから関係性・影響力の構造を読む視点が社会的認識の組織的な側面です。"}, {"cat": "社会的認識", "text": "グループ全体が特定のメンバーの話だけ\n聞く態度が違う（より真剣になる）。これは何を示す？", "opts": ["その人の話が面白い", "その人がグループ内で影響力や信頼を持っている", "その人の話が専門的", "その人の発言が少ないから注目される"], "scores": [3, 5, 4, 3], "exp": "集団の反応パターンから個人の影響力・信頼の構造を読み取ることが社会的認識の組織把握力です。"}, {"cat": "共感的関心", "text": "部下が「最近少し疲れています」と言ってきた。\n最初の反応は？", "opts": ["「休暇を取るといいよ」と解決策を提案する", "「そうか、どんな感じ？もう少し聞かせて」と続きを引き出す", "「仕事は大丈夫？」と業務への影響を確認する", "「誰でも疲れるときはあるよね」と一般化して共感する"], "scores": [3, 5, 3, 3], "exp": "「誰でもある」は共感に見えますが相手の感情を薄めます。「解決策」は早すぎます。「もう少し聞かせて」が相手の感情への純粋な関心の表れです。"}, {"cat": "共感的関心", "text": "後輩が「自分には向いていないかも」と打ち明けた。\n最初に何を言う？", "opts": ["「そんなことない、できているよ」と否定する", "「どんな場面でそう感じた？」と具体的に聞く", "「向いている・いないは経験で変わるよ」と励ます", "「何がそんなに難しいの？」と原因を探る"], "scores": [2, 5, 3, 4], "exp": "「そんなことない」は相手の感覚を否定します。「何が難しい？」は問題解決志向で早すぎます。「どんな場面で？」が感情を理解しようとする姿勢です。"}, {"cat": "共感的関心", "text": "メンバーが重要なプレゼンで失敗して落ち込んでいる。\n声かけは？", "opts": ["「次回に活かそう、どこを改善する？」と前に向ける", "「大変だったね、今どんな気持ち？」と感情を受け止める", "「あの質問は難しかったね」と状況を代わりに評価する", "「みんなそういう経験をするよ」と普遍化して励ます"], "scores": [3, 5, 3, 3], "exp": "改善策は早すぎます。「みんなそういう経験を」は共感に見えますが個人の感情を薄めます。まず「今どんな気持ち？」と受け止めることが共感的関心です。"}, {"cat": "共感的関心", "text": "クライアントが「本当に困っているんです」と言ってきた。\n最初の対応は？", "opts": ["「それはどういう状況ですか？」と状況を詳しく聞く", "「何が一番つらいですか？」と感情の核心に触れる", "「解決策を一緒に考えましょう」と前向きに進める", "「ご安心ください、対応します」と安心させる"], "scores": [4, 5, 3, 3], "exp": "状況の確認も大切ですが、「困っている」という感情表現に対してまず「何が一番つらいか」を聞くことが感情への純粋な関心です。"}, {"cat": "共感的関心", "text": "同僚が「最近なんかしんどくて」と話してきた。\nどう返す？", "opts": ["「運動するといいよ」と生活改善を提案する", "「しんどいんだね、どんな感じ？」と受け止めてから聞く", "「私も忙しくてさ」と自分の話をして共感を示す", "「ゆっくり休んでね」と短く返す"], "scores": [2, 5, 3, 3], "exp": "「私も忙しい」は共感のようで話の主語を自分に移します。「ゆっくり休んで」は感情を受け取らずに終わらせます。「どんな感じ？」が相手への関心の表れです。"}, {"cat": "共感的関心", "text": "プロジェクトが終わった直後にメンバーへの言葉は？", "opts": ["「お疲れ様でした、次のプロジェクトもよろしく」", "「本当にお疲れ様でした。特に大変だったことはありましたか？」", "「成果を振り返りましょう、良かった点は何ですか？」", "「ゆっくり休んでください」"], "scores": [2, 5, 3, 3], "exp": "成果の振り返りや次の案内は大切ですが、まずメンバーの感情的な経験への関心を示すことが共感的関心の深さです。"}, {"cat": "共感的関心", "text": "相手が話している途中で「あ、それって○○ですよね」\nと先取りしたくなった。どうする？", "opts": ["「それって○○ですよね？」と先取りして確認する", "「そうなんですね」と頷きながら最後まで聴く", "「つまりこういうこと？」と要約して理解を確かめる", "「そういえば私も…」と関連する自分の経験を話す"], "scores": [3, 4, 4, 2], "exp": "先取りは相手の話を止め自分のペースに持ち込みます。自分の経験を話すのは共感ですが主語が変わります。最後まで聴くことが相手の感情への最大の関心です。"}, {"cat": "共感的関心", "text": "誰かが「誰もわかってくれない」と言った。\nどう応じる？", "opts": ["「私はわかるよ、実は私も…」と自分の経験を話す", "「そう感じているんだね。どんなことがあったの？」と聴く", "「そんなことないよ、みんな気にかけてるよ」と否定する", "「それは辛いね、誰に相談してみた？」と解決策を探る"], "scores": [3, 5, 2, 3], "exp": "自分の経験を話すのは親近感を示しますが主語が変わります。否定は相手の感覚を無効化します。「どんなことがあったの？」が相手への純粋な関心の入口です。"}, {"cat": "共感的関心", "text": "長時間働き続けているメンバーを見た。\n声かけのタイミングと内容は？", "opts": ["仕事が一段落したタイミングで「大丈夫？無理しないでね」", "作業中に「何か手伝えることある？」と聞く", "仕事が終わったら「お疲れ様」と声をかける", "本人から何か言うまで待つ"], "scores": [3, 5, 3, 2], "exp": "「大丈夫？無理しないで」は相手の感情に近いですが、「何か手伝えることある？」はより具体的で相手のニーズに焦点を当てた関心の表れです。"}, {"cat": "共感的関心", "text": "後輩が「自分の意見って的外れなのかな」と言ってきた。\n最初の返し方は？", "opts": ["「そんなことないよ、さっきの意見もよかったじゃない」と即座に否定", "「なぜそう感じたの？」と感じた経験を聞く", "「みんな最初はそう思うよ」と正常化して安心させる", "「どの意見のこと？」と具体的な場面を確認する"], "scores": [3, 5, 3, 4], "exp": "「そんなことない」「みんなそう」は感情を否定・薄めます。「どの意見？」は事実確認で感情への関心が薄い。「なぜそう感じた？」が感情の核心への問いかけです。"}, {"cat": "共感的関心", "text": "「仕事を辞めたい」と打ち明けられた。\n最初の言葉は？", "opts": ["「そんな勿体ない、もう少し頑張ってみたら？」", "「そうか…今どんな気持ち？もう少し聞かせて」", "「何かあったの？理由を教えて」", "「うん、自分の人生だから応援するよ」"], "scores": [2, 5, 4, 3], "exp": "「もったいない」「頑張って」は相手の感情を無視した返しです。「応援する」は決定を急がせます。「今どんな気持ち？」が感情への関心の入口として最も適切です。"}, {"cat": "共感的関心", "text": "クライアントが会議中に明らかにイライラしている。\nどう対応する？", "opts": ["「何かお気に召さない点がありましたか？」と直接聞く", "「少し休憩を挟みましょうか」と場を変える", "「何か懸念されていることがあれば聞かせてください」と開く", "議題を続けながら様子を見る"], "scores": [3, 4, 5, 3], "exp": "「懸念されていることがあれば」という問いかけは、相手が感情を表現するかどうかを相手に委ねた上で関心を示す、最も成熟した共感的関心の表れです。"}, {"cat": "共感的関心", "text": "相手が長い話をしていて、内容が繰り返しになってきた。\nどうする？", "opts": ["「つまり○○ということですね？」と要約して切り上げる", "「それって先ほどの話と同じですか？」と確認する", "繰り返していることに気づきながらも最後まで聴く", "「何が一番伝えたいですか？」と核心を促す"], "scores": [3, 3, 4, 5], "exp": "「何が一番伝えたい？」という問いは、相手が何を最も感じているかを引き出す共感的関心の洗練した表れです。要約は聴き手のペースに持ち込む行為です。"}, {"cat": "共感的関心", "text": "チームメンバーが「どうせ意見を言っても変わらない」\nと呟いた。どう反応する？", "opts": ["「そんなことないよ、ちゃんと聞いてるよ」と否定する", "「そう感じたことがあったんだね。どんな時に？」と聞く", "「じゃあ今後はしっかり反映するね」と約束する", "「皆そう思うことあるよね」と普遍化する"], "scores": [2, 5, 3, 3], "exp": "「ちゃんと聞いてる」「皆そう思う」は感情を薄めます。「約束する」は行動承諾で感情を受け取っていません。「どんな時に？」が感情への純粋な関心です。"}, {"cat": "共感的関心", "text": "悩みを打ち明けてくれた人に、話を聞いた後の言葉は？", "opts": ["「それは○○すればいいんじゃないかな」と解決策を提示する", "「話してくれてありがとう。そう感じていたんだね」と受け止める", "「私ならこうするな」と自分の対処法を話す", "「大変だったね、頑張ってね」と励ます"], "scores": [2, 5, 3, 3], "exp": "解決策・自分の方法・励ましはどれも「次の行動」に向かっています。「そう感じていたんだね」と受け止めることが、相手の感情をそのまま認める共感的関心の核心です。"}, {"cat": "共感的関心", "text": "会議で誰かが発言して笑われてしまった。\nその後どうする？", "opts": ["その場で笑いを収める一言を言う", "後で個人的に「さっきは大丈夫だった？」と声をかける", "会議終了後に全員に「発言は大切」とメッセージを送る", "その人が次回発言するかどうか様子を見る"], "scores": [3, 5, 3, 3], "exp": "その場での対応も大切ですが、後で個別に声をかけることが相手の感情を丁寧に受け止める共感的関心の細やかさです。"}, {"cat": "共感的関心", "text": "いつも前向きなメンバーが「今日はちょっと無理かも」\nと言った。どう受け取る？", "opts": ["「珍しいね、体調が悪い？」と体調を聞く", "「そうか、どのくらい無理な感じ？」と程度を確認する", "「珍しいね、何かあった？」と感情の背景を聞く", "「休んでいいよ、私がカバーする」とすぐ動く"], "scores": [3, 3, 5, 4], "exp": "体調や程度の確認は状況把握ですが、「何かあった？」という問いが感情の背景への関心です。すぐカバーを申し出るのは行動的ですが感情への関心が薄くなります。"}, {"cat": "共感的関心", "text": "「最近なんかうまくいかないんですよね」と言われた。\nどう続ける？", "opts": ["「どのあたりがうまくいっていない？」と状況を聞く", "「うまくいかないって、どんな感じがするの？」と感情を聞く", "「私もそういう時期あったよ」と自分の経験を話す", "「一つひとつ整理してみようか」と解決モードに入る"], "scores": [4, 5, 3, 3], "exp": "「どのあたりが」は状況把握で、「どんな感じがするの？」は感情への直接的な関心です。状況より先に感情を受け取ることが共感的関心の深さです。"}, {"cat": "共感的関心", "text": "相手が明らかに悲しそうにしているが、何も言わない。\nどうする？", "opts": ["何も言わずにそっとしておく", "「何かあった？話したければ聴くよ」と小さく伝えておく", "「大丈夫？」と直接聞く", "仕事の話をしながら様子を見る"], "scores": [3, 5, 3, 3], "exp": "「大丈夫？」は相手に「大丈夫」と答えさせやすい問いです。「話したければ聴くよ」は相手に主導権を与えながら関心を示す、最も成熟した共感的関心の表れです。"}, {"cat": "共感的関心", "text": "「もう少し頑張ってみます」という言葉を聞いた。\nどう受け取る？", "opts": ["「そうだね、頑張って」と背中を押す", "「もう少しってどのくらい？」と具体的に聞く", "「無理しないでね」とブレーキをかける", "「どこが一番しんどい？」と感情の核心を聞く"], "scores": [3, 3, 3, 5], "exp": "「頑張って」は感情を受け取らずに行動を促します。「どのくらい？」「無理しないで」は言葉の表面への反応です。「どこが一番しんどい？」が感情への純粋な関心です。"}, {"cat": "共感的関心", "text": "長期間一緒に働いてきた人が転職を決めたと話してくれた。\n最初の反応は？", "opts": ["「もったいない、もう少し考えてみたら？」と引き止める", "「そうか、どんな気持ちで決めたの？」と気持ちを聞く", "「応援するよ、次の職場はどこ？」と次の話に進む", "「そうか、寂しいな」と自分の感情を伝える"], "scores": [2, 5, 3, 3], "exp": "引き止めは相手の決断を否定します。次の話に進むのは早すぎます。自分の感情を伝えるのも大切ですが、まず「相手がどんな気持ちで決めたか」を聞くことが共感的関心の順序です。"}, {"cat": "共感的関心", "text": "「叱られてしまいました」と報告してきた部下に、\n最初に言う言葉は？", "opts": ["「何が原因だったの？」と原因を聞く", "「どんな気持ち？」と感情を受け止める", "「大丈夫、次は気をつければいい」と励ます", "「叱られたのはこういう理由だと思う」と解説する"], "scores": [3, 5, 3, 2], "exp": "原因・励まし・解説はどれも「状況の処理」です。まず「今どんな気持ちか」を受け止めることが、叱られた直後の感情への共感的関心として最も重要です。"}, {"cat": "共感的関心", "text": "相手が「もう少し話を聞いてほしかった」と言ってきた。\n受け止め方は？", "opts": ["「ごめん、忙しくてさ」と理由を説明する", "「そう感じさせてしまったんだね。どんな時？」と聞く", "「次からはちゃんと聞くよ」と約束する", "「どんな話を聞いてほしかった？」と内容を確認する"], "scores": [2, 5, 3, 3], "exp": "理由説明・約束・内容確認はどれも「自分の行動」への反応です。「そう感じさせてしまったんだね」と相手の感情をまず受け止めることが共感的関心の誠実な応答です。"}, {"cat": "共感的関心", "text": "部下が「自分だけ評価が低い気がして」と言ってきた。\n最初の反応は？", "opts": ["「そんなことないよ、ちゃんと評価されてるよ」と否定する", "「そう感じているんだね。どんな場面でそう思った？」と聞く", "「評価基準を一緒に確認してみようか」と問題解決に進む", "「気にしすぎじゃないかな」と正常化する"], "scores": [2, 5, 3, 2], "exp": "否定・問題解決・正常化はどれも感情を受け取らない返しです。「どんな場面でそう思った？」が相手の感情への純粋な関心の表れです。"}, {"cat": "社会的実行力", "text": "初対面の人が多い場で、自然にできることは？", "opts": ["共通の知人を探して会話のきっかけを作る", "相手に興味を持って自分から話しかけ関係を開く", "名刺を交換して連絡先を確保する", "場の雰囲気に慣れるまで様子を見る"], "scores": [3, 5, 4, 2], "exp": "名刺交換は接触ですが関係構築ではありません。「相手への興味を持って話しかける」ことが、本物の関係の入口になる社会的実行力です。"}, {"cat": "社会的実行力", "text": "チームの意見がまとまらない。\nどんな役割を自然にとる？", "opts": ["自分の意見を明確に主張してリードする", "各意見の共通点を整理して対話を促すファシリテーター役", "多数派の意見に自分も乗る", "強い意見の人に任せる"], "scores": [3, 5, 3, 2], "exp": "「リードする」は意見の押し通しになるリスクがあります。「多数派に乗る」は合意を演出します。各意見の共通点を整理することが社会的実行力の調整力です。"}, {"cat": "社会的実行力", "text": "権限のない他部署に協力を依頼する必要がある。\nどうする？", "opts": ["上司から頼んでもらう", "相手の仕事にとってのメリットや共通の目標と結びつけて依頼する", "「お願いします」と丁寧に頼む", "「相互協力のため」と建前で依頼する"], "scores": [3, 5, 3, 3], "exp": "上司を使うのは権力依存です。「丁寧にお願い」は誠実ですが、相手が動く理由がありません。「相手のメリット・共通の目標」を示すことが権限なしに人を動かす社会的実行力です。"}, {"cat": "社会的実行力", "text": "苦手な上司と建設的な関係を維持するために何をする？", "opts": ["関わりを最小限にして穏便に進める", "相手の強みと価値観を理解して機能する関係を意図的に設計する", "表面上は丁寧に接する", "信頼できる人に愚痴を聞いてもらう"], "scores": [3, 5, 3, 3], "exp": "「最小限に」「表面上」は回避策です。愚痴は解消になりますが改善しません。「相手の強みと価値観を理解した上で関係を設計する」が社会的実行力の成熟した対処です。"}, {"cat": "社会的実行力", "text": "重要な批判的フィードバックを部下に伝える必要がある。\n最も効果的な伝え方は？", "opts": ["事実を率直に伝えてすっきりさせる", "相手の尊厳を守りながら改善につながる伝え方を選ぶ", "「良かった点もあるけど」と前置きしてから伝える", "メールで書いて直接言わなくて済むようにする"], "scores": [3, 5, 3, 2], "exp": "「前置きしてから」はサンドイッチ法ですが機械的になりがちです。「率直に」は関係を傷つけるリスクがあります。相手の尊厳を守る伝え方を「選ぶ」ことが社会的実行力の核心です。"}, {"cat": "社会的実行力", "text": "対立している二人の間を取り持つ時、どうアプローチする？", "opts": ["双方の話を別々に聞いてから一緒の場を設ける", "片方の意見が正しいと判断して伝える", "二人を同時に呼んで話し合わせる", "上司に判断を任せる"], "scores": [5, 2, 3, 3], "exp": "双方を別々に聞く→共同の場を設けるという順序が最も安全で効果的な調停の社会的実行力です。最初から同時に呼ぶと防衛的になる可能性があります。"}, {"cat": "社会的実行力", "text": "誰かに大きなお願いをする必要がある。\n最も効果的な頼み方は？", "opts": ["「助けてほしい」と率直にお願いする", "相手の状況・負担・メリットを考慮した上で頼み方・タイミング・内容を設計する", "「これはあなたにしかできない」と特別感を出す", "お礼を先に言ってから頼む"], "scores": [3, 5, 3, 3], "exp": "「特別感」や「先にお礼」は誘導的になりえます。「率直なお願い」は誠実ですが相手への配慮が薄い。相手の状況まで考慮した設計が社会的実行力の成熟した頼み方です。"}, {"cat": "社会的実行力", "text": "会議で自分の意見がなかなか通らない。\nどうアプローチを変える？", "opts": ["より強く・繰り返し主張する", "相手の関心・価値観に沿った形で意見を再構成して伝える", "他のメンバーの支持を事前に集める", "上司に根回しをする"], "scores": [2, 5, 4, 3], "exp": "「繰り返し主張」は摩擦を増やします。「根回し」も有効ですが、本質は相手の関心に沿った再構成で伝える社会的実行力が説得の核心です。"}, {"cat": "社会的実行力", "text": "組織に新しい変革を導入しようとしている。\n反対しているメンバーへのアプローチは？", "opts": ["「なぜ反対なのか」の背景にある不安や利益を理解し対話する", "反対意見は無視して前に進む", "多数決で決める", "上位者の権限で進める"], "scores": [5, 2, 3, 3], "exp": "反対の「背後にある不安や利益」を理解することが変革管理の社会的実行力です。権限や多数決は短期的に動かせても長期的な協力は得られません。"}, {"cat": "社会的実行力", "text": "プレゼン後に「少し難しかった」とフィードバックをもらった。\n次に何をする？", "opts": ["「どこが難しかったか」を具体的に聞いて次回に活かす", "スライドをもっとシンプルにする", "説明を詳しくする", "次はもっと練習して臨む"], "scores": [5, 3, 3, 3], "exp": "「どこが難しかったか」を直接聞くことが最も精度の高い改善につながります。スライドや説明の変更は仮定に基づく対処で、的外れになるリスクがあります。"}, {"cat": "社会的実行力", "text": "メンバーのモチベーションが下がっている。\n最も効果的なアプローチは？", "opts": ["チーム全体に向けて激励のメッセージを送る", "それぞれのモチベーション低下の背景を理解して個別に関わる", "新しいプロジェクトを与えて刺激を与える", "目標を再確認させて意識を向かせる"], "scores": [3, 5, 4, 3], "exp": "全体への激励は一律で個人への関与にはなりません。個人の「背景を理解して関わる」ことが、モチベーション向上の社会的実行力のリーダーシップです。"}, {"cat": "社会的実行力", "text": "長い付き合いの相手との関係が最近なんか変な気がする。\nどうする？", "opts": ["様子を見てそのうち戻ると思う", "「最近なんか距離ができた気がするんだけど、私が何かしたかな？」と正直に開く", "普段通りに接して相手の反応を見る", "共通の知人に状況を聞く"], "scores": [3, 5, 3, 2], "exp": "「そのうち戻る」は回避です。「普通に接する」は探りを入れることで不自然です。直接、かつ自分の見え方として開く問いかけが社会的実行力の誠実な関係管理力です。"}, {"cat": "社会的実行力", "text": "上司への重要な報告のタイミングと方法を選ぶ時、\n最も考慮することは？", "opts": ["なるべく早く伝える", "相手の状況・スタイル・今の認知的余裕を考慮して最適なタイミングと方法を選ぶ", "メールで記録に残す", "ミーティングを設定して正式に伝える"], "scores": [3, 5, 3, 3], "exp": "「早く伝える」は誠実ですが相手が受け取れる状態でないと効果が半減します。「相手の状況・認知的余裕」まで考慮するのが社会的実行力の伝達設計力です。"}, {"cat": "社会的実行力", "text": "会議で特定の声ばかりが大きくなり、\n意見が偏りそうになっている。どうする？", "opts": ["多数意見に従う", "「他の方はいかがですか？」と声が出ていない人に機会を作る", "議題を変えてリセットする", "声の大きい人に後で別途意見を聞く"], "scores": [2, 5, 3, 3], "exp": "多数意見への追従は声の偏りを固定します。後で聞くのは遅すぎます。その場で「声が出ていない人に機会を作る」のが社会的実行力のインクルーシブなファシリテーションです。"}, {"cat": "社会的実行力", "text": "「ノー」と伝える必要がある。\n最も建設的な断り方は？", "opts": ["「できません」とはっきり断る", "相手への敬意を示しながら代替案も提示して断る", "「今は難しいです」と婉曲に断る", "「上司に相談します」と保留にする"], "scores": [3, 5, 3, 2], "exp": "「はっきり断る」は明確ですが関係に影響することがあります。「保留」は問題を先送りします。敬意＋代替案という組み合わせが社会的実行力のアサーティブな断り方です。"}, {"cat": "社会的実行力", "text": "チームに変化を導入しようとしている。\n最初にやることは？", "opts": ["全員に変化の内容を一斉に発表する", "キーパーソンとなる人たちに個別に話して巻き込む", "変化の必要性のデータを揃えてから提示する", "上位者の権限で決定してから周知する"], "scores": [3, 5, 4, 2], "exp": "一斉発表は周知ですが合意ではありません。データ揃えも大切ですが、キーパーソンへの事前の個別対話が変化への協力を生む社会的実行力の順序です。"}, {"cat": "社会的実行力", "text": "大事なメッセージを伝えた後、本当に伝わったかを\nどう確認する？", "opts": ["「わかりましたか？」と聞く", "「何かご不明な点はありますか？」と聞く", "相手の言葉で要点を話してもらう", "後日、行動で確認する"], "scores": [2, 3, 5, 4], "exp": "「わかりましたか？」はYes/Noで終わります。「不明な点は？」も同様です。「相手の言葉で要点を話してもらう」ことが理解度を正確に確認する社会的実行力です。"}, {"cat": "社会的実行力", "text": "困難なニュース（人員削減・プロジェクト中止など）を\nチームに伝える時の準備は？", "opts": ["事実を正確に、感情を入れずに伝える", "感情的な受け取り方への配慮・サポート・次のステップを含めて設計する", "なるべく早く伝えて次に進む", "個人に個別で伝えてから全体に共有する"], "scores": [3, 5, 3, 4], "exp": "「事実のみ」は誠実ですが人の感情を無視します。「早く伝えて次に進む」は感情処理の時間を奪います。感情への配慮とサポートを含めた設計が社会的実行力です。"}, {"cat": "社会的実行力", "text": "誰かが貢献したことが場で全く認められていない。\nどうする？", "opts": ["後でその人だけに「よかったよ」と伝える", "場の中で自然にその人の貢献を言及して可視化する", "上司にその人を評価するよう伝える", "気づいていないメンバーに後で話す"], "scores": [3, 5, 3, 3], "exp": "後で個人に伝えるのは大切ですが、「場の中で可視化する」ことがその人の評価を集団の中で構築する社会的実行力の公的な承認力です。"}, {"cat": "社会的実行力", "text": "相手が自分の話を聞いていないと感じた。\nどう対応する？", "opts": ["同じことを繰り返し強調する", "「少し確認させてください」と伝えて相手の理解度を確認する", "話すのをやめてしまう", "後でメールで送る"], "scores": [2, 5, 2, 3], "exp": "繰り返し強調は摩擦を増やします。止めるのは諦めです。後でメールは回避です。「確認させてください」という一時停止が社会的実行力のコミュニケーション修復力です。"}, {"cat": "社会的実行力", "text": "ネットワーキングイベントで初対面の人と話す時、\n何を最も意識する？", "opts": ["自分のことを上手く売り込む", "相手のことを本当に知ろうとして質問を重ねる", "名刺を交換して後でフォローする", "共通点を素早く見つけて会話を盛り上げる"], "scores": [3, 5, 3, 4], "exp": "「売り込み」は自己中心的になりがちです。「共通点を探す」も良いですが目的が「盛り上げ」です。「相手のことを本当に知ろうとする」関心が長期的な関係を生む社会的実行力です。"}, {"cat": "社会的実行力", "text": "チームで意思決定を行う時、メンバー全員が\n納得する結論を導くためにどう動く？", "opts": ["多数決で効率よく決める", "各自の懸念・優先順位・価値観を整理してから共通解を探す", "リーダーが決断してメンバーに伝える", "反対意見が出ないよう雰囲気を作る"], "scores": [3, 5, 3, 2], "exp": "多数決は少数意見を無視します。リーダー決断は合意でなく服従です。「雰囲気作り」で反対を抑えるのは最悪です。各人の懸念を整理してから共通解を探すのが社会的実行力の合意形成力です。"}, {"cat": "影響力・配慮", "text": "チームに変化を導入したい。\n最も効果的な影響力の行使は？", "opts": ["「これが正しい方向だ」と自信を持って主張する", "各人が変化をどう受け取るかを想像し段階的に巻き込む", "上司の承認を取ってから権限で進める", "データや事例を揃えて論理的に説得する"], "scores": [3, 5, 3, 4], "exp": "主張・権限・論理はどれも一方向的な力です。「各人の受け取り方を想像して巻き込む」のは双方向的な影響力で、長期的な協力を生みます。"}, {"cat": "影響力・配慮", "text": "意見を伝えたら、相手がすんなり受け入れてくれた。\n最も大きな理由は何だと思う？", "opts": ["内容が正しかった", "相手の関心・価値観・状況に合わせた伝え方ができた", "相手が素直な人だった", "タイミングが良かった"], "scores": [3, 5, 3, 4], "exp": "タイミングと内容の正しさも影響しますが、「相手の関心・価値観に合わせた伝え方」が相手を動かす最も本質的な影響力の要素です。"}, {"cat": "影響力・配慮", "text": "自分に権限のない相手に動いてもらうために、\n最も倫理的かつ効果的な方法は？", "opts": ["人脈を使って圧力をかける", "相手の目標や利益と自分の依頼をつなげて協力関係を作る", "相手が断れない状況を作る", "情に訴える"], "scores": [2, 5, 1, 3], "exp": "圧力・断れない状況は操作的です。情への訴えは短期的には効きますが持続しません。「相手の目標と利益をつなげる」のが倫理的な社会的影響力の核心です。"}, {"cat": "影響力・配慮", "text": "メンバーが自分から積極的に動くようにするために、\n最も持続的な方法は？", "opts": ["評価や報酬で動機づける", "プレッシャーをかけて動かす", "各人の内発的な動機と目標に働きかける", "ロールモデルになって見せる"], "scores": [3, 2, 5, 4], "exp": "評価・報酬・プレッシャーは外発的動機で行動は持続しません。ロールモデルは有効ですが全員に効くわけではありません。「内発的動機に働きかける」が最も長期的な影響力です。"}, {"cat": "影響力・配慮", "text": "相手が反対意見を内心持っていそうだと感じた。\nどうする？", "opts": ["「何か懸念がありますか？」と正面から聞く", "自分の主張を補強してから再提示する", "反対されないように話を進める", "「賛成ですよね？」と確認する"], "scores": [5, 3, 2, 2], "exp": "「賛成ですよね？」は答えを誘導します。「反対されないように進める」は対話の回避です。「何か懸念が?」と正面から引き出すことが誠実な影響力の行使です。"}, {"cat": "影響力・配慮", "text": "誰かへの感謝を伝える時、最も影響力のある方法は？", "opts": ["「ありがとうございます」と丁寧に伝える", "プレゼントやお土産を用意する", "何がどうよかったかを具体的に言語化して伝える", "全員の前で感謝を表明する"], "scores": [3, 3, 5, 4], "exp": "「ありがとう」は必要ですが表面的です。全員の前での表明は公的承認として有効ですが、「何がどうよかったか」の言語化が相手に最も深く届く感謝の影響力です。"}, {"cat": "影響力・配慮", "text": "チームのモチベーションを高めるための最も効果的な方法は？", "opts": ["全員に向けて「頑張ろう」と鼓舞する", "各人の動機・強み・成長欲求を理解してそれに合わせて関わる", "良い成果が出た時に大きく褒める", "ビジョンを繰り返し語る"], "scores": [3, 5, 4, 4], "exp": "鼓舞・褒賞・ビジョンはどれも一律の手法です。「各人の動機に合わせる」のが個別最適化された影響力で、最も持続的なモチベーション向上につながります。"}, {"cat": "影響力・配慮", "text": "困難な局面でチームを鼓舞する必要がある。\nどう言葉を選ぶ？", "opts": ["「頑張れば必ず乗り越えられる」と全員に同じ言葉", "「この経験が必ず力になる」と意味づけをして伝える", "各人に何が一番つらいかを確認してから言葉を選ぶ", "黙って自分が率先してやり続ける"], "scores": [2, 4, 5, 4], "exp": "「頑張れば乗り越えられる」は一律すぎます。「経験が力に」は意味づけとして有効です。「各人の一番つらいことを確認してから言葉を選ぶ」が最も個別化された影響力の実践です。"}, {"cat": "影響力・配慮", "text": "長期的な信頼関係を構築するために最も重要なことは？", "opts": ["いつでも相手の頼みを断らない", "一貫した誠実さと約束を守ることと相手への継続的な関心", "頻繁にコミュニケーションをとる", "相手のことを褒め続ける"], "scores": [2, 5, 3, 3], "exp": "「断らない」は信頼でなく依存を生みます。「頻繁な連絡」「褒め続ける」は形式的になりがちです。「一貫した誠実さ＋相手への関心の継続」が信頼という影響力の基盤です。"}, {"cat": "影響力・配慮", "text": "誰かの意思決定に影響を与えたい時、\n最も倫理的で効果的な方法は？", "opts": ["「こうすべきだ」と明確な方向を示す", "相手の価値観・懸念・利益に沿った情報を提示して判断を支援する", "経験者の権威を使って説得する", "感情に訴えて動かす"], "scores": [3, 5, 3, 3], "exp": "「こうすべき」は指示的です。権威・感情への訴えは操作的になりえます。「相手の価値観・懸念に沿った情報提示」が判断を尊重した上での最も倫理的な影響力です。"}, {"cat": "影響力・配慮", "text": "頼み事をする時に、最も断られにくいのはどのアプローチ？", "opts": ["「あなただから頼むんです」と特別感を出す", "「忙しいところすみませんが」と謝罪から入る", "相手にとってのメリットや意義を誠実に伝えた上で頼む", "「どうしても必要で」と緊迫感を出す"], "scores": [3, 3, 5, 3], "exp": "特別感・謝罪・緊迫感はいずれも心理的な圧力です。「相手にとってのメリットと意義を誠実に伝える」ことが、相手が主体的に動きたくなる影響力です。"}, {"cat": "影響力・配慮", "text": "組織変革への抵抗が強い。\n最も建設的な対処は？", "opts": ["「変化は避けられない」と現実を伝える", "抵抗の背後にある不安・利益・価値観を理解して対話する", "決定事項なので従ってもらうと伝える", "変革のメリットをより強く伝える"], "scores": [3, 5, 2, 3], "exp": "現実の強調・メリットの訴求は「説得」です。「従ってもらう」は権力行使です。「抵抗の背後にある不安を理解して対話する」が持続的な変革を生む社会的影響力です。"}, {"cat": "影響力・配慮", "text": "メンバーの潜在的な強みを引き出したい。\n最も効果的なアプローチは？", "opts": ["「あなたは○○が得意だと思うよ」と伝える", "その人が気づいていない強みを具体的に言語化して返す", "挑戦できる機会を与えて自分で気づかせる", "周囲に「○○さんの強みは何?」と聞いて集める"], "scores": [3, 5, 4, 4], "exp": "「○○が得意」は一般的すぎます。機会を与えるのは有効ですが偶然性があります。「具体的に言語化して返す」ことが相手に自分の強みを実感させる最も精度の高い影響力です。"}, {"cat": "影響力・配慮", "text": "自分の影響力がチームに与えている影響を、\nどれくらい意識している？", "opts": ["あまり意識しない", "自分の言動がどう受け取られているか継続的に観察している", "問題があれば誰かが教えてくれる", "自分はそれほど影響力がある立場ではない"], "scores": [2, 5, 3, 2], "exp": "「誰かが教えてくれる」「影響力がない」は責任の回避です。「継続的に観察する」ことが影響力を倫理的・効果的に行使する社会的責任の表れです。"}, {"cat": "影響力・配慮", "text": "チームの文化を変えたい。\n最初の一歩として最も有効なのは？", "opts": ["「こういう文化を目指す」と宣言する", "現在の文化が生まれた背景を深く理解してから動く", "小さな行動の変化を自分から始める", "全員が賛成してから変える"], "scores": [3, 4, 5, 2], "exp": "宣言は認識を作りますが変化を生みません。全員の賛成を待つと変化が止まります。「自分から小さな行動変化を始める」のが文化変革の最も実践的な出発点です。"}, {"cat": "影響力・配慮", "text": "ある人への影響力を高めたい。\n最も倫理的かつ持続的な方法は？", "opts": ["その人が必要な時にいつでも助けられる存在になる", "その人の関心・課題・目標に貢献し続けることで信頼を積み上げる", "その人の上司と良い関係を持つ", "その人の弱点を理解しておく"], "scores": [4, 5, 3, 2], "exp": "いつでも助けるのは依存を生む可能性があります。上司との関係は間接的です。「相手の課題・目標への継続的な貢献で信頼を積む」が長期的な影響力の最も健全な構築方法です。"}, {"cat": "影響力・配慮", "text": "相手が自分の意見を変えることに抵抗している。\nどうアプローチする？", "opts": ["「なぜそう考えるか」の背景を理解してから対話する", "データで論破する", "相手の抵抗を弱める情報を先に提示する", "より高い権威者の意見を引用する"], "scores": [5, 3, 3, 3], "exp": "論破・弱める情報・権威の引用は「説得」や「圧力」です。「なぜそう考えるかの背景を理解してから対話する」ことが、相手の主体的な変化を引き出す社会的影響力です。"}, {"cat": "影響力・配慮", "text": "グループ全体の雰囲気をポジティブにしたい。\n最も自然な方法は？", "opts": ["「ポジティブでいこう」と呼びかける", "場の空気を読んで適切なタイミングで自分から明るくする", "楽しいイベントを企画する", "ネガティブな発言をしないようお願いする"], "scores": [2, 5, 4, 2], "exp": "呼びかけ・イベント・禁止は外側から働きかけます。「場の空気を読んで適切なタイミングで自分から明るくする」ことが内側から影響力を発揮する自然な方法です。"}, {"cat": "影響力・配慮", "text": "長期的な関係の維持のために、普段どんな行動をとっている？", "opts": ["必要な時だけ連絡する", "相手の近況や関心・変化に継続的な関心を持ち節目には必ず連絡する", "定期的に情報共有する", "忘れないように連絡先を更新する"], "scores": [2, 5, 3, 2], "exp": "定期的な情報共有は機械的になりがちです。連絡先の更新は形式的です。「相手の変化・関心への継続的な関心＋節目の行動」が長期的な信頼という影響力の資本を育てます。"}, {"cat": "影響力・配慮", "text": "誰かをサポートする時、何が最も重要？", "opts": ["相手が困っていたらすぐに動く", "相手が本当に必要としていることを確認してから動く", "自分が得意なことでサポートする", "相手に聞かれたことに答える"], "scores": [3, 5, 3, 3], "exp": "すぐ動く・得意なことでする・聞かれたことに答えるはどれも「自分のペースのサポート」です。「本当に必要としていることを確認してから動く」が相手中心の影響力です。"}, {"cat": "影響力・配慮", "text": "自分が誰かに影響を与える立場にあると気づいた時、\nどんな責任を感じる？", function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ★ 選択肢と点数をセットでシャッフル
function shuffleOpts(q){
  const pairs=shuffle(q.opts.map((o,i)=>({o,s:q.scores[i]})));
  return {...q,opts:pairs.map(p=>p.o),scores:pairs.map(p=>p.s)};
}

function pickQuestions(){
  const cats=[...new Set(BANK.map(q=>q.cat))];
  let sel=[];
  cats.forEach(c=>{const pool=shuffle(BANK.filter(q=>q.cat===c));sel.push(...pool.slice(0,CAT_PER));});
  return shuffle(sel).map(q=>shuffleOpts(q));
}

function loadResults(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch{return[];}}
function saveResult(r){const all=loadResults();all.push(r);localStorage.setItem(STORAGE_KEY,JSON.stringify(all));}
async function sendToServer(record){
  try{await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(record)});return true;}

}

        <div class="name-row-input">
          <span class="name-label">名前</span>
          <input class="name-input" id="name-input" type="text" maxlength="30" placeholder="山田 太郎"
            value="${recentName.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}"
            oninput="document.getElementById('name-err').style.display='none'"
            onkeydown="if(event.key==='Enter')startTest()">
        </div>
        <p id="name-err" class="name-error">名前を入力してください</p>
      </div>
      <button class="btn-primary" onclick="startTest()">テストを開始する →</button>
    </div>
    <div class="card-sm">
      <div class="hist-hdr">
        <span class="hist-ttl">過去の記録${all.length?`（${all.length}件）`:''}</span>
        ${all.length?`<button class="btn-sm" onclick="exportCSV()">CSV出力</button>`:''}
      </div>
      ${histHTML}
    </div>
    <p class="note-sm">このテストは簡易的な目安です。正式な評価は専門家にご相談ください。<br>Created by S.O.Y</p>`;
  show('s-intro');
}

function startTest(){
  const input=document.getElementById('name-input');
  const name=(input?input.value:'').trim();
  if(!name){const err=document.getElementById('name-err');if(err)err.style.display='block';input&&input.focus();return;}
  currentName=name;questions=pickQuestions();cur=0;totalScore=0;elapsed=0;catScores={};
  questions.forEach(q=>{if(!catScores[q.cat])catScores[q.cat]=0;});
  startTime=Date.now();show('s-test');
  timerID=setInterval(()=>{elapsed=Math.floor((Date.now()-startTime)/1000);const t=document.getElementById('timer-el');if(t)t.textContent=fmt(elapsed);},500);
  renderQ();
}

function renderQ(){
  const q=questions[cur];
  const pct=Math.round((cur/PER_SESSION)*100);
  const lbls=['A','B','C','D'];
  document.getElementById('s-test').innerHTML=`
    <div class="test-hdr">
      <div class="hdr-row">
        <span class="q-label">問題 ${cur+1} <span style="color:var(--text3)">/ ${PER_SESSION}</span></span>
        <span class="timer" id="timer-el">${fmt(elapsed)}</span>
      </div>
      <div class="sub-row">
        <span class="name-badge">${currentName}</span>
        <span style="font-size:11px;color:var(--text3)">${q.cat}</span>
      </div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-card">
      <span class="cat-badge">${q.cat}</span>
      <p class="q-text">${q.text}</p>
    </div>
    <div class="opts" id="opts-area">
      ${q.opts.map((o,i)=>`
        <button class="opt" onclick="answer(${i})">
          <span class="opt-lbl">${lbls[i]}</span>
          <span style="flex:1">${o}</span>
        </button>`).join('')}
    </div>
    <div id="expl-area"></div>`;
}

function answer(idx){
  const q=questions[cur];
  const pts=q.scores[idx];
  totalScore+=pts;catScores[q.cat]=(catScores[q.cat]||0)+pts;
  document.querySelectorAll('.opt').forEach((b,i)=>{b.classList.add('disabled');if(i===idx)b.classList.add('selected');});
  // ★ 点数は非表示・解説のみ
  document.getElementById('expl-area').innerHTML=`
    <div class="expl">${q.exp}</div>
    <div class="next-wrap">
      <button class="btn-ghost" onclick="nextQ()">${cur+1<PER_SESSION?'次の問題へ →':'結果を見る →'}</button>
    </div>`;
}

function nextQ(){
  cur++;
  if(cur>=PER_SESSION){clearInterval(timerID);elapsed=Math.floor((Date.now()-startTime)/1000);showResult();}
  else renderQ();
}

function showResult(){
  const eq=totalScore;
  const lvl=LEVELS.find(l=>eq>=l.min)||LEVELS[LEVELS.length-1];
  const catMax=CAT_PER*5;
  const catResults=Object.entries(catScores).map(([cat,sc])=>({
    cat,sc,pct:Math.round((sc/catMax)*100),
    comment:sc/catMax>=0.8?CAT_COMMENTS[cat].hi:sc/catMax>=0.6?CAT_COMMENTS[cat].mid:CAT_COMMENTS[cat].lo
  }));
  const catBreakdown={};catResults.forEach(r=>{catBreakdown[r.cat]={score:r.sc,max:catMax,pct:r.pct};});
  const record={testType:'SQ',name:currentName,eq,score:totalScore,maxScore:PER_SESSION*5,acc:Math.round((totalScore/(PER_SESSION*5))*100),secs:elapsed,level:lvl.label,date:new Date().toISOString(),catBreakdown};
  saveResult(record);
  sendToServer(record).then(ok=>{
    const el=document.getElementById('save-status');
    if(el)el.innerHTML=ok
      ?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Googleスプレッドシートに送信しました'
      :'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ローカルに保存（送信失敗）';
  });
  document.getElementById('s-result').innerHTML=`
    <div class="card">
      <div class="result-hero">
        <p class="result-name">${currentName} さんの結果</p>
        <div class="eq-ring"><span class="eq-lbl-sm">SQ</span><span class="eq-val">${eq}</span></div>
        <h2 class="result-title">${lvl.label}</h2>
        <p class="result-desc">${lvl.desc}</p>
        <div id="save-status" class="save-notice">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          送信中...
        </div>
      </div>
      <div class="stats">
        <div class="stat-box"><div class="stat-n">${eq}</div><div class="stat-l">SQスコア（/100）</div></div>
        <div class="stat-box"><div class="stat-n">${Math.round((totalScore/(PER_SESSION*5))*100)}%</div><div class="stat-l">達成率</div></div>
        <div class="stat-box"><div class="stat-n">${fmt(elapsed)}</div><div class="stat-l">所要時間</div></div>
      </div>
    </div>
    <div class="card">
      <p class="bkdn-ttl">カテゴリ別スコアと改善ポイント</p>
      ${catResults.map(r=>`
        <div class="cat-result">
          <div class="cat-result-row">
            <span class="cat-name">${r.cat}</span>
            <span class="cat-pts">${r.sc}/${catMax}点（${r.pct}%）</span>
          </div>
          <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${r.pct}%"></div></div>
          <p class="cat-comment">${r.comment}</p>
        </div>`).join('')}
    </div>
    <div class="retry-wrap">
      <button class="btn-primary" onclick="startTest()">もう一度挑戦する（新しい20問）→</button>
      <button class="btn-ghost" onclick="exportCSV()">結果をCSVでダウンロード</button>
      <button class="btn-ghost" onclick="showIntro()">トップへ戻る</button>
      <button class="btn-ghost" onclick="goToResults()">📊 結果をまとめて確認する →</button>
    </div>
    <p class="note-sm" style="margin-top:12px">※このテストは簡易的な目安です。正式な評価は専門家にご相談ください。<br>Created by S.O.Y</p>`;
  show('s-result');
}

function goToResults(){
  const name = currentName || localStorage.getItem('test_player_name') || '';
  window.location.href = 'results.html' + (name ? '?name=' + encodeURIComponent(name) : '');
}
function exportCSV(){
  const all=loadResults();if(!all.length){alert('まだ記録がありません。');return;}
  const header='名前,SQスコア,達成率(%),所要時間(秒),レベル,実施日時';
  const rows=all.map(r=>[`"${(r.name||'').replace(/"/g,'""')}"`,r.eq,r.acc,r.secs,`"${(r.level||'').replace(/"/g,'""')}"`,`"${fmtDate(r.date)}"`].join(','));
  const csv='\uFEFF'+header+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`SQテスト結果_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

showIntro();
</script>
</body>
</html>
