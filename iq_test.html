<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQテスト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
  --text:#1a1a18;--text2:#6b6b66;--text3:#9a9a94;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --accent:#2563a8;--accent-bg:#eef3fb;--accent-border:rgba(37,99,168,0.25);
  --success:#2d7a3a;--success-bg:#eef6f0;--success-border:rgba(45,122,58,0.3);
  --danger:#c0392b;--danger-bg:#fdf0ee;--danger-border:rgba(192,57,43,0.3);
  --info-bg:#eef3fb;--info-border:rgba(40,80,160,0.25);--info:#1a4fa0;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252522;--bg3:#2e2e2b;
  --text:#f0f0ec;--text2:#a0a09a;--text3:#686862;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --accent:#7aaaff;--accent-bg:rgba(37,99,168,0.15);--accent-border:rgba(122,170,255,0.35);
  --success:#4caf60;--success-bg:rgba(76,175,96,0.12);--success-border:rgba(76,175,96,0.35);
  --danger:#e57373;--danger-bg:rgba(229,115,115,0.12);--danger-border:rgba(229,115,115,0.35);
  --info-bg:rgba(60,100,200,0.12);--info-border:rgba(100,150,255,0.3);--info:#7aaaff;
}}
body{background:var(--bg3);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  padding:24px 16px 60px}
#app{width:100%;max-width:560px}
.screen{animation:fi .28s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:12px}
.card-sm{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px}
.intro-header{display:flex;align-items:center;gap:14px;padding-bottom:18px;
  border-bottom:0.5px solid var(--border);margin-bottom:20px}
.intro-logo{width:52px;height:52px;border-radius:50%;background:var(--accent-bg);
  border:0.5px solid var(--accent-border);display:flex;align-items:center;
  justify-content:center;font-size:26px;flex-shrink:0}
.intro-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:3px}
.intro-sub{font-size:11px;color:var(--accent);font-weight:500;letter-spacing:.4px}
.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.meta-box{background:var(--bg2);border-radius:var(--radius);padding:12px 8px;text-align:center}
.meta-n{font-size:18px;font-weight:700;color:var(--accent)}.meta-l{font-size:10px;color:var(--text3);margin-top:2px}
.cats-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.cat-pill{font-size:11px;padding:3px 10px;border-radius:100px;
  background:var(--accent-bg);color:var(--accent);border:0.5px solid var(--accent-border)}
.notice-box{background:var(--accent-bg);border:0.5px solid var(--accent-border);
  border-radius:var(--radius);padding:12px 14px;font-size:12px;color:var(--accent);
  margin-bottom:18px;line-height:1.75}
.name-section{margin-bottom:16px}
.name-row-input{display:flex;align-items:center;gap:10px;padding:11px 14px;
  border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2)}
.name-row-input:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.name-label{font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0}
.name-input{flex:1;border:none;outline:none;font-size:15px;background:transparent;
  color:var(--text);font-family:inherit}
.name-input::placeholder{color:var(--text3)}
.name-error{font-size:12px;color:var(--danger);margin-top:6px;display:none}
.btn-primary{display:block;width:100%;padding:14px;background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius);font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-primary:hover{opacity:.85}.btn-primary:active{transform:scale(.98)}
.btn-ghost{display:block;width:100%;padding:12px;background:var(--bg);color:var(--text);
  border:0.5px solid var(--border2);border-radius:var(--radius);font-size:14px;
  font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-ghost:hover{background:var(--bg2)}.btn-ghost:active{transform:scale(.98)}
.btn-sm{padding:5px 10px;background:var(--bg);color:var(--text2);
  border:0.5px solid var(--border2);border-radius:var(--radius);
  font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-sm:hover{background:var(--bg2)}
.hist-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hist-ttl{font-size:12px;font-weight:500;color:var(--text2)}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 0;
  border-bottom:0.5px solid var(--border);font-size:13px}
.hist-item:last-child{border-bottom:none}
.hist-iq{font-size:18px;font-weight:700;color:var(--accent);min-width:36px}
.hist-meta{flex:1;min-width:0}
.hist-name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-date{font-size:11px;color:var(--text3);margin-top:1px}
.hist-score{font-size:12px;color:var(--text2);text-align:right;white-space:nowrap;flex-shrink:0}
.hist-empty{font-size:13px;color:var(--text3);padding:12px 0;text-align:center}
.test-hdr{margin-bottom:14px}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.q-label{font-size:13px;color:var(--text2)}
.timer{font-size:12px;font-variant-numeric:tabular-nums;color:var(--text2);
  background:var(--bg2);padding:3px 10px;border-radius:100px;border:0.5px solid var(--border)}
.sub-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.name-badge{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.pbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:2px}
.pfill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.q-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:10px}
.cat-badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;
  font-weight:500;margin-bottom:10px;background:var(--accent-bg);
  color:var(--accent);border:0.5px solid var(--accent-border)}
.q-text{font-size:15px;line-height:1.85;white-space:pre-line;color:var(--text)}
.q-figure{white-space:normal!important;font-size:14px}
.q-figure svg{display:block;max-width:100%;height:auto;margin:0 auto}
.opts{display:grid;gap:7px;margin-bottom:8px}
.opt{text-align:left;padding:12px 14px;background:var(--bg);border:0.5px solid var(--border);
  border-radius:var(--radius);font-size:14px;cursor:pointer;color:var(--text);
  display:flex;align-items:flex-start;gap:11px;font-family:inherit;
  transition:background .12s,border-color .12s;width:100%;line-height:1.6}
.opt:hover:not(:disabled){background:var(--accent-bg);border-color:var(--accent-border)}
.opt.selected{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.opt.correct{background:var(--success-bg);border-color:var(--success-border);color:var(--success)}
.opt.wrong{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger)}
.opt:disabled{cursor:default}
.opt-lbl{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;
  flex-shrink:0;background:var(--bg2);color:var(--text2);margin-top:1px}
.opt.selected .opt-lbl{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.opt.correct .opt-lbl{background:var(--success-bg);border-color:var(--success-border);color:var(--success)}
.opt.wrong .opt-lbl{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger)}
.expl{font-size:13px;padding:11px 14px;background:var(--bg2);
  border:0.5px solid var(--border);border-radius:var(--radius);
  margin-top:8px;color:var(--text2);line-height:1.7;animation:fi .2s ease}
.expl.correct{background:var(--success-bg);border-color:var(--success-border);color:var(--success)}
.expl.wrong{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger)}
.next-wrap{margin-top:8px}
.result-hero{text-align:center;padding:20px 0 16px}
.result-name{font-size:13px;color:var(--text2);margin-bottom:10px}
.iq-ring{width:148px;height:148px;border-radius:50%;border:2.5px solid var(--accent);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 12px;background:var(--bg2);gap:2px}
.iq-lbl-sm{font-size:10px;color:var(--text2);letter-spacing:.5px}
.iq-val{font-size:44px;font-weight:700;color:var(--accent);line-height:1}
.iq-acc-row{display:flex;align-items:baseline;gap:3px}
.iq-acc-val{font-size:15px;font-weight:700;color:var(--text2)}
.iq-acc-lbl{font-size:10px;color:var(--text3)}
.result-title{font-size:20px;font-weight:700;margin-bottom:8px}
.result-desc{font-size:13px;color:var(--text2);line-height:1.75;max-width:380px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.stat-box{background:var(--bg2);border-radius:var(--radius);padding:12px;text-align:center}
.stat-n{font-size:20px;font-weight:700;color:var(--accent)}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px}
.bkdn-ttl{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;
  letter-spacing:.3px;text-transform:uppercase}
.cat-result{padding:11px 0;border-bottom:0.5px solid var(--border)}
.cat-result:last-child{border-bottom:none}
.cat-result-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.cat-name{font-size:13px;font-weight:500;flex:1}
.cat-pts{font-size:12px;color:var(--accent);font-weight:600;white-space:nowrap}
.cat-bar-wrap{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.cat-bar-fill{height:100%;background:var(--accent);border-radius:3px}
.cat-comment{font-size:12px;color:var(--text3);margin-top:5px;line-height:1.6}
.retry-wrap{display:grid;gap:8px}
.note-sm{font-size:11px;color:var(--text3);text-align:center;line-height:1.7}
</style>
</head>
<body>
<div id="app">
  <div id="s-intro" class="screen"></div>
  <div id="s-test" class="screen" style="display:none"></div>
  <div id="s-result" class="screen" style="display:none"></div>
</div>
<script>
// ═══════════════════════════════════════════════════════════
//  問題バンク（120問）
// ═══════════════════════════════════════════════════════════
const BANK=[
  // ── 数列（32問）──
  {cat:'数列',text:'2, 4, 8, 16, ___',opts:['24','32','30','18'],ans:1,exp:'等比数列（公比2）。16×2＝32。'},
  {cat:'数列',text:'1, 4, 9, 16, ___',opts:['20','23','25','36'],ans:2,exp:'自然数の平方数（5²＝25）。'},
  {cat:'数列',text:'1, 1, 2, 3, 5, 8, ___',opts:['11','12','13','16'],ans:2,exp:'フィボナッチ数列。5+8＝13。'},
  {cat:'数列',text:'100, 50, 25, 12.5, ___',opts:['6','6.25','5','12'],ans:1,exp:'等比数列（公比1/2）。12.5÷2＝6.25。'},
  {cat:'数列',text:'3, 6, 9, 12, ___',opts:['14','15','16','18'],ans:1,exp:'3の倍数。12+3＝15。'},
  {cat:'数列',text:'1, 3, 7, 15, 31, ___',opts:['45','55','63','70'],ans:2,exp:'前の項×2＋1。31×2＋1＝63。'},
  {cat:'数列',text:'2, 5, 10, 17, 26, ___',opts:['35','37','39','41'],ans:1,exp:'差が3,5,7,9,11…。26+11＝37。'},
  {cat:'数列',text:'81, 27, 9, 3, ___',opts:['0','1','2','1.5'],ans:1,exp:'等比数列（公比1/3）。3÷3＝1。'},
  {cat:'数列',text:'0, 1, 3, 6, 10, ___',opts:['13','14','15','16'],ans:2,exp:'三角数（差が1,2,3,4,5…）。10+5＝15。'},
  {cat:'数列',text:'2, 3, 5, 7, 11, ___',opts:['12','13','14','15'],ans:1,exp:'素数の数列。次の素数は13。'},
  {cat:'数列',text:'4, 8, 16, 32, ___',opts:['48','56','64','72'],ans:2,exp:'等比数列（公比2）。32×2＝64。'},
  {cat:'数列',text:'10, 9, 7, 4, ___',opts:['0','1','2','-1'],ans:0,exp:'差が−1,−2,−3,−4…。4−4＝0。'},
  {cat:'数列',text:'1, 8, 27, 64, ___',opts:['100','125','144','216'],ans:1,exp:'自然数の3乗。5³＝125。'},
  {cat:'数列',text:'2, 6, 18, 54, ___',opts:['108','162','216','270'],ans:1,exp:'等比数列（公比3）。54×3＝162。'},
  {cat:'数列',text:'5, 10, 20, 40, ___',opts:['60','70','80','100'],ans:2,exp:'等比数列（公比2）。40×2＝80。'},
  {cat:'数列',text:'1, 2, 4, 7, 11, 16, ___',opts:['20','22','23','25'],ans:1,exp:'差が1,2,3,4,5,6…。16+6＝22。'},
  {cat:'数列',text:'144, 121, 100, 81, ___',opts:['64','63','72','60'],ans:0,exp:'12²,11²,10²,9²,8²＝64。'},
  {cat:'数列',text:'1, 2, 6, 24, ___',opts:['100','110','120','132'],ans:2,exp:'階乗数列。5!＝120。'},
  {cat:'数列',text:'7, 14, 21, 28, ___',opts:['30','33','35','36'],ans:2,exp:'7の倍数。28+7＝35。'},
  {cat:'数列',text:'1, 4, 13, 40, ___',opts:['100','120','121','130'],ans:2,exp:'前の項×3+1。40×3+1＝121。'},
  {cat:'数列',text:'256, 64, 16, 4, ___',opts:['0','1','2','0.5'],ans:1,exp:'等比数列（公比1/4）。4÷4＝1。'},
  {cat:'数列',text:'3, 5, 8, 13, 21, ___',opts:['30','33','34','35'],ans:2,exp:'フィボナッチ型。13+21＝34。'},
  {cat:'数列',text:'1, 5, 14, 30, ___',opts:['50','55','56','60'],ans:1,exp:'差が4,9,16,25…。30+25＝55。'},
  {cat:'数列',text:'2, 4, 6, 10, 16, 26, ___',opts:['36','40','42','44'],ans:2,exp:'前の2項の和。16+26＝42。'},
  {cat:'数列',text:'9, 16, 25, 36, 49, ___',opts:['56','60','64','81'],ans:2,exp:'3²,4²,5²,6²,7²,8²＝64。'},
  {cat:'数列',text:'0, 2, 6, 12, 20, ___',opts:['28','30','32','36'],ans:1,exp:'n(n+1)の数列。5×6＝30。'},
  {cat:'数列',text:'1000, 100, 10, ___',opts:['0','1','5','2'],ans:1,exp:'等比数列（公比1/10）。10÷10＝1。'},
  {cat:'数列',text:'17, 14, 11, 8, ___',opts:['3','4','5','6'],ans:2,exp:'公差−3。8−3＝5。'},
  {cat:'数列',text:'1, 1, 2, 4, 7, 13, ___',opts:['20','24','26','28'],ans:1,exp:'前の3項の和。4+7+13＝24。'},
  {cat:'数列',text:'2, 9, 28, 65, ___',opts:['100','122','126','130'],ans:2,exp:'n³+1。5³+1＝126。'},
  {cat:'数列',text:'120, 60, 20, 5, ___',opts:['0','1','0.5','2'],ans:1,exp:'÷1,÷2,÷3,÷4,÷5。5÷5＝1。'},
  {cat:'数列',text:'4, 7, 12, 19, 28, ___',opts:['37','38','39','40'],ans:2,exp:'差が3,5,7,9,11…。28+11＝39。'},
  // ── 言語類推（28問）──
  {cat:'言語類推',text:'医者 ：病院 ＝ 料理人 ：___',opts:['食事','厨房','食材','レストラン'],ans:1,exp:'医者→病院（職場）、料理人→厨房（職場）。'},
  {cat:'言語類推',text:'犬 ：哺乳類 ＝ バラ ：___',opts:['花','植物','赤い','香り'],ans:1,exp:'犬は哺乳類の下位概念。バラは植物の下位概念。'},
  {cat:'言語類推',text:'足 ：靴 ＝ 頭 ：___',opts:['顔','帽子','髪','耳'],ans:1,exp:'足→靴（履くもの）、頭→帽子。'},
  {cat:'言語類推',text:'昼 ：夜 ＝ 夏 ：___',opts:['春','秋','冬','年'],ans:2,exp:'昼の反対は夜。夏の反対は冬。'},
  {cat:'言語類推',text:'ピアノ ：音楽 ＝ 絵筆 ：___',opts:['絵画','芸術','文学','デザイン'],ans:0,exp:'ピアノは音楽を作る道具。絵筆は絵画を描く道具。'},
  {cat:'言語類推',text:'魚 ：泳ぐ ＝ 鳥 ：___',opts:['走る','飛ぶ','鳴く','生きる'],ans:1,exp:'魚の移動手段は泳ぐ。鳥の移動手段は飛ぶ。'},
  {cat:'言語類推',text:'王 ：女王 ＝ 俳優 ：___',opts:['女優','スター','主役','舞台'],ans:0,exp:'王の女性形は女王。俳優の女性形は女優。'},
  {cat:'言語類推',text:'目 ：見る ＝ 耳 ：___',opts:['顔','聞く','話す','考える'],ans:1,exp:'目の機能は見ること。耳の機能は聞くこと。'},
  {cat:'言語類推',text:'地図 ：地理 ＝ カレンダー ：___',opts:['月','時間','日付','年'],ans:2,exp:'地図→地理（示すもの）、カレンダー→日付。'},
  {cat:'言語類推',text:'木 ：森 ＝ 星 ：___',opts:['月','空','銀河','夜'],ans:2,exp:'木が集まると森。星が集まると銀河。'},
  {cat:'言語類推',text:'寒い ：コート ＝ 雨 ：___',opts:['傘','水','雷','雲'],ans:0,exp:'寒い→コート（対策）、雨→傘。'},
  {cat:'言語類推',text:'学校 ：先生 ＝ 病院 ：___',opts:['患者','医者','薬','看護'],ans:1,exp:'学校→先生、病院→医者（職場と職業）。'},
  {cat:'言語類推',text:'鉛筆 ：文字 ＝ カメラ ：___',opts:['映像','画像','フィルム','光'],ans:1,exp:'鉛筆→文字、カメラ→画像（作るもの）。'},
  {cat:'言語類推',text:'始まり ：終わり ＝ 誕生 ：___',opts:['成長','老い','死','病'],ans:2,exp:'始まりの反対は終わり。誕生の反対は死。'},
  {cat:'言語類推',text:'海 ：波 ＝ 空 ：___',opts:['星','雲','太陽','風'],ans:1,exp:'海には波がある。空には雲がある。'},
  {cat:'言語類推',text:'辞書 ：言葉 ＝ 地図 ：___',opts:['旅','場所','方向','移動'],ans:1,exp:'辞書→言葉、地図→場所（収録されているもの）。'},
  {cat:'言語類推',text:'月 ：地球 ＝ 地球 ：___',opts:['星','宇宙','太陽','銀河'],ans:2,exp:'月は地球の衛星。地球は太陽の周りを回る惑星。'},
  {cat:'言語類推',text:'スピード ：遅い ＝ 音量 ：___',opts:['大きい','静かな','騒がしい','聞こえる'],ans:1,exp:'スピードが遅い↔速い。音量が静か（小さい）↔大きい。'},
  {cat:'言語類推',text:'紙 ：本 ＝ 糸 ：___',opts:['針','縫う','布','綿'],ans:2,exp:'紙が集まると本。糸が集まると布。'},
  {cat:'言語類推',text:'春 ：桜 ＝ 夏 ：___',opts:['紅葉','梅','ひまわり','雪'],ans:2,exp:'春の花は桜。夏の花はひまわり。'},
  {cat:'言語類推',text:'指揮者 ：オーケストラ ＝ 船長 ：___',opts:['海','港','船員','航路'],ans:2,exp:'指揮者はオーケストラを率いる。船長は船員を率いる。'},

const PER_SESSION=18;
const STORAGE_KEY='iq_test_results_v1';

// ═══════════════════════════════════════════════════════════
//  ユーティリティ
// ═══════════════════════════════════════════════════════════
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function pickQuestions(){
  const cats=[...new Set(BANK.map(q=>q.cat))];
  let selected=[];
  const perCat=Math.floor(PER_SESSION/cats.length);
  cats.forEach(c=>{
    const pool=shuffle(BANK.filter(q=>q.cat===c));
    selected.push(...pool.slice(0,perCat));
  });
  const rest=shuffle(BANK.filter(q=>!selected.includes(q)));
  while(selected.length<PER_SESSION&&rest.length)selected.push(rest.shift());
  return shuffle(selected).slice(0,PER_SESSION);
}

function calcIQ(sc,secs){
  let base=70+Math.round(sc*(70/PER_SESSION));
  let bonus=secs<90?10:secs<180?6:secs<300?0:secs<450?-5:-10;
  return Math.min(148,Math.max(62,base+bonus));
}

function show(id){
  ['s-intro','s-test','s-result'].forEach(s=>{
    document.getElementById(s).style.display=(s===id?'block':'none');
  });
}

function fmtDate(iso){
  const d=new Date(iso);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════════════════
//  サーバー送信（save_result.php）
// ═══════════════════════════════════════════════════════════
const GAS_URL='https://script.google.com/macros/s/AKfycbzRKMVdPcDS0bUschN29ITAL9Twa1rp7NZWHK1wnDsFCslzNLKxzbKHwymDMKeliy1lQA/exec';

async function sendToServer(record){
  try{
    // GASはCORSのためno-corsモードで送信（レスポンスは読めないがデータは確実に届く）
    await fetch(GAS_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(record)
    });
    return true;
  }catch(e){
    console.warn('GAS送信失敗（ローカルのみ保存）:',e);
    return false;
  }
}

// ═══════════════════════════════════════════════════════════
//  localStorage 結果管理
// ═══════════════════════════════════════════════════════════
function loadResults(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch{return [];}
}

function saveResult(record){
  const all=loadResults();
  all.push(record);
  localStorage.setItem(STORAGE_KEY,JSON.stringify(all));
}

// ═══════════════════════════════════════════════════════════
//  CSV エクスポート（BOM付き、Excelで文字化けしない）
// ═══════════════════════════════════════════════════════════
function goToResults(){
  const name = currentName || localStorage.getItem('test_player_name') || '';
  window.location.href = 'results.html' + (name ? '?name=' + encodeURIComponent(name) : '');
}
function exportCSV(){
  const all=loadResults();
  if(!all.length){alert('まだ記録がありません。');return;}
  const header='名前,IQ,正解数,正答率(%),所要時間(秒),レベル,実施日時';
  const rows=all.map(r=>[
    `"${(r.name||'').replace(/"/g,'""')}"`,
    r.iq,r.score,r.acc,r.secs,
    `"${(r.level||'').replace(/"/g,'""')}"`,
    `"${fmtDate(r.date)}"`
  ].join(','));
  const csv='\uFEFF'+header+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`IQテスト結果_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function clearHistory(){
  if(confirm('すべての記録を削除しますか？この操作は取り消せません。')){
    localStorage.removeItem(STORAGE_KEY);
    showIntro();
  }
}

// ═══════════════════════════════════════════════════════════
//  テスト開始
// ═══════════════════════════════════════════════════════════
function startTest(){
  const input=document.getElementById('name-input');
  const name=(input?input.value:'').trim();
  if(!name){
    const err=document.getElementById('name-err');
    if(err)err.style.display='block';
    input&&input.focus();
    return;
  }
  currentName=name;
  questions=pickQuestions();
  cur=0;score=0;answers=[];elapsed=0;
  startTime=Date.now();
  show('s-test');
  timerID=setInterval(()=>{
    elapsed=Math.floor((Date.now()-startTime)/1000);
    const t=document.getElementById('timer-el');
    if(t)t.textContent=fmt(elapsed);
  },500);
  renderQ();
}

// ═══════════════════════════════════════════════════════════
//  問題レンダリング
// ═══════════════════════════════════════════════════════════
function renderQ(){
  const q=questions[cur];
  const pct=Math.round((cur/PER_SESSION)*100);
  const lbls=['A','B','C','D'];
  document.getElementById('s-test').innerHTML=`
    <div class="test-hdr">
      <div class="hdr-row">
        <span class="q-label">問題 ${cur+1} <span style="color:var(--text3)">/ ${PER_SESSION}</span></span>
        <span class="timer" id="timer-el">${fmt(elapsed)}</span>
      </div>
      <div class="sub-row">
        <span class="name-badge">${currentName}</span>
        <span style="font-size:11px;color:var(--text3)">正解 ${score}問</span>
      </div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-card">
      <span class="cat-badge">${q.cat}</span>
      ${q.svg?`<div class="q-text q-figure">${q.text}</div>`:`<p class="q-text">${q.text}</p>`}
    </div>
    <div class="opts" id="opts-area">
      ${q.opts.map((o,i)=>`<button class="opt" onclick="answer(${i})"><span class="opt-lbl">${lbls[i]}</span>${o}</button>`).join('')}
    </div>
    <div id="expl-area"></div>
  `;
}

// ═══════════════════════════════════════════════════════════
//  回答処理
// ═══════════════════════════════════════════════════════════
function answer(idx){
  const q=questions[cur];
  const ok=(idx===q.ans);
  if(ok)score++;
  answers.push({ok,cat:q.cat,q:q.text.split('\n')[0]});
  document.querySelectorAll('.opt').forEach((b,i)=>{
    b.classList.add('disabled');
    if(i===q.ans&&i!==idx)b.classList.add('missed');
    else if(i===q.ans)b.classList.add('correct');
    else if(i===idx)b.classList.add('wrong');
  });
  document.getElementById('expl-area').innerHTML=`
    <div class="expl">${q.exp}</div>
    <div class="next-wrap">
      <button class="btn-ghost" onclick="nextQ()">${cur+1<PER_SESSION?'次の問題へ →':'結果を見る →'}</button>
    </div>
  `;
}

function nextQ(){
  cur++;
  if(cur>=PER_SESSION){
    clearInterval(timerID);
    elapsed=Math.floor((Date.now()-startTime)/1000);
    showResult();
  }else renderQ();
}

// ═══════════════════════════════════════════════════════════
//  結果画面 & 自動保存
// ═══════════════════════════════════════════════════════════
function showResult(){
  const iq=calcIQ(score,elapsed);
  const lvl=LEVELS.find(l=>iq>=l.min)||LEVELS[LEVELS.length-1];
  const acc=Math.round((score/PER_SESSION)*100);

  // カテゴリ別集計
  const catMap={};
  answers.forEach(a=>{
    if(!catMap[a.cat])catMap[a.cat]={ok:0,total:0};
    catMap[a.cat].total++;
    if(a.ok)catMap[a.cat].ok++;
  });

  // 保存レコード作成
  const record={
    name:currentName,testType:'IQ',iq,score,acc,secs:elapsed,
    level:lvl.label,date:new Date().toISOString(),
    catBreakdown:catMap
  };

  // localStorage に自動保存
  saveResult(record);

  // サーバー（Googleスプレッドシート）にも送信（非同期）
  const savedEl=document.getElementById('save-status');
  sendToServer(record).then(ok=>{
    if(savedEl){
      savedEl.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>'
        +(ok?' Googleスプレッドシートに結果を送信しました':' ローカルに保存しました（送信失敗）');
      if(!ok){savedEl.style.background='var(--danger-bg)';savedEl.style.borderColor='var(--danger-border)';savedEl.style.color='var(--danger)';}
    }
  });

  const catRows=Object.entries(catMap).map(([cat,v])=>{
    const p=Math.round((v.ok/v.total)*100);
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px">
      <span style="flex:1;color:var(--text)">${cat}</span>
      <span style="color:var(--text2)">${v.ok}/${v.total}</span>
      <div style="width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden">
        <div style="width:${p}%;height:100%;background:var(--success);border-radius:2px"></div>
      </div>
      <span style="color:var(--text2);width:32px;text-align:right">${p}%</span>
    </div>`;
  }).join('');

  document.getElementById('s-result').innerHTML=`
    <div class="card">
      <div class="result-hero">
        <p class="result-name">${currentName} さんの結果</p>
        <div class="iq-ring">
          <span class="iq-lbl-sm">IQ 換算スコア</span>
          <span class="iq-val">${iq}</span>
          <div class="iq-acc-row">
            <span class="iq-acc-val">${acc}%</span>
            <span class="iq-acc-lbl">正答率</span>
          </div>
        </div>
        <h2 class="result-title">${lvl.label}</h2>
        <p class="result-desc">${lvl.desc}</p>
        <p style="font-size:11px;color:var(--text3);margin-top:10px;line-height:1.7">
          ※ IQ換算スコアは正答率と所要時間から算出した簡易推定値です（平均100・範囲62〜148）
        </p>
        <div id="save-status" class="save-notice">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          サーバーに送信中...
        </div>
      </div>
      <div class="stats" style="grid-template-columns:repeat(4,1fr)">
        <div class="stat-box"><div class="stat-n">${iq}</div><div class="stat-l">IQ換算</div></div>
        <div class="stat-box"><div class="stat-n">${acc}%</div><div class="stat-l">正答率</div></div>
        <div class="stat-box"><div class="stat-n">${score}/${PER_SESSION}</div><div class="stat-l">正解数</div></div>
        <div class="stat-box"><div class="stat-n">${fmt(elapsed)}</div><div class="stat-l">所要時間</div></div>
      </div>
    </div>

    <div class="card">
      <p class="bkdn-ttl">カテゴリ別スコア</p>
      ${catRows}
    </div>

    <div class="card">
      <p class="bkdn-ttl">問題ごとの結果</p>
      ${answers.map((a,i)=>`
        <div class="bk-item">
          <span class="bk-dot ${a.ok?'bk-ok':'bk-ng'}">${a.ok?'✓':'✕'}</span>
          <span class="bk-q">Q${i+1}. ${a.q}</span>
          <span class="bk-cat">${a.cat}</span>
        </div>`).join('')}
    </div>

    <div class="retry-wrap">
      <button class="btn-primary" onclick="startTest()">もう一度挑戦する（新しい12問）→</button>
      <button class="btn-ghost" onclick="exportCSV()">結果をCSVでダウンロード</button>
      <button class="btn-ghost" onclick="showIntro()">トップへ戻る</button>
      <button class="btn-ghost" onclick="goToResults()">📊 結果をまとめて確認する →</button>
    </div>
    <p class="note-sm" style="margin-top:12px">※このテストは簡易的な目安です。正式なIQ測定は専門機関で受検ください。</p>
  `;
  show('s-result');
}

// 初期化
showIntro();
