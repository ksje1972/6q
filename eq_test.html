<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EQテスト（感情知性テスト）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
  --text:#1a1a18;--text2:#6b6b66;--text3:#9a9a94;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --accent:#7c5cbf;--accent-bg:#f2eefb;--accent-border:rgba(124,92,191,0.3);
  --success:#2d7a3a;--success-bg:#eef6f0;--success-border:rgba(45,122,58,0.3);
  --info-bg:#eef3fb;--info-border:rgba(40,80,160,0.25);--info:#1a4fa0;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252522;--bg3:#2e2e2b;
  --text:#f0f0ec;--text2:#a0a09a;--text3:#686862;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --accent:#a98be0;--accent-bg:rgba(124,92,191,0.15);--accent-border:rgba(169,139,224,0.4);
  --success:#4caf60;--success-bg:rgba(76,175,96,0.12);--success-border:rgba(76,175,96,0.35);
  --info-bg:rgba(60,100,200,0.12);--info-border:rgba(100,150,255,0.3);--info:#7aaaff;
}}
body{background:var(--bg3);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  padding:24px 16px 60px}
#app{width:100%;max-width:560px}
.screen{animation:fi .28s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* カード */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:12px}
.card-sm{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px}

/* イントロ ヘッダー */
.intro-header{display:flex;align-items:center;gap:14px;padding-bottom:18px;
  border-bottom:0.5px solid var(--border);margin-bottom:20px}
.intro-logo{width:52px;height:52px;border-radius:50%;background:var(--accent-bg);
  border:0.5px solid var(--accent-border);display:flex;align-items:center;
  justify-content:center;font-size:26px;flex-shrink:0}
.intro-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:3px}
.intro-sub{font-size:11px;color:var(--accent);font-weight:500;letter-spacing:.4px}

/* メタグリッド */
.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.meta-box{background:var(--bg2);border-radius:var(--radius);padding:12px 8px;text-align:center}
.meta-n{font-size:18px;font-weight:700;color:var(--accent)}.meta-l{font-size:10px;color:var(--text3);margin-top:2px}

/* カテゴリピル */
.cats-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.cat-pill{font-size:11px;padding:3px 10px;border-radius:100px;
  background:var(--accent-bg);color:var(--accent);border:0.5px solid var(--accent-border)}

/* 注意書き */
.notice-box{background:var(--accent-bg);border:0.5px solid var(--accent-border);
  border-radius:var(--radius);padding:12px 14px;font-size:12px;color:var(--accent);
  margin-bottom:18px;line-height:1.75}

/* 名前入力 */
.name-section{margin-bottom:16px}
.name-row-input{display:flex;align-items:center;gap:10px;padding:11px 14px;
  border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2)}
.name-row-input:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.name-label{font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0}
.name-input{flex:1;border:none;outline:none;font-size:15px;background:transparent;
  color:var(--text);font-family:inherit}
.name-input::placeholder{color:var(--text3)}
.name-error{font-size:12px;color:#c0392b;margin-top:6px;display:none}

/* ボタン */
.btn-primary{display:block;width:100%;padding:14px;background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius);font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-primary:hover{opacity:.85}.btn-primary:active{transform:scale(.98)}
.btn-ghost{display:block;width:100%;padding:12px;background:var(--bg);color:var(--text);
  border:0.5px solid var(--border2);border-radius:var(--radius);font-size:14px;
  font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-ghost:hover{background:var(--bg2)}.btn-ghost:active{transform:scale(.98)}
.btn-sm{padding:5px 10px;background:var(--bg);color:var(--text2);
  border:0.5px solid var(--border2);border-radius:var(--radius);
  font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-sm:hover{background:var(--bg2)}

/* 履歴 */
.hist-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hist-ttl{font-size:12px;font-weight:500;color:var(--text2)}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 0;
  border-bottom:0.5px solid var(--border);font-size:13px}
.hist-item:last-child{border-bottom:none}
.hist-eq{font-size:18px;font-weight:700;color:var(--accent);min-width:36px}
.hist-meta{flex:1;min-width:0}
.hist-name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-date{font-size:11px;color:var(--text3);margin-top:1px}
.hist-score{font-size:12px;color:var(--text2);text-align:right;white-space:nowrap;flex-shrink:0}
.hist-empty{font-size:13px;color:var(--text3);padding:12px 0;text-align:center}

/* テスト画面 */
.test-hdr{margin-bottom:14px}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.q-label{font-size:13px;color:var(--text2)}
.timer{font-size:12px;font-variant-numeric:tabular-nums;color:var(--text2);
  background:var(--bg2);padding:3px 10px;border-radius:100px;border:0.5px solid var(--border)}
.sub-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.name-badge{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.pbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:2px}
.pfill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}

/* 問題カード */
.q-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:10px}
.cat-badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;
  font-weight:500;margin-bottom:10px;background:var(--accent-bg);
  color:var(--accent);border:0.5px solid var(--accent-border)}
.q-text{font-size:15px;line-height:1.85;white-space:pre-line;color:var(--text)}
.opts{display:grid;gap:7px;margin-bottom:8px}
.opt{text-align:left;padding:12px 14px;background:var(--bg);border:0.5px solid var(--border);
  border-radius:var(--radius);font-size:14px;cursor:pointer;color:var(--text);
  display:flex;align-items:flex-start;gap:11px;font-family:inherit;
  transition:background .12s,border-color .12s;width:100%;line-height:1.6}
.opt:hover:not(.disabled){background:var(--accent-bg);border-color:var(--accent-border)}
.opt.selected{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.opt.disabled{cursor:default;pointer-events:none}
.opt-lbl{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;
  flex-shrink:0;background:var(--bg2);color:var(--text2);margin-top:1px}
.opt.selected .opt-lbl{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.expl{font-size:13px;padding:11px 14px;background:var(--accent-bg);
  border:0.5px solid var(--accent-border);border-radius:var(--radius);
  margin-top:8px;color:var(--accent);line-height:1.7;animation:fi .2s ease}
.next-wrap{margin-top:8px}

/* 結果画面 */
.result-hero{text-align:center;padding:20px 0 16px}
.result-name{font-size:13px;color:var(--text2);margin-bottom:10px}
.eq-ring{width:136px;height:136px;border-radius:50%;border:2.5px solid var(--accent);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 12px;background:var(--bg2)}
.eq-lbl-sm{font-size:10px;color:var(--text2);letter-spacing:.5px;margin-bottom:2px}
.eq-val{font-size:46px;font-weight:700;color:var(--accent);line-height:1}
.result-title{font-size:20px;font-weight:700;margin-bottom:8px}
.result-desc{font-size:13px;color:var(--text2);line-height:1.75;max-width:380px;margin:0 auto}
.save-notice{display:flex;align-items:center;gap:8px;font-size:11px;padding:9px 12px;
  background:var(--info-bg);border:0.5px solid var(--info-border);
  border-radius:var(--radius);color:var(--info);margin-top:12px}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.stat-box{background:var(--bg2);border-radius:var(--radius);padding:12px;text-align:center}
.stat-n{font-size:20px;font-weight:700;color:var(--accent)}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px}
.bkdn-ttl{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;
  letter-spacing:.3px;text-transform:uppercase}
.cat-result{padding:11px 0;border-bottom:0.5px solid var(--border)}
.cat-result:last-child{border-bottom:none}
.cat-result-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.cat-name{font-size:13px;font-weight:500;flex:1}
.cat-pts{font-size:12px;color:var(--accent);font-weight:600;white-space:nowrap}
.cat-bar-wrap{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.cat-bar-fill{height:100%;background:var(--accent);border-radius:3px}
.cat-comment{font-size:12px;color:var(--text3);margin-top:5px;line-height:1.6}
.retry-wrap{display:grid;gap:8px}
.note-sm{font-size:11px;color:var(--text3);text-align:center;line-height:1.7}
</style>
</head>
<body>
<div id="app">
  <div id="s-intro" class="screen"></div>
  <div id="s-test"  class="screen" style="display:none"></div>
  <div id="s-result" class="screen" style="display:none"></div>
</div>
<script>
// ═══════════════════════════════════════════════════════════
//  問題バンク（100問）
//
//  設計方針：
//  ・4択すべてが「普通の人が選びそうな行動」として書く
//  ・EQの落とし穴を仕込む
//    例）「いつもポジティブでいる」→感情抑圧で低スコア
//       「相手のために我慢する」→自己管理ではなく回避
//       「すぐ謝る」→反射的謝罪は自己認識の欠如
//       「共感してあげる」→主語が「あげる」は上から目線
//  ・点数差は微妙にする（5-4-3-2 でなく 5-4-4-3 も多用）
//  ・正解が「地味で当たり前」に見えるものを多く含める
// ═══════════════════════════════════════════════════════════
const BANK=[

  // ── 自己認識（20問）──
  {cat:'自己認識',
   text:'職場の同僚に「最近少し余裕なさそうだね」と言われた。\n自分ではそんなつもりはなかった。どうする？',
   opts:['「そんなことないよ、大丈夫」と答えて話を終わらせる',
         '「そう見える？少し考えてみる」と一旦受け取る',
         '「実はちょっと忙しくて」と状況を説明する',
         '「気を遣わせてごめん」とすぐ謝る'],
   scores:[3,5,4,3],
   exp:'他者の観察を「自分を知るヒント」として受け取れることが自己認識の重要なスキルです。「謝る」や「否定する」は自己認識の機会を逃します。'},

  {cat:'自己認識',
   text:'大事な会議で自分の発言がうまく伝わらなかった。\n会議のあと、何を考えますか？',
   opts:['「場の雰囲気が悪かった」と振り返る',
         '「伝え方のどこが問題だったか」を具体的に考える',
         '「次はもっと準備しよう」とすぐ気持ちを切り替える',
         '「自分は人前で話すのが苦手だ」と再確認する'],
   scores:[2,5,4,3],
   exp:'「準備不足」という結論より「何がどう伝わらなかったか」を具体的に分析できる人は自己認識が高いです。'},

  {cat:'自己認識',
   text:'急に理由もなく気分が落ち込んでいるとき、\nどう対処しますか？',
   opts:['気分転換に外出したり音楽を聴いたりする',
         '「なぜこんな気分なのか」を少し掘り下げて考える',
         '「疲れているだけだ」と思ってそのまま過ごす',
         '落ち込んでいる自分を責める'],
   scores:[4,5,3,2],
   exp:'気分転換も大切ですが、「なぜ」という問いを持てる人は感情をより深く理解できます。気分転換のみでは根本の認識が進みません。'},

  {cat:'自己認識',
   text:'長年の友人から「あなたって頑固なところがあるよね」と言われた。\n自分ではそう思っていなかったとき、どうする？',
   opts:['「そういう一面もあるかもしれない」と考え込む',
         '「どういう場面でそう感じた？」と聞いてみる',
         '「でも私なりの理由があるから」と説明する',
         '「長い付き合いなのにそう見えるんだ」とショックを受ける'],
   scores:[4,5,3,2],
   exp:'「なぜそう見えるか」を具体的に聞けることで、自己認識がより正確に更新されます。ショックを受けるだけでは認識が進みません。'},

  {cat:'自己認識',
   text:'自分がどんな状況でイライラするか、\n説明できますか？',
   opts:['特定のパターンがあり、具体的に説明できる',
         '「理不尽なことがあったとき」くらいは言える',
         '考えてみたことがなかった',
         '「あまりイライラしない方だと思う」と答える'],
   scores:[5,4,3,2],
   exp:'「イライラしない」という認識も一つのパターンですが、感情のトリガーを具体的に把握していることが自己認識の深さを示します。'},

  {cat:'自己認識',
   text:'同じミスを何度も繰り返していることに気づいた。\nどう解釈しますか？',
   opts:['「注意力が足りないんだと思う」',
         '「このミスにはどんな状況的・感情的パターンがあるか」を考える',
         '「次こそ気をつけよう」と気合を入れる',
         '「誰でもミスはするから仕方ない」と受け入れる'],
   scores:[3,5,4,3],
   exp:'繰り返すミスの背景にある状況や感情のパターンを探れる人は、根本的な自己理解ができています。「気をつける」だけでは再発を防げません。'},

  {cat:'自己認識',
   text:'自分が「うれしい」と感じているとき、\nその感情の正体は何だと思いますか？',
   opts:['考えたことがない。うれしいはうれしいだと思う',
         '「承認された」「達成した」「つながれた」など種類がある気がする',
         '「なんかいい感じ」という感覚は把握している',
         'ポジティブな感情はあまり深く分析しない'],
   scores:[2,5,3,3],
   exp:'ポジティブな感情にも種類があります。「なぜうれしいか」を理解することで自分の動機や価値観への深い洞察が生まれます。'},

  {cat:'自己認識',
   text:'誰かとの会話の後で「なんか変なこと言ったかな」と\n気になって仕方なくなることがあります。どう対処しますか？',
   opts:['「気にしすぎだ」と自分に言い聞かせる',
         '「なぜそこまで気になるのか」という自分の傾向に目を向ける',
         '相手にメッセージを送って確認する',
         'しばらく引きずるが時間が解決すると思う'],
   scores:[3,5,4,3],
   exp:'「なぜ自分はこんなに気になるのか」という問いが、自己認識を深めます。確認するのは行動ですが、まず自分の傾向を知ることが先です。'},

  {cat:'自己認識',
   text:'重要な決断をしたあとで後悔することが多い。\nこれについてどう捉えていますか？',
   opts:['「優柔不断な性格だから仕方ない」',
         '「決断のどの段階で迷いが生まれるか」をパターンとして把握している',
         '「次は後悔しないよう慎重にしよう」と思う',
         '「後悔するのは真剣に考えた証拠だ」と前向きに捉える'],
   scores:[2,5,3,4],
   exp:'後悔のパターンを具体的に把握できている人は、次の決断の質を改善できます。「前向きに捉える」だけでは自己認識が深まりません。'},

  {cat:'自己認識',
   text:'他人から批判されたとき、最初に湧く感情は何ですか？\nそれを把握していますか？',
   opts:['だいたい「悔しさ」か「傷つき」かはわかる',
         '批判の内容によって違うが、どんな批判でどう感じるかを把握している',
         '「批判されるのは嫌」という感覚はある',
         '批判には慣れているのであまり感じない'],
   scores:[4,5,3,3],
   exp:'批判の「内容」によって自分の反応がどう変わるかを把握している人は、自己認識がより精緻です。'},

  {cat:'自己認識',
   text:'「あなたの価値観は？」と聞かれたとき、\n最もあなたに近いのは？',
   opts:['3つ以上、優先順位と理由も含めて答えられる',
         '「誠実さ・成長」など2つくらいは挙げられる',
         '「人によって変わる」と思っているので難しい',
         'その場その場で大事なものが違う気がする'],
   scores:[5,4,3,3],
   exp:'価値観の優先順位まで把握できている人は、岐路に立ったとき一貫した判断ができます。「人による」は価値観の特定を回避しています。'},

  {cat:'自己認識',
   text:'親しい人に「あなたは話を聞いてくれない」と言われた。\n自分では聞いているつもりだった場合、どうしますか？',
   opts:['「そんなことない、ちゃんと聞いてる」と反論する',
         '「どういう場面でそう感じた？」と具体例を聞く',
         '「そうか、気をつけよう」と素直に受け入れる',
         '「あなたの話し方にも問題があるかも」と思う'],
   scores:[2,5,4,2],
   exp:'「素直に受け入れる」は良いことですが、「どんな場面で？」と具体化することで自己認識がより正確になります。'},

  {cat:'自己認識',
   text:'ある人と会った後、なぜか毎回疲れる。\nあなたはどう考えますか？',
   opts:['「相性が悪い人なんだと思う」',
         '「その人の何が自分にとって消耗するのかを考えてみる」',
         '「付き合い方を変えてみよう」と対策を考える',
         '「自分が社交的でないだけだ」と思う'],
   scores:[3,5,4,3],
   exp:'「相性が悪い」で終わらせず、「何が消耗させるのか」を掘り下げられる人は自己認識が深いです。対策も大切ですが認識が先です。'},

  {cat:'自己認識',
   text:'自分が今どんな感情状態にあるか、\n正確に言葉にできますか？',
   opts:['「まあ普通」「なんとなく不安」程度には言える',
         '「少し焦りと期待が混在している」など複数の感情を区別できる',
         '感情より今日のタスクの方が頭にある',
         'あまり自分の状態を気にしない方だ'],
   scores:[4,5,3,2],
   exp:'複数の感情が同時に存在することを認識できる人は感情の粒度が高く、自己認識が精緻です。'},

  {cat:'自己認識',
   text:'「自分のここが嫌い」と感じている部分があるとき、\nどう向き合っていますか？',
   opts:['なるべく考えないようにしている',
         '「なぜそこが嫌いなのか」を少し掘り下げて考えたことがある',
         '「誰にでも欠点はある」と受け入れている',

const PER_SESSION=20,CAT_PER=4;
const STORAGE_KEY='eq_test_results_v3';
const GAS_URL='https://script.google.com/macros/s/AKfycbzRKMVdPcDS0bUschN29ITAL9Twa1rp7NZWHK1wnDsFCslzNLKxzbKHwymDMKeliy1lQA/exec';
let questions=[],cur=0,totalScore=0,elapsed=0,startTime=0,timerID=null,catScores={},currentName='';

function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ★ 選択肢と点数をセットでシャッフル
function shuffleOpts(q){
  const pairs=shuffle(q.opts.map((o,i)=>({o,s:q.scores[i]})));
  return {...q,opts:pairs.map(p=>p.o),scores:pairs.map(p=>p.s)};
}

function pickQuestions(){
  const cats=[...new Set(BANK.map(q=>q.cat))];
  let sel=[];
  cats.forEach(c=>{const pool=shuffle(BANK.filter(q=>q.cat===c));sel.push(...pool.slice(0,CAT_PER));});
  return shuffle(sel).map(q=>shuffleOpts(q));
}

function show(id){['s-intro','s-test','s-result'].forEach(s=>{document.getElementById(s).style.display=(s===id?'block':'none');});}
function fmtDate(iso){const d=new Date(iso);return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function loadResults(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch{return[];}}
function saveResult(r){const all=loadResults();all.push(r);localStorage.setItem(STORAGE_KEY,JSON.stringify(all));}
async function sendToServer(record){
  try{await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(record)});return true;}
  catch(e){return false;}
}

function startTest(){
  const input=document.getElementById('name-input');
  const name=(input?input.value:'').trim();
  if(!name){const err=document.getElementById('name-err');if(err)err.style.display='block';input&&input.focus();return;}
  currentName=name;questions=pickQuestions();cur=0;totalScore=0;elapsed=0;catScores={};
  questions.forEach(q=>{if(!catScores[q.cat])catScores[q.cat]=0;});
  startTime=Date.now();show('s-test');
  timerID=setInterval(()=>{elapsed=Math.floor((Date.now()-startTime)/1000);const t=document.getElementById('timer-el');if(t)t.textContent=fmt(elapsed);},500);
  renderQ();
}

function renderQ(){
  const q=questions[cur];
  const pct=Math.round((cur/PER_SESSION)*100);
  const lbls=['A','B','C','D'];
  document.getElementById('s-test').innerHTML=`
    <div class="test-hdr">
      <div class="hdr-row">
        <span class="q-label">問題 ${cur+1} <span style="color:var(--text3)">/ ${PER_SESSION}</span></span>
        <span class="timer" id="timer-el">${fmt(elapsed)}</span>
      </div>
      <div class="sub-row">
        <span class="name-badge">${currentName}</span>
        <span style="font-size:11px;color:var(--text3)">${q.cat}</span>
      </div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-card">
      <span class="cat-badge">${q.cat}</span>
      <p class="q-text">${q.text}</p>
    </div>
    <div class="opts" id="opts-area">
      ${q.opts.map((o,i)=>`
        <button class="opt" onclick="answer(${i})">
          <span class="opt-lbl">${lbls[i]}</span>
          <span style="flex:1">${o}</span>
        </button>`).join('')}
    </div>
    <div id="expl-area"></div>`;
}

function answer(idx){
  const q=questions[cur];
  const pts=q.scores[idx];
  totalScore+=pts;catScores[q.cat]=(catScores[q.cat]||0)+pts;
  document.querySelectorAll('.opt').forEach((b,i)=>{b.classList.add('disabled');if(i===idx)b.classList.add('selected');});
  // ★ 点数は非表示・解説のみ
  document.getElementById('expl-area').innerHTML=`
    <div class="expl">${q.exp}</div>
    <div class="next-wrap">
      <button class="btn-ghost" onclick="nextQ()">${cur+1<PER_SESSION?'次の問題へ →':'結果を見る →'}</button>
    </div>`;
}

function nextQ(){
  cur++;
  if(cur>=PER_SESSION){clearInterval(timerID);elapsed=Math.floor((Date.now()-startTime)/1000);showResult();}
  else renderQ();
}

function showResult(){
  const eq=totalScore;
  const lvl=LEVELS.find(l=>eq>=l.min)||LEVELS[LEVELS.length-1];
  const catMax=CAT_PER*5;
  const catResults=Object.entries(catScores).map(([cat,sc])=>({
    cat,sc,pct:Math.round((sc/catMax)*100),
    comment:sc/catMax>=0.8?CAT_COMMENTS[cat].hi:sc/catMax>=0.6?CAT_COMMENTS[cat].mid:CAT_COMMENTS[cat].lo
  }));
  const catBreakdown={};catResults.forEach(r=>{catBreakdown[r.cat]={score:r.sc,max:catMax,pct:r.pct};});
  const record={testType:'EQ',name:currentName,eq,score:totalScore,maxScore:PER_SESSION*5,acc:Math.round((totalScore/(PER_SESSION*5))*100),secs:elapsed,level:lvl.label,date:new Date().toISOString(),catBreakdown};
  saveResult(record);
  sendToServer(record).then(ok=>{
    const el=document.getElementById('save-status');
    if(el)el.innerHTML=ok
      ?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Googleスプレッドシートに送信しました'
      :'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ローカルに保存（送信失敗）';
  });
  document.getElementById('s-result').innerHTML=`
    <div class="card">
      <div class="result-hero">
        <p class="result-name">${currentName} さんの結果</p>
        <div class="eq-ring"><span class="eq-lbl-sm">EQ</span><span class="eq-val">${eq}</span></div>
        <h2 class="result-title">${lvl.label}</h2>
        <p class="result-desc">${lvl.desc}</p>
        <div id="save-status" class="save-notice">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          送信中...
        </div>
      </div>
      <div class="stats">
        <div class="stat-box"><div class="stat-n">${eq}</div><div class="stat-l">EQスコア（/100）</div></div>
        <div class="stat-box"><div class="stat-n">${Math.round((totalScore/(PER_SESSION*5))*100)}%</div><div class="stat-l">達成率</div></div>
        <div class="stat-box"><div class="stat-n">${fmt(elapsed)}</div><div class="stat-l">所要時間</div></div>
      </div>
    </div>
    <div class="card">
      <p class="bkdn-ttl">カテゴリ別スコアと改善ポイント</p>
      ${catResults.map(r=>`
        <div class="cat-result">
          <div class="cat-result-row">
            <span class="cat-name">${r.cat}</span>
            <span class="cat-pts">${r.sc}/${catMax}点（${r.pct}%）</span>
          </div>
          <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${r.pct}%"></div></div>
          <p class="cat-comment">${r.comment}</p>
        </div>`).join('')}
    </div>
    <div class="retry-wrap">
      <button class="btn-primary" onclick="startTest()">もう一度挑戦する（新しい20問）→</button>
      <button class="btn-ghost" onclick="exportCSV()">結果をCSVでダウンロード</button>
      <button class="btn-ghost" onclick="showIntro()">トップへ戻る</button>
      <button class="btn-ghost" onclick="goToResults()">📊 結果をまとめて確認する →</button>
    </div>
    <p class="note-sm" style="margin-top:12px">※このテストは簡易的な目安です。正式な評価は専門家にご相談ください。<br>Created by S.O.Y</p>`;
  show('s-result');
}

function goToResults(){
  const name = currentName || localStorage.getItem('test_player_name') || '';
  window.location.href = 'results.html' + (name ? '?name=' + encodeURIComponent(name) : '');
}
function exportCSV(){
  const all=loadResults();if(!all.length){alert('まだ記録がありません。');return;}
  const header='名前,EQスコア,達成率(%),所要時間(秒),レベル,実施日時';
  const rows=all.map(r=>[`"${(r.name||'').replace(/"/g,'""')}"`,r.eq,r.acc,r.secs,`"${(r.level||'').replace(/"/g,'""')}"`,`"${fmtDate(r.date)}"`].join(','));
  const csv='\uFEFF'+header+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`EQテスト結果_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

showIntro();
</script>
</body>
</html>
