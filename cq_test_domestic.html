<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CQテスト 国内版（文化的知性テスト）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
  --text:#1a1a18;--text2:#6b6b66;--text3:#9a9a94;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --accent:#0F766E;--accent-bg:#CCFBF1;--accent-border:rgba(15,118,110,0.3);
  --success:#2d7a3a;--success-bg:#eef6f0;--success-border:rgba(45,122,58,0.3);
  --info-bg:#eef3fb;--info-border:rgba(40,80,160,0.25);--info:#1a4fa0;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252522;--bg3:#2e2e2b;
  --text:#f0f0ec;--text2:#a0a09a;--text3:#686862;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --accent:#5EEAD4;--accent-bg:rgba(15,118,110,0.15);--accent-border:rgba(94,234,212,0.4);
  --success:#4caf60;--success-bg:rgba(76,175,96,0.12);--success-border:rgba(76,175,96,0.35);
  --info-bg:rgba(60,100,200,0.12);--info-border:rgba(100,150,255,0.3);--info:#7aaaff;
}}
body{background:var(--bg3);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  padding:24px 16px 60px}
#app{width:100%;max-width:560px}
.screen{animation:fi .28s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* カード */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:12px}
.card-sm{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px}

/* イントロ ヘッダー */
.intro-header{display:flex;align-items:center;gap:14px;padding-bottom:18px;
  border-bottom:0.5px solid var(--border);margin-bottom:20px}
.intro-logo{width:52px;height:52px;border-radius:50%;background:var(--accent-bg);
  border:0.5px solid var(--accent-border);display:flex;align-items:center;
  justify-content:center;font-size:26px;flex-shrink:0}
.intro-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:3px}
.intro-sub{font-size:11px;color:var(--accent);font-weight:500;letter-spacing:.4px}

/* メタグリッド */
.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.meta-box{background:var(--bg2);border-radius:var(--radius);padding:12px 8px;text-align:center}
.meta-n{font-size:18px;font-weight:700;color:var(--accent)}.meta-l{font-size:10px;color:var(--text3);margin-top:2px}

/* カテゴリピル */
.cats-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.cat-pill{font-size:11px;padding:3px 10px;border-radius:100px;
  background:var(--accent-bg);color:var(--accent);border:0.5px solid var(--accent-border)}

/* 注意書き */
.notice-box{background:var(--accent-bg);border:0.5px solid var(--accent-border);
  border-radius:var(--radius);padding:12px 14px;font-size:12px;color:var(--accent);
  margin-bottom:18px;line-height:1.75}

/* 名前入力 */
.name-section{margin-bottom:16px}
.name-row-input{display:flex;align-items:center;gap:10px;padding:11px 14px;
  border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2)}
.name-row-input:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.name-label{font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0}
.name-input{flex:1;border:none;outline:none;font-size:15px;background:transparent;
  color:var(--text);font-family:inherit}
.name-input::placeholder{color:var(--text3)}
.name-error{font-size:12px;color:#c0392b;margin-top:6px;display:none}

/* ボタン */
.btn-primary{display:block;width:100%;padding:14px;background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius);font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-primary:hover{opacity:.85}.btn-primary:active{transform:scale(.98)}
.btn-ghost{display:block;width:100%;padding:12px;background:var(--bg);color:var(--text);
  border:0.5px solid var(--border2);border-radius:var(--radius);font-size:14px;
  font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-ghost:hover{background:var(--bg2)}.btn-ghost:active{transform:scale(.98)}
.btn-sm{padding:5px 10px;background:var(--bg);color:var(--text2);
  border:0.5px solid var(--border2);border-radius:var(--radius);
  font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-sm:hover{background:var(--bg2)}

/* 履歴 */
.hist-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hist-ttl{font-size:12px;font-weight:500;color:var(--text2)}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 0;
  border-bottom:0.5px solid var(--border);font-size:13px}
.hist-item:last-child{border-bottom:none}
.hist-eq{font-size:18px;font-weight:700;color:var(--accent);min-width:36px}
.hist-meta{flex:1;min-width:0}
.hist-name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-date{font-size:11px;color:var(--text3);margin-top:1px}
.hist-score{font-size:12px;color:var(--text2);text-align:right;white-space:nowrap;flex-shrink:0}
.hist-empty{font-size:13px;color:var(--text3);padding:12px 0;text-align:center}

/* テスト画面 */
.test-hdr{margin-bottom:14px}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.q-label{font-size:13px;color:var(--text2)}
.timer{font-size:12px;font-variant-numeric:tabular-nums;color:var(--text2);
  background:var(--bg2);padding:3px 10px;border-radius:100px;border:0.5px solid var(--border)}
.sub-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.name-badge{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.pbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:2px}
.pfill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}

/* 問題カード */
.q-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:10px}
.cat-badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;
  font-weight:500;margin-bottom:10px;background:var(--accent-bg);
  color:var(--accent);border:0.5px solid var(--accent-border)}
.q-text{font-size:15px;line-height:1.85;white-space:pre-line;color:var(--text)}
.opts{display:grid;gap:7px;margin-bottom:8px}
.opt{text-align:left;padding:12px 14px;background:var(--bg);border:0.5px solid var(--border);
  border-radius:var(--radius);font-size:14px;cursor:pointer;color:var(--text);
  display:flex;align-items:flex-start;gap:11px;font-family:inherit;
  transition:background .12s,border-color .12s;width:100%;line-height:1.6}
.opt:hover:not(.disabled){background:var(--accent-bg);border-color:var(--accent-border)}
.opt.selected{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.opt.disabled{cursor:default;pointer-events:none}
.opt-lbl{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;
  flex-shrink:0;background:var(--bg2);color:var(--text2);margin-top:1px}
.opt.selected .opt-lbl{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.expl{font-size:13px;padding:11px 14px;background:var(--accent-bg);
  border:0.5px solid var(--accent-border);border-radius:var(--radius);
  margin-top:8px;color:var(--accent);line-height:1.7;animation:fi .2s ease}
.next-wrap{margin-top:8px}

/* 結果画面 */
.result-hero{text-align:center;padding:20px 0 16px}
.result-name{font-size:13px;color:var(--text2);margin-bottom:10px}
.eq-ring{width:136px;height:136px;border-radius:50%;border:2.5px solid var(--accent);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 12px;background:var(--bg2)}
.eq-lbl-sm{font-size:10px;color:var(--text2);letter-spacing:.5px;margin-bottom:2px}
.eq-val{font-size:46px;font-weight:700;color:var(--accent);line-height:1}
.result-title{font-size:20px;font-weight:700;margin-bottom:8px}
.result-desc{font-size:13px;color:var(--text2);line-height:1.75;max-width:380px;margin:0 auto}
.save-notice{display:none!important;align-items:center;gap:8px;font-size:11px;padding:9px 12px;
  background:var(--info-bg);border:0.5px solid var(--info-border);
  border-radius:var(--radius);color:var(--info);margin-top:12px}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.stat-box{background:var(--bg2);border-radius:var(--radius);padding:12px;text-align:center}
.stat-n{font-size:20px;font-weight:700;color:var(--accent)}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px}
.bkdn-ttl{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;
  letter-spacing:.3px;text-transform:uppercase}
.cat-result{padding:11px 0;border-bottom:0.5px solid var(--border)}
.cat-result:last-child{border-bottom:none}
.cat-result-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.cat-name{font-size:13px;font-weight:500;flex:1}
.cat-pts{font-size:12px;color:var(--accent);font-weight:600;white-space:nowrap}
.cat-bar-wrap{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.cat-bar-fill{height:100%;background:var(--accent);border-radius:3px}
.cat-comment{font-size:12px;color:var(--text3);margin-top:5px;line-height:1.6}
.retry-wrap{display:grid;gap:8px}
.note-sm{font-size:11px;color:var(--text3);text-align:center;line-height:1.7}
</style>
</head>
<body>
<div id="app">
  <div id="s-intro" class="screen"></div>
  <div id="s-test"  class="screen" style="display:none"></div>
  <div id="s-result" class="screen" style="display:none"></div>
</div>
<script>
// ═══════════════════════════════════════════════════════════
//  問題バンク（100問）
//
//  設計方針：
//  ・4択すべてが「普通の人が選びそうな行動」として書く
//  ・EQの落とし穴を仕込む
//    例）「いつもポジティブでいる」→感情抑圧で低スコア
//       「相手のために我慢する」→自己管理ではなく回避
//       「すぐ謝る」→反射的謝罪は自己認識の欠如
//       「共感してあげる」→主語が「あげる」は上から目線
//  ・点数差は微妙にする（5-4-3-2 でなく 5-4-4-3 も多用）
//  ・正解が「地味で当たり前」に見えるものを多く含める
// ═══════════════════════════════════════════════════════════
const BANK=[{"cat": "CQ Drive", "text": "全く異なる業界から転職してきた同僚が\n配属された初日。今のあなたの内側は？", "opts": ["「早く戦力になってほしい」と期待している", "「この人はどんな仕事の見方をしているんだろう」と興味が湧いている", "「業界が違うと最初は大変だろうな」と思っている", "「うちのやり方を早く覚えてもらわないと」と思っている"], "scores": [3, 5, 4, 3], "exp": "「どんな仕事の見方をしているか」という相手の視点への純粋な関心がCQ Driveの本質です。「早く戦力に」は業務への期待、「大変だろうな」は共感ですが、いずれも相手の内側への関心より薄い。"}, {"cat": "CQ Drive", "text": "自分よりずっと年上のクライアントとの\n長期的な関係が始まった。今の正直な気持ちは？", "opts": ["「価値観の違いを橋渡しするのが面白そう」と感じる", "「敬意を持てばなんとかなる」と思う", "「世代が違うとすれ違いが多そう」と少し身構える", "「こちらがうまく合わせていくしかない」と思う"], "scores": [5, 3, 3, 3], "exp": "「橋渡しが面白そう」という積極的な関心がCQ Driveの深さです。「合わせるしかない」は義務感、「敬意を持てば」は表面的な対処、「身構える」は消極的で、どれも相手への知的関心より薄い。"}, {"cat": "CQ Drive", "text": "他部署との合同プロジェクトが始まる。\n今のあなたが最初に気になるのは？", "opts": ["「この部署はどんな優先順位で仕事をしているか」", "「摩擦が起きないかどうか」", "「意思決定のスピードが合うかどうか」", "「自分たちのやり方でリードできるか」"], "scores": [5, 3, 3, 2], "exp": "「どんな優先順位で仕事をしているか」という部署文化への関心がCQ Driveの探求心です。「摩擦」「スピード」は問題回避の視点で、「リードできるか」は自己中心的です。"}, {"cat": "CQ Drive", "text": "取引先の担当者が交代し、前任とは全く違うタイプになった。\n今のあなたの最初の行動は？", "opts": ["前任と同じアプローチで様子を見る", "「この人はどんなコミュニケーションが合うか」を意識的に観察し始める", "「また関係を作り直すのか」と少し面倒に感じる", "まず前任から引き継ぎ情報を集める"], "scores": [2, 5, 3, 4], "exp": "「観察し始める」という能動的な探索がCQ Driveの実践です。前任からの情報収集も有効ですが、実際に会って観察することの方が深い理解につながります。"}, {"cat": "CQ Drive", "text": "自分とは根本的に仕事の考え方が違うと感じる人と\n定期的に協働することになった。今のあなたは？", "opts": ["「なぜそう考えるのか」を理解しようとする", "「違うのは仕方ない」と割り切る", "「自分の考えをうまく伝えて理解してもらう」ことを優先する", "「仕事の結果さえ出ればいい」と思う"], "scores": [5, 3, 3, 3], "exp": "「なぜそう考えるのか」という問いがCQ Driveの核心です。「割り切る」「伝えて理解してもらう」「結果さえ」はどれも相手への知的好奇心より薄い姿勢です。"}, {"cat": "CQ Drive", "text": "仕事終わり、同僚から異業界の人との交流会に誘われた。\n予定は空いている。今のあなたは？", "opts": ["「違う業界の人と話すのは刺激になる」と思って参加する", "「仕事の人脈になれば」と考えて参加する", "「疲れているので今日はパスかな」と感じる", "「知らない人ばかりでエネルギーを使いそう」と思う"], "scores": [5, 4, 3, 3], "exp": "「刺激になる」という内発的な動機がCQ Driveの純粋な表れです。「人脈になれば」は実利的動機で有効ですが、異なる人への純粋な関心より一段浅い。"}, {"cat": "CQ Drive", "text": "若手社員から「その進め方、古くないですか」と言われた。\n今のあなたの内側は？", "opts": ["「どういう視点からそう見えているのか聞いてみよう」と思う", "「経験が少ないから仕方ない」と感じる", "「一理あるかもしれない」と考える", "「実績のあるやり方なのに」という気持ちになる"], "scores": [5, 2, 4, 3], "exp": "「どういう視点から」という問いへの関心がCQ Driveです。「一理あるかも」は柔軟性ですが受動的。「経験が少ないから」は若手の視点を封じる解釈です。"}, {"cat": "CQ Drive", "text": "全く縁のない業界のビジネスモデルについて\n学ぶ機会が生まれた。今のあなたの動機は？", "opts": ["「自分の仕事に活かせるかもしれない」という実利的な関心", "「知らない世界を覗く感覚が面白い」という純粋な興味", "「今は優先度が高くないが機会があれば」", "「必要になったらその時学べばいい」"], "scores": [4, 5, 3, 2], "exp": "「知らない世界を覗く面白さ」という内発的な好奇心が最も深いCQ Driveです。「活かせるかも」も良いですが、目的達成の手段という位置づけです。"}, {"cat": "CQ Drive", "text": "クライアントの会社文化（意思決定の遅さ）が\n自分の感覚と大きく違うと感じた。今のあなたは？", "opts": ["「なぜそういう文化になっているのか」の背景に興味を持つ", "「非効率だな」と感じながら合わせる", "「そういう会社なんだ」と受け入れる", "「進め方を改善してもらえるよう働きかけよう」と思う"], "scores": [5, 3, 3, 2], "exp": "「なぜそうなっているか」という背景への関心がCQ Driveの探求心です。「合わせる」「受け入れる」は適応ですが理解を伴いません。「改善を求める」は相手の文化への理解より前に出た行動です。"}, {"cat": "CQ Drive", "text": "休憩室で普段ほとんど話したことのない\n別部署の人が隣に座った。今のあなたは？", "opts": ["「せっかくなので話しかけてみよう」と自然に動く", "スマホを見て過ごす", "向こうから話しかけてきたら応じる", "会釈だけして自分の時間にする"], "scores": [5, 2, 3, 3], "exp": "「せっかくなので」という自然な動機での行動がCQ Driveの日常的な実践です。「向こうから来たら」「会釈だけ」は受動的で、積極的な異文化への関心より薄い。"}, {"cat": "CQ Drive", "text": "取引先の担当者の「仕事観」を\n今のあなたはどれくらい知りたいと思っている？", "opts": ["仕事がスムーズに進む範囲で知っていれば十分", "「この人が何を大切にして仕事をしているか」を純粋に知りたい", "必要に応じて徐々にわかればいい", "あまり踏み込まない方がプロフェッショナルだと思う"], "scores": [3, 5, 3, 2], "exp": "「何を大切にして仕事をしているか」という純粋な関心がCQ Driveの深さです。「スムーズな範囲で」は実利的、「踏み込まない方が」は距離を置く姿勢で、どちらも関心の深さとしては限定的。"}, {"cat": "CQ Drive", "text": "職場で「苦手だ」と感じるタイプの人がいる。\n今のあなたはどう向き合っている？", "opts": ["「なぜ自分はこのタイプが苦手なのか」を少し自問している", "「苦手なのは仕方ない」と割り切っている", "「関わりを最小限にすれば問題ない」と思っている", "「相手が変われば解決する」と思っている"], "scores": [5, 3, 2, 2], "exp": "「なぜ苦手なのか」を自己観察することがCQ Driveの自己認識的な側面です。「割り切る」「最小限に」は問題を棚上げにし、「相手が変われば」は他者への依存です。"}, {"cat": "CQ Drive", "text": "ビジネスランチで相手が自分の全く知らない\n業界の話を始めた。今のあなたは？", "opts": ["「詳しく教えてもらおう」と前のめりになる", "「自分の話ができるタイミングを探す", "「知らない話が続いて少し退屈」と感じる", "「業界が違うとこういうものだ」と思う"], "scores": [5, 3, 2, 3], "exp": "「教えてもらおう」という積極的な関心がCQ Driveの場への応用力です。「タイミングを探す」は自己表現優先、「退屈」「こういうもの」は相手の世界への関心が薄い反応です。"}, {"cat": "CQ Drive", "text": "自分のコミュニケーションスタイルが\n相手に合っていないかもと感じた場面があった。\n今のあなたはどうしている？", "opts": ["「この人には何が合うのか」を探り続けている", "「自分のスタイルを変えるのは難しい」と感じている", "「相手も慣れてくれるだろう」と思っている", "「問題があれば相手が言ってくれるはず」と思っている"], "scores": [5, 3, 3, 3], "exp": "「何が合うのか探り続ける」という継続的な探索がCQ Driveの実践です。「変えるのは難しい」「慣れてくれる」「言ってくれるはず」はいずれも相手への適応の動機が薄い。"}, {"cat": "CQ Drive", "text": "職場の後輩が自分と全く違う価値観で仕事をしている。\n今のあなたの内側は？", "opts": ["「仕事の結果が出ていれば価値観は自由」と思う", "「どこからきている価値観なのか聞いてみたい」と感じる", "「今の世代はそういうものだ」と一般化する", "「そのうち現実に気づくだろう」と思う"], "scores": [3, 5, 2, 2], "exp": "「どこからきているのか聞いてみたい」という問いがCQ Driveの世代を超えた探求心です。「結果が出れば」「そういうもの」「現実に気づく」はいずれも相手の視点への深い関心が薄い。"}, {"cat": "CQ Drive", "text": "取引先との会食で相手が自社の慣習を話してくれた。\n今のあなたの関心は？", "opts": ["「なぜその慣習が生まれたのか」の背景が気になる", "「うちとは違うな」と思いながら聞く", "「業務に関係ある部分だけ」に集中する", "「それぞれの会社文化だね」と流す"], "scores": [5, 3, 3, 2], "exp": "「なぜその慣習が生まれたか」という背景への関心がCQ Driveの組織文化への探求心です。「違うな」「関係ある部分だけ」「流す」はどれも相手の組織文化への深い関心より薄い。"}, {"cat": "CQ Drive", "text": "今のあなたにとって、「異なるタイプの人と関わること」は？", "opts": ["「できれば気の合う人とだけ仕事したい」と思う", "「避けられないので上手くやるしかない」と思う", "「毎回何か新しい発見がある」と感じることが多い", "「慣れれば問題ない」と思う"], "scores": [1, 3, 5, 3], "exp": "「毎回新しい発見がある」という継続的な学びの感覚がCQ Driveの最も深い表れです。「上手くやるしかない」「慣れれば」は義務感・適応であり、「気の合う人だけ」は最も関心が薄い。"}, {"cat": "CQ Drive", "text": "相手の仕事の判断が「自分には理解しにくい」と感じた。\n今のあなたの最初の反応は？", "opts": ["「なぜそういう判断をするのか、背景を理解しよう」と思う", "「合わない人だ」という印象になる", "「そういうタイプなんだ」と性格で説明する", "「自分のやり方の方が合理的」と思う"], "scores": [5, 2, 2, 2], "exp": "「背景を理解しよう」という問いがCQ Driveの核心です。「合わない」「そういうタイプ」「自分の方が合理的」はどれも相手の判断の背景への関心を閉じる解釈です。"}, {"cat": "CQ Drive", "text": "自分の部署の「当たり前」が他部署には通じないとわかった。\n今のあなたの内側は？", "opts": ["「どう伝えれば理解してもらえるか」を考え始める", "「なんでわかってくれないんだろう」と感じる", "「部署が違うから仕方ない」と受け入れる", "「自分たちのやり方の方が正しい」と思う"], "scores": [5, 2, 3, 2], "exp": "「どう伝えれば」という橋渡しへの積極的な意志がCQ Driveです。「なんでわかってくれない」は相手への不満、「仕方ない」は諦め、「正しい」は自文化優越です。"}, {"cat": "CQ Drive", "text": "商談相手が自社と全く違う意思決定の流れを持っている。\n今のあなたは？", "opts": ["「この会社ではどう動けば物事が進むか」を理解しようとする", "「郷に入っては郷に従う」と割り切る", "「うちとは違って大変だ」と感じる", "「効率的なやり方に変えてもらえないか」と思う"], "scores": [5, 3, 3, 2], "exp": "「どう動けば進むか」という理解への積極的な姿勢がCQ Driveです。「割り切る」は適応ですが理解を伴いません。「変えてもらえないか」は相手の文化より自分の都合を優先した姿勢です。"}, {"cat": "CQ Drive", "text": "「うまく関係が築けている」と感じる人がいる。\n今のあなたはその理由をどう思っている？", "opts": ["「相性が良かっただけ」と思っている", "「自分が相手に合わせられたから」と思っている", "「なぜうまくいっているかの要因を少し分析している", "「あの人が良い人だから」と相手に帰している"], "scores": [2, 4, 5, 3], "exp": "「なぜうまくいっているか」を分析することが次の関係にも応用できるCQ Driveの学習志向です。「相性」「あの人が良い」は偶然への帰属で学びが薄い。"}, {"cat": "CQ Drive", "text": "自分の「組織の常識」が別の会社では通じなかった。\n今のあなたはどう受け止めている？", "opts": ["「自分の常識は自分の組織・経験から作られたものに過ぎない」と再認識する", "「向こうの組織が特殊なんだ」と整理する", "「どちらが正しいわけでもない」と受け流す", "「自分のやり方を正確に伝えられなかった」と振り返る"], "scores": [5, 2, 3, 4], "exp": "「自分の常識は組織・経験から作られたもの」という認識がCQ Driveの自己批判的な深さです。「向こうが特殊」は自組織中心の解釈です。"}, {"cat": "CQ Drive", "text": "「苦手だと思っていた人」が別の場面で\n全く違う一面を見せた。今のあなたは？", "opts": ["「意外だったな」と思って終わる", "「この人についてまだ知らないことがたくさんある」と感じる", "「場面によって人は変わるものだ」と一般化する", "「じゃあ今まで誤解していたのかも」と少し恥ずかしくなる"], "scores": [2, 5, 3, 4], "exp": "「まだ知らないことがたくさんある」という開かれた認識がCQ Driveの継続的な探求の動機です。「意外」で終わるのは学びが浅く、「誤解していた」は振り返りとして良いですが探求につながりにくい。"}, {"cat": "CQ Drive", "text": "商談相手の社長が会食で「ゴルフはやる?」と聞いてきた。\n今のあなたの内側は？", "opts": ["「この人にとってゴルフはどんな意味を持つ場なんだろう」と考える", "「付き合いで始めた方がいいか」と実利を考える", "「純粋にゴルフが好きなんだろう」と受け取る", "「ゴルフが苦手なのでどう断るか」を考える"], "scores": [5, 4, 3, 3], "exp": "「この人にとってゴルフがどんな意味を持つ場か」という文化的な読みがCQ Driveの組織・業界文化への関心の深さです。"}, {"cat": "CQ Drive", "text": "今のあなたは、仕事で関わる人の\n「背景や育ってきた環境」をどれくらい知りたいと思っている？", "opts": ["「プライベートに踏み込まない方がいい」と思う", "「仕事に関係する範囲で知っていれば十分」と思う", "「その人がなぜそう考え行動するかの根っこを知りたい」と思う", "「必要に応じて自然にわかればいい」と思う"], "scores": [2, 3, 5, 3], "exp": "「根っこを知りたい」という深い関心がCQ Driveの本質的な動機の高さです。「プライベートに踏み込まない」は距離を置く姿勢で、CQ Driveとしては最も薄い。"}, {"cat": "CQ Knowledge", "text": "製造業出身のクライアントが、\nIT系の「アジャイルな進め方」に毎回慎重な反応をする。\n最も妥当な解釈は？", "opts": ["「製造業は品質と工程の確実性を最優先する文化がある", "「変化への適応力が低い", "「デジタル化に遅れている", "「プロジェクト管理能力の差"], "scores": [5, 2, 2, 3], "exp": "製造業の「確実性・品質重視」の文化を理解することがCQ Knowledgeです。「適応力が低い」「デジタルに遅れている」は文化を能力の問題にすり替えています。"}, {"cat": "CQ Knowledge", "text": "会議でベテランが発言すると若手が従う雰囲気がある。\n最も深い理解は？", "opts": ["「年功序列の規範と、経験への敬意が組織文化として定着している", "「若手がまだ自信を持てていない", "「ベテランが正しいことが多いから自然な流れ", "「若手が発言するトレーニング不足"], "scores": [5, 3, 3, 2], "exp": "「年功序列の規範と経験への敬意が文化として定着している」という組織文化的な理解がCQ Knowledgeです。個人の自信・能力の問題として見るのは文化を個人に帰属させる誤りです。"}, {"cat": "CQ Knowledge", "text": "昭和世代の上司が「報連相は細かくするもの」と考え、\n若手は「必要な時だけ」と思っている。この違いは？", "opts": ["「報告の頻度と意味についての世代的・組織的な価値観の差", "「上司が細かすぎる", "「若手が自分勝手", "「どちらも間違っていない好みの差"], "scores": [5, 2, 2, 3], "exp": "「報告の意味と頻度に関する世代的・組織的な価値観の差」として捉えることがCQ Knowledgeです。「好みの差」は価値観の違いを薄めすぎる解釈です。"}, {"cat": "CQ Knowledge", "text": "官公庁の担当者と仕事をしていると、\n決定までに何度も決裁を経なければならない。これは？", "opts": ["「公平性・説明責任・組織的合意を重視する行政文化の表れ", "「非効率な組織の象徴", "「担当者が自分で決断できない", "「民間より仕事が遅い体質"], "scores": [5, 2, 2, 2], "exp": "官公庁の決裁プロセスは「公平性と説明責任」という組織文化的な価値観に基づきます。「非効率」「遅い体質」は民間の文化を基準にした評価で文化理解としては不正確です。"}, {"cat": "CQ Knowledge", "text": "大企業のクライアントが\n「稟議が通るまで正式にはコメントできない」と言っている。\n最も妥当な理解は？", "opts": ["「大企業では組織全体のリスク管理と合意形成が意思決定の前提になっている", "「担当者に権限がない", "「意思決定が遅い会社", "「こちらへの優先度が低い"], "scores": [5, 3, 3, 2], "exp": "「組織全体のリスク管理と合意形成が意思決定の前提」という大企業文化の理解がCQ Knowledgeです。「優先度が低い」は文化を態度の問題と混同しています。"}, {"cat": "CQ Knowledge", "text": "営業部門と技術部門が同じ案件で\n「良い仕事」の評価が食い違っている。なぜ？", "opts": ["「部門ごとにKPIと職能文化が異なり、「良い仕事」の定義自体が違う", "「技術者は顧客視点が弱い", "「営業は数字しか見ていない", "「社内の連携が足りていない"], "scores": [5, 2, 2, 3], "exp": "「部門ごとにKPIと職能文化が異なる」という組織文化の差の理解がCQ Knowledgeです。「技術者は」「営業は」という一方への評価は相互の文化への理解を欠きます。"}, {"cat": "CQ Knowledge", "text": "取引先の担当者が会食でほとんど仕事の話をしない。\n最も妥当な解釈は？", "opts": ["「関係ができてからビジネスに入るスタイルの業界・人かもしれない", "「仕事への関心が薄い", "「場を盛り上げたいだけ", "「重要な話は別の場でするつもり"], "scores": [5, 2, 3, 4], "exp": "「関係構築優先型」の業界・個人文化の可能性を読めることがCQ Knowledgeです。「別の場でするつもり」も一定の読みですが、「関係構築が先」という文化的背景への理解の方が深い。"}, {"cat": "CQ Knowledge", "text": "メールで「検討します」しか返ってこないクライアントがいる。\n最も深い理解は？", "opts": ["「明確なノーを言わないことが礼儀とされるコミュニケーション文化かもしれない", "「優柔不断な担当者", "「社内調整が終わっていないだけ", "「こちらへの興味が薄れている"], "scores": [5, 3, 4, 3], "exp": "「明確なNoを言わない文化的な礼儀」の可能性を読めることがCQ Knowledgeです。「社内調整」も現実的な読みですが、コミュニケーション文化の視点が加わると理解が深まります。"}, {"cat": "CQ Knowledge", "text": "上司が会議中ほとんど発言しないのに、\n会議後に個別に意見を言ってくる。これはなぜ？", "opts": ["「公の場での意見表明を避け根回しを好む組織文化がある", "「会議中に考えが整理できていない", "「会議が嫌い", "「後から意見を変えるタイプ"], "scores": [5, 3, 2, 2], "exp": "「公の場での対立回避＋根回し文化」という組織的な規範の理解がCQ Knowledgeです。個人の性格・能力への帰属は文化的な視点を欠きます。"}, {"cat": "CQ Knowledge", "text": "若手社員に仕事を任せると\n「どこまでやればいいか」を細かく確認してくる。\nこれをどう理解する？", "opts": ["「明示的な指示と境界を期待する世代的・教育的背景があるかもしれない", "「自分で考える力が足りない", "「依存的なタイプ", "「指示が曖昧だった"], "scores": [5, 2, 2, 4], "exp": "「明示的な指示を期待する世代・教育的背景」という文化的な視点がCQ Knowledgeです。「指示が曖昧だった」も一定の自己振り返りですが、文化的背景への理解としては浅い。"}, {"cat": "CQ Knowledge", "text": "「飲みニュケーション重視」の上司と\n「仕事とプライベートは分けたい」部下が噛み合わない。\n最も深い理解は？", "opts": ["「職場の関係構築の方法に関する世代的・個人的な価値観の差", "「若者のコミュニケーション力の低下", "「上司が時代遅れ", "「どちらかが我慢すれば解決する"], "scores": [5, 1, 2, 3], "exp": "「関係構築の方法に関する価値観の差」として捉えることがCQ Knowledgeです。「コミュニケーション力の低下」「時代遅れ」は一方の文化を正解として見る評価的な解釈です。"}, {"cat": "CQ Knowledge", "text": "ベンチャーから来た転職者が\n「なんでこんなに会議が多いんですか」と発言した。\nこれは？", "opts": ["「組織規模と意思決定の文化差から来る素朴な疑問", "「適応力の低い転職者", "「大企業の無駄が露呈した", "「ベンチャーのやり方が正しいという思い込み"], "scores": [5, 2, 2, 3], "exp": "「組織規模と意思決定文化の差」という文化的な背景の理解がCQ Knowledgeです。「適応力が低い」「思い込み」は評価的で文化理解の視点を欠きます。"}, {"cat": "CQ Knowledge", "text": "クライアントの担当者が\n「社内に反対意見があって…」となかなか動かない。\n最も深い理解は？", "opts": ["「その組織はコンセンサス型で関係者全員の合意を要する文化", "「担当者が自分で決められない", "「こちらの提案が響いていない", "「社内政治で動けなくなっている"], "scores": [5, 3, 3, 4], "exp": "「コンセンサス型の意思決定文化」の理解がCQ Knowledgeです。「社内政治」も現実的な読みですが、文化的な背景としての「コンセンサス重視」の理解の方が根本的です。"}, {"cat": "CQ Knowledge", "text": "同じ「頑張ります」という言葉が、\n確約に聞こえる場合とそうでない場合がある。なぜ？", "opts": ["「言葉の意味は関係性・文脈・業界によって変わる", "「言う人の誠実さの差", "「その人の性格の問題", "「言い方が曖昧なだけ"], "scores": [5, 3, 2, 2], "exp": "「言葉の意味が関係性・文脈・業界によって変わる」というコミュニケーションの文脈依存性がCQ Knowledgeの言語的な側面です。"}, {"cat": "CQ Knowledge", "text": "「結論から話す」が当たり前の自社文化と\n「経緯から話す」クライアントが噛み合わない。なぜ？", "opts": ["「コミュニケーションスタイルは業界・会社・個人によって異なり優劣はない", "「相手が話し方を学んでいない", "「自分の会社のやり方が標準的", "「慣れれば気にならなくなる"], "scores": [5, 2, 2, 3], "exp": "「スタイルに優劣はない」という中立的な文化理解がCQ Knowledgeです。「自分の会社が標準的」は自文化を基準にした誤った評価です。"}, {"cat": "CQ Knowledge", "text": "「空気を読む」ことへの期待度が\n部署によってかなり違う。なぜ？", "opts": ["「部署ごとのコミュニケーション文化と、暗黙知と明示化のバランスが違う", "「読める人と読めない人がいるだけ", "「部署ごとにスキルレベルが違う", "「上司の個性の問題"], "scores": [5, 2, 2, 3], "exp": "「暗黙知と明示化のバランスが部署文化によって異なる」という高コンテキスト・低コンテキストの組織的な差がCQ Knowledgeです。"}, {"cat": "CQ Knowledge", "text": "「報告は問題が起きた時だけでいい」上司と\n「こまめな報告が信頼の証」上司がいる。\n最も深い理解は？", "opts": ["「信頼の作り方と情報共有の意味に関する価値観が管理スタイルによって異なる", "「どちらかが間違っている", "「上司の個性の違い", "「会社の方針が不統一"], "scores": [5, 2, 3, 3], "exp": "「信頼の作り方に関する価値観が管理スタイルによって異なる」という文化的理解がCQ Knowledgeです。「個性の違い」は文化を個人に矮小化する見方です。"}, {"cat": "CQ Knowledge", "text": "会食でどこまで個人的な話をするかの感覚が\n相手と違うと感じた。なぜ？", "opts": ["「ビジネスと個人の関係の境界は業界・会社・個人文化によって異なる", "「相手がプライベートを話したくない", "「自分が踏み込みすぎた", "「業界の慣習の違い"], "scores": [5, 3, 3, 4], "exp": "「ビジネスと個人の境界が業界・会社・個人文化によって異なる」という文化的な差の理解がCQ Knowledgeです。「業界の慣習」も正しい方向ですが、個人レベルの差も含む広い理解の方が深い。"}, {"cat": "CQ Knowledge", "text": "「結果さえ出れば過程は問わない」文化と\n「プロセスを大切にする」文化が協働している。\n最も妥当な理解は？", "opts": ["「「良い仕事」の定義自体が会社文化によって異なる", "「どちらかの文化が劣っている", "「折衷案を探せばいい", "「最初に合意しておけばよかった"], "scores": [5, 1, 3, 4], "exp": "「良い仕事の定義が会社文化によって異なる」という根本的な文化差の理解がCQ Knowledgeです。「最初に合意」は実践として有効ですが、なぜ摩擦が起きるかの文化的理解の方が根本的。"}, {"cat": "CQ Knowledge", "text": "「チームワーク」という言葉の意味が\n体育会系の職場とフラットな職場で違う気がする。なぜ？", "opts": ["「「チームワーク」の意味は組織の価値観・規範・歴史によって形成される", "「体育会系は根性主義で一色", "「フラットな組織は規律がない", "「業界の違いによる語感の差"], "scores": [5, 1, 2, 3], "exp": "「チームワークの意味は組織の価値観・規範・歴史によって形成される」という言語の文化的構成の理解がCQ Knowledgeです。"}, {"cat": "CQ Knowledge", "text": "同じ「お客様第一」という言葉でも\nサービス業とメーカーでは実際の行動が違う。なぜ？", "opts": ["「業界ごとに顧客との関係性と価値提供の定義が異なる", "「サービス業の方が意識が高い", "「メーカーは物を作ることに集中しすぎ", "「言葉だけで実態が伴っていない会社が多い"], "scores": [5, 2, 2, 2], "exp": "「業界によって顧客との関係性と価値提供の定義が異なる」という業界文化の差の理解がCQ Knowledgeです。"}, {"cat": "CQ Knowledge", "text": "自分の業界では「当たり前の用語」を使ったら\n相手に全く通じなかった。これは？", "opts": ["「業界ごとに専門的な言語文化があり、共有されていなかった", "「相手の知識不足", "「説明が足りなかった", "「業界間のコミュニケーションの難しさ"], "scores": [5, 2, 3, 4], "exp": "「業界ごとに言語文化がある」という理解がCQ Knowledgeの言語的な側面です。「説明が足りなかった」も自己振り返りとして良いですが、文化としての言語差の認識の方が根本的。"}, {"cat": "CQ Knowledge", "text": "「フィードバックは直接的に」という文化の人と\n「遠回しに伝えるべき」という文化の人が協働している。なぜ摩擦が起きる？", "opts": ["「批判の伝え方に関する規範が人・組織・業界によって異なる", "「直接的な人が正しい", "「遠回しな人が気を遣いすぎている", "「どちらが正しいかは場合による"], "scores": [5, 2, 2, 3], "exp": "「批判の伝え方の規範が文化によって異なる」という理解がCQ Knowledgeです。「場合による」は状況への適応ですが、文化的な差の根本的な理解としては薄い。"}, {"cat": "CQ Strategy", "text": "異なる部署との大事な打ち合わせの前に、\n今のあなたが最も時間をかける準備は？", "opts": ["「その部署はどんな優先事項・言葉・懸念を持つか」を事前に考える", "資料の内容を完璧に仕上げる", "スムーズな進行の段取りを考える", "想定される反論への答えを準備する"], "scores": [5, 3, 4, 4], "exp": "「相手の部署の優先事項・言葉・懸念を事前に考える」という文化的な準備がCQ Strategyの核心です。資料・進行・反論対策も大切ですが、相手の文化的文脈への準備がそれらを活かします。"}, {"cat": "CQ Strategy", "text": "打ち合わせ後に「なんか伝わらなかった」と感じた。\n今のあなたが最初に考えることは？", "opts": ["「自分の説明が下手だった", "「相手の理解力の問題", "「自分が当然と思っていた前提を相手は共有していなかったかもしれない", "「資料の作り方を変えよう"], "scores": [3, 2, 5, 3], "exp": "「自分が当然と思っていた前提を相手が共有していなかった」という自己の前提への気づきがCQ Strategyの核心です。「説明が下手」「理解力の問題」はより表面的な原因帰属です。"}, {"cat": "CQ Strategy", "text": "世代の違う人と話す前に、\n今のあなたが意識的に確認することは？", "opts": ["「この人が大切にしていることと自分の思い込みは何か", "相手が興味を持ちそうな話題を考える", "敬意のある言葉遣いを確認する", "自分の考えをわかりやすく整理する"], "scores": [5, 4, 3, 3], "exp": "「相手が大切にすること」と「自分の思い込み」の両方を確認することがCQ Strategyの自己観察力です。「話題を考える」「言葉遣い」は大切ですが文化的な自己観察より表面的です。"}, {"cat": "CQ Strategy", "text": "異業界クライアントとの会議中、\n相手の反応が予想と全然違った。\n今のあなたの最初の思考は？", "opts": ["「伝え方が悪かった", "「相手の関心が薄い", "「業界や立場の違いからくる解釈の差があるかもしれない", "「自分の準備が足りなかった"], "scores": [3, 2, 5, 3], "exp": "「業界・立場の違いからくる解釈の差」という文化的な読みがCQ Strategyの柔軟な解釈力です。「伝え方」「準備不足」は自己に、「関心が薄い」は相手に帰属する表面的な分析です。"}, {"cat": "CQ Strategy", "text": "「自分には当たり前」なことが相手に伝わらなかった後、\n今のあなたはどう振り返る？", "opts": ["「説明を増やせばよかった", "「相手の業界では常識が違う", "「自分が当然と思っていた前提は自分の組織・経験から作られた思い込みかもしれない", "「次回はもっとわかりやすく伝えよう"], "scores": [3, 4, 5, 3], "exp": "「自分の当然が思い込みかもしれない」という自己批判的な認識がCQ Strategyの最も深い振り返りです。「相手の業界では違う」も良い方向ですが、「自分の側」への気づきの方が成熟した分析です。"}, {"cat": "CQ Strategy", "text": "異なる部署・会社の人と長期的に仕事を進める前に、\n最初に確認・共有しておくと最も価値があることは？", "opts": ["目標と役割分担", "スケジュールと予算", "それぞれの強みと弱み", "「お互いの仕事のスタイル・コミュニケーションの期待値・意思決定の仕方"], "scores": [3, 2, 4, 5], "exp": "「スタイル・期待値・意思決定の仕方」という文化的な前提の共有が最も後の摩擦を防ぎます。目標・予算・強弱は重要ですが文化的前提なしには機能しにくい。"}, {"cat": "CQ Strategy", "text": "相手が言っていることと表情・態度が微妙にズレている気がした。\n今のあなたはどうする？", "opts": ["言葉通りに受け取って進める", "「本音を話してくれていない」と判断する", "「この人は言葉より態度で表す人かも」と複数の可能性を考えながら観察する", "直接「本当はどう思っているか」と聞く"], "scores": [2, 2, 5, 4], "exp": "「複数の可能性を考えながら観察する」という開かれた解釈がCQ Strategyです。「本音を話していない」と決めつけるのは単一解釈で、観察なしに直接聞くのは時期尚早なことがあります。"}, {"cat": "CQ Strategy", "text": "「なんか違和感がある」と感じながら打ち合わせが終わった。\n今のあなたはその違和感をどう扱う？", "opts": ["「気のせいだろう」と流す", "「相手に問題がある」と整理する", "「自分と相手の前提のどこかがズレていたかもしれない」と考える", "「次回はうまくやろう」と思うだけ"], "scores": [2, 2, 5, 3], "exp": "「前提のどこかがズレていたかもしれない」という文化的な視点での振り返りがCQ Strategyの感受性です。「次回はうまく」は行動への意志ですが分析が薄い。"}, {"cat": "CQ Strategy", "text": "今のあなたは、「自分が相手に自組織スタイルを\n押しつけていないか」をどうやって確認している？", "opts": ["相手が何も言わなければ問題ないと思っている", "自分のスタイルは標準的だと思っている", "「相手の反応から違和感のサインがないか」を意識的に観察する", "指摘されたら改める"], "scores": [2, 1, 5, 3], "exp": "「相手の反応から違和感を観察する」という継続的な自己監視がCQ Strategyの核心です。「言わなければ問題ない」は受動的、「自分は標準的」は自組織バイアスの典型例です。"}, {"cat": "CQ Strategy", "text": "打ち合わせで合意したはずなのに\n後で「やっぱり違う」となることが続いている。\n今のあなたはどこに原因を見ている？", "opts": ["「相手が気を変えやすい", "「自分の確認不足", "「書面で確認すればよかった", "「「合意」の意味と期待値がお互いの文化・スタイルで違ったかもしれない"], "scores": [2, 3, 3, 5], "exp": "「合意の意味と期待値が文化・スタイルで違った」という文化的な原因分析がCQ Strategyの最も深い洞察です。「書面で確認」「相手が変わりやすい」は対処ですが根本原因への理解としては浅い。"}, {"cat": "CQ Strategy", "text": "初めて会う業界違いのクライアントの前に、\n今のあなたが自分に問いかけることは？", "opts": ["「どう良い印象を与えるか", "「どう話を進めるか", "「どんな資料を持っていくか", "「この業界・会社文化では何が大切にされているか、自分の先入観は何か"], "scores": [3, 3, 3, 5], "exp": "「相手の文化的文脈と自分の先入観」の両方を問うことがCQ Strategyの準備力です。「印象」「進め方」「資料」は大切ですが文化的な準備がないとそれらが機能しないことがあります。"}, {"cat": "CQ Strategy", "text": "コミュニケーションがうまくいっているかを\n会話・会議の最中にどうやって確認している？", "opts": ["「わかりましたか?」と直接聞く", "質問が出るかどうかで判断する", "終わった後に振り返る", "相手の表情・相槌・間の取り方などの非言語から感じ取る"], "scores": [3, 4, 2, 5], "exp": "「非言語からリアルタイムに感じ取る」ことがCQ Strategyの実践的な観察力です。「質問が出るかどうか」も参考になりますが、質問しないことが理解を意味しない文化もあります。"}, {"cat": "CQ Strategy", "text": "「自分の仕事の進め方」が相手の組織では当然ではなかった。\n今のあなたはどう対応する？", "opts": ["自分のやり方を押し通す", "相手のやり方に完全に合わせる", "「なぜ違うのか」を理解した上で、合わせるか折衷するかを判断する", "どちらでも良いと曖昧にする"], "scores": [2, 3, 5, 2], "exp": "「なぜ違うのかを理解した上で判断する」という主体的な対応がCQ Strategyです。「完全に合わせる」は自己消失、「どちらでも良い」は判断の放棄です。"}, {"cat": "CQ Strategy", "text": "異なる組織のメンバーが集まるチームを動かす時、\n最初の場で最も価値ある時間の使い方は？", "opts": ["目標と役割を共有する", "共通のルールを設ける", "「お互いの仕事文化・スタイル・期待の違いを安全に話せる場をつくる", "チームビルディングのゲームをする"], "scores": [4, 3, 5, 3], "exp": "「文化的差異を安全にオープンにできる場を設計する」ことがCQ Strategyの集団的実践です。「目標と役割」も大切ですが文化的前提なしには実行段階で摩擦が生まれます。"}, {"cat": "CQ Strategy", "text": "相手が「こちらに合わせてくれている」と感じた。\n今のあなたはどう受け取る？", "opts": ["「いい関係が作れている」と安心する", "「相手が気遣いのできる人だ」と思う", "「自分のスタイルが相手にとってやりやすいとは限らない」と考える", "特に深く考えない"], "scores": [3, 3, 5, 2], "exp": "「自分のスタイルが相手にとってやりやすいとは限らない」という問い直しがCQ Strategyの自己観察の深さです。「いい関係」と安心するのは相手への負担を見えなくさせるリスクがあります。"}, {"cat": "CQ Strategy", "text": "今のあなたは「自分の組織の常識が普遍的ではない」ことを\nどれくらい意識している？", "opts": ["指摘されたら考える", "あまり意識したことがない", "「自分の常識は自分の組織・経験から作られた」と定期的に確認している", "自分の常識は標準的だと思っている"], "scores": [3, 2, 5, 1], "exp": "「定期的に確認している」という習慣がCQ Strategyの継続的な自己観察力です。「指摘されたら」は受動的、「標準的だと思う」は自組織バイアスの典型例です。"}, {"cat": "CQ Strategy", "text": "会食の場で相手の笑いのツボが全然違うと感じた。\n今のあなたはどう対応する？", "opts": ["「合わない人だ」と判断する", "無理に合わせて笑う", "「この人の世代・業界・バックグラウンドではこれが面白いんだ」と読もうとする", "話題を変えてズレを回避する"], "scores": [2, 2, 5, 3], "exp": "「相手のバックグラウンドではこれが面白い」と文化的に読もうとすることがCQ Strategyの感受性です。「回避」は一つの手ですが理解を深める機会を失います。"}, {"cat": "CQ Strategy", "text": "異なる組織の人とうまくいった経験を、\n今のあなたはどう扱っている？", "opts": ["「うまくいった」で終わらせる", "「あの人が良かっただけ」と相手に帰す", "また同じようにやれば良いと思う", "「なぜうまくいったか」を文化的・スタイル的な観点で分析して次に活かせるか考える"], "scores": [2, 2, 3, 5], "exp": "「なぜうまくいったかを分析して次に活かす」という成功からの学習がCQ Strategyの実践的な力です。「あの人が良かっただけ」は学びを相手に帰属させる解釈です。"}, {"cat": "CQ Strategy", "text": "今のあなたは「自分には自組織バイアス（自社のやり方を基準にする傾向）がある」と\n意識している？", "opts": ["「誰でも自分の組織・経験からのバイアスがある」と認め自分のそれを意識している", "少しはあるかもしれない", "あまりないと思う", "考えたことがない"], "scores": [5, 4, 2, 2], "exp": "「誰でもある」と認め継続的に意識することがCQ Strategyの前提的な自己認識です。「少しはあるかも」は認識として良いですが、継続的に意識する習慣の方が深い。"}, {"cat": "CQ Strategy", "text": "休憩室での雑談中に「この人と話すと何か疲れる」と感じた。\n今のあなたはその感覚をどう扱う？", "opts": ["「気が合わない人だ」で終わらせる", "「今日は自分が調子悪かった」と自分に帰す", "「どんな場面で・何が疲れを作っているのか」を少し考えてみる", "避けるようにする"], "scores": [2, 3, 5, 2], "exp": "「何が疲れを作っているか」を考えることがコミュニケーション的・文化的な違いの分析の出発点になるCQ Strategyの感受性です。"}, {"cat": "CQ Strategy", "text": "「なぜかこの人とはうまくいく」という相手がいる。\n今のあなたはその理由をどう思っている？", "opts": ["「相性が良いんだろう」で終わる", "「あの人が良い人だから」と相手に帰す", "「何がうまくいっている要因か」を言語化して他にも応用できるか考える", "特に分析しない"], "scores": [2, 3, 5, 2], "exp": "「うまくいく要因を言語化して他に応用する」ことがCQ Strategyの成功からの学習力です。「相性」「あの人が良い」は偶然・相手への帰属で再現性がありません。"}, {"cat": "CQ Action", "text": "「結論から話す」タイプのクライアントとの会議で、\n普段「経緯から説明する」自分の話し方をどうする？", "opts": ["いつも通り経緯から話す", "「うちのスタイルはこうです」と伝える", "どちらでもわかってもらえると思う", "相手のスタイルに合わせて結論から伝えるよう意識的に変える"], "scores": [2, 2, 3, 5], "exp": "「相手のスタイルに合わせて変える」という意識的な行動調整がCQ Actionです。「うちのスタイルはこう」は自文化の押しつけ、「どちらでも」は相手への配慮が薄い。"}, {"cat": "CQ Action", "text": "相手が「電話や対面でのやりとりを好む」タイプとわかった。\n今のあなたは何をする？", "opts": ["「効率のためにメールでお願いしたい」と伝える", "自分のペースでメールを続ける", "どちらでも対応できると伝える", "相手のコミュニケーション方法に合わせて電話・対面を積極的に活用する"], "scores": [2, 2, 3, 5], "exp": "「相手が好む方法に合わせて積極的に活用する」ことがCQ Actionの行動的な適応力です。「どちらでも対応できる」は受動的で、相手への積極的な配慮より薄い。"}, {"cat": "CQ Action", "text": "年上のクライアントとの会食で、\n自分が詳しい話題になった。今のあなたの立ち居振る舞いは？", "opts": ["自分の知識をしっかり伝えることを優先する", "「相手が話しやすい立場になれるよう質問役に回ることを意識する", "相手が興味を持てば話す", "特に意識したことがない"], "scores": [3, 5, 3, 2], "exp": "「相手が話しやすい立場を作る」という関係性への配慮がCQ Actionの成熟した実践です。「自分の知識を伝える」は専門性の発揮ですが、関係構築の文脈では相手の立場を優先する方が深い。"}, {"cat": "CQ Action", "text": "職場の沈黙を気にしないタイプの人との会話中、\n今のあなたはどう対応している？", "opts": ["すぐ話題を変えて沈黙を埋める", "「何か気にさわりましたか?」と聞く", "沈黙が続くと不安を感じながらも我慢する", "「この人は沈黙が思考の時間」と理解して焦らず待つ"], "scores": [2, 2, 3, 5], "exp": "「沈黙を思考の時間として理解して待つ」という文化的な解釈に基づく行動がCQ Actionです。「我慢する」は理解を伴わない適応で、長続きしにくい。"}, {"cat": "CQ Action", "text": "「褒めるより課題を指摘してほしい」部下と\n「まず認めてほしい」部下に、今のあなたは？", "opts": ["公平のため同じフィードバックスタイルを全員に使う", "相手のタイプに合わせてフィードバックの伝え方を変えている", "どちらのタイプかを把握できていない", "相手が求めた時だけスタイルを変える"], "scores": [2, 5, 2, 3], "exp": "「個人のスタイルに合わせてフィードバックを変える」ことがCQ Actionの個別対応力です。「公平のため同じ」は一律主義で、文化・スタイルの差を無視した平等さです。"}, {"cat": "CQ Action", "text": "「はっきり断らない」クライアントへのフォローアップを\n今のあなたはどうしている？", "opts": ["「決めてほしい」と直接伝える", "返事があるまで待つ", "「検討中ということでよろしいですか?」と確認する", "「どんな懸念がありますか?」と聞いて本音を間接的に引き出す"], "scores": [2, 2, 4, 5], "exp": "「懸念を間接的に引き出す」という相手のコミュニケーションスタイルに合わせたアプローチがCQ Actionです。「検討中で確認」も良いですが、懸念を聞く方が相手が話しやすい場を作ります。"}, {"cat": "CQ Action", "text": "会議中、発言が少ない参加者がいる。\nファシリテーターとして今のあなたがすることは？", "opts": ["「○○さんはどう思いますか?」と指名する", "発言しない人は関心がないと判断して進める", "会議後に個別に聞く", "「みなさんいかがですか?」と場を開いて様子を見る"], "scores": [3, 2, 4, 5], "exp": "「場を開く」方法で発言のハードルを下げることがCQ Actionのインクルーシブな実践です。「指名」は圧力になる場合があり、「後で個別に」も有効ですが機会を逃してしまいます。"}, {"cat": "CQ Action", "text": "取引先との食事で、相手が話す「業界の内輪話」についていけない。\n今のあなたは？", "opts": ["知っているふりをしてついていく", "話題を自分の知っていることに変える", "黙って聞いている", "「それはどういう意味ですか?」と素直に聞いて理解を深める"], "scores": [2, 3, 3, 5], "exp": "「素直に聞いて理解を深める」ことが相手の世界への関心を示すCQ Actionの誠実な実践です。「知っているふり」は関係の不誠実な基盤、「話題を変える」は理解の機会を失います。"}, {"cat": "CQ Action", "text": "「仕事の話は会議室で」スタイルの人と\n「雑談の中でアイデアが生まれる」自分が協働している。\n今のあなたの対応は？", "opts": ["自分のスタイルで進めれば相手も慣れると思う", "「うちではこういうやり方が多い」と伝える", "どちらでも変わらないと思う", "相手のスタイルを尊重して重要な話は正式な場でするようにする"], "scores": [2, 2, 3, 5], "exp": "「相手のスタイルを尊重して正式な場を選ぶ」ことがCQ Actionの組織文化への適応力です。「慣れると思う」「うちのやり方」は自文化の押しつけになりやすい。"}, {"cat": "CQ Action", "text": "役員が同席する場で、今のあなたの言葉遣いや態度は？", "opts": ["自分らしくいることを優先する", "仕事の時と変わらず接する", "どうすればいいか迷って硬くなる", "場の規範に合わせて意識的に言葉遣いと態度を調整する"], "scores": [3, 2, 3, 5], "exp": "「場の規範に合わせて意識的に調整する」ことがCQ Actionの場への適応力です。「自分らしく」「変わらず」は一貫性として良い部分もありますが、場の文化への適応がなければ摩擦を生みます。"}, {"cat": "CQ Action", "text": "メールで伝えたい内容を、相手が箇条書きを好むとわかっている。\n今のあなたはどうする？", "opts": ["自分の書きやすい形式で書く", "相手に「どんな形式が好みですか?」と聞く", "どちらでも内容が伝わればいいと思う", "相手が読みやすい形式（箇条書き）に意識的に変える"], "scores": [2, 3, 3, 5], "exp": "「相手が読みやすい形式に変える」ことがCQ Actionの伝達的な適応力です。「どちらでも伝わればいい」は相手の受け取りやすさへの配慮が薄い。"}, {"cat": "CQ Action", "text": "プレゼン中に聴衆の集中力が落ちてきたと感じた。\n今のあなたはどう動く？", "opts": ["準備した通り進める", "「何か質問はありますか?」と聞く", "休憩を入れる", "場の変化を読んで、伝え方・ペース・問いかけを即座に調整する"], "scores": [2, 3, 3, 5], "exp": "「場の変化を読んでリアルタイムに調整する」ことがCQ Actionの場への適応力です。「準備通り」は場の状態を無視、「質問は?」「休憩」は一つの手ですが即応性の点では限定的。"}, {"cat": "CQ Action", "text": "今のあなたは、異業界の人と話す時に\n「当たり前の言葉」をどう扱っている？", "opts": ["業界用語は普通に使う", "相手がわからなければ質問してくれると思う", "「この言葉は自分の業界特有かも」と意識して言い換えか説明を加える", "毎回確認するのは面倒"], "scores": [2, 2, 5, 2], "exp": "「業界特有かも」と意識して言い換えるか説明を加える実践がCQ Actionのコミュニケーション的な調整力です。「質問してくれるはず」は相手に負担を押しつける姿勢です。"}, {"cat": "CQ Action", "text": "取引先との会食で、相手が「仕事の話はここでは」\nという雰囲気を出している。今のあなたは？", "opts": ["「せっかくの機会なので」と仕事の話を進める", "「食事の場でも情報共有できれば」と提案する", "相手がどう思っているかは関係なく進める", "相手のスタイルに合わせて仕事の話をせず関係構築に集中する"], "scores": [2, 2, 2, 5], "exp": "「相手の場のスタイルに合わせる」ことがCQ Actionの関係構築的な実践です。「せっかくの機会」「情報共有を提案」は自分の都合を優先した姿勢です。"}, {"cat": "CQ Action", "text": "「承認の言葉をしっかり伝えてほしい」タイプの人に、\n今のあなたはどう接している？", "opts": ["「成果を出すのが一番の承認だ」というスタイルで接する", "「褒めすぎると甘えが出る」と思って控える", "どう伝えていいかよくわからず曖昧にする", "その人が必要とする具体的な承認の言葉を意識的に使う"], "scores": [2, 2, 3, 5], "exp": "「その人が必要とする承認の表現を使う」ことがCQ Actionの個別対応力です。「成果が一番」「褒めすぎると」は自分のスタイルを押しつけた接し方です。"}, {"cat": "CQ Action", "text": "普段より「柔らかい雰囲気」が求められる懇親会で、\n今のあなたの行動調整は？", "opts": ["仕事の時と変わらず接する", "「自然体でいることが一番」と思う", "どうしていいかよくわからず硬くなる", "「この場に合うモード」に意識的に切り替える"], "scores": [2, 3, 3, 5], "exp": "「場に合うモードに意識的に切り替える」ことがCQ Actionの場の文化への適応力です。「自然体が一番」は自分のスタイルを優先していて、場の文化への配慮が薄くなることがあります。"}, {"cat": "CQ Action", "text": "相手が「回りくどい言い方をする」タイプとわかった。\n今のあなたはどう聴いている？", "opts": ["「もっと直接的に言ってほしい」と感じながら聴く", "早めに結論を引き出そうとする", "相手の言い方に合わせて自分も回りくどくする", "「この回りくどさには意味があるかもしれない」と耳を傾ける"], "scores": [2, 2, 3, 5], "exp": "「回りくどさに意味があるかもしれない」と耳を傾けることがCQ Actionの聴き方の調整力です。「結論を引き出す」は相手のスタイルを変えさせようとする行為です。"}, {"cat": "CQ Action", "text": "異業界クライアントに自社の強みを説明する時、\n今のあなたの伝え方は？", "opts": ["いつもの説明をそのまま伝える", "「うちはこういう会社です」という定型を伝える", "相手が理解できるかどうかは相手次第", "「相手の業界の課題や言葉に置き換えて」自社の強みを説明する"], "scores": [2, 2, 2, 5], "exp": "「相手の業界の課題・言葉に置き換える」ことがCQ Actionの対話的な表現力です。定型の説明・相手次第はいずれも相手の文脈への適応が薄い。"}, {"cat": "CQ Action", "text": "「意見をはっきり言わない」タイプの同僚と協働している。\n今のあなたはどう働きかけている？", "opts": ["「もっとはっきり言ってほしい」と直接伝える", "発言しない人は関心がないと判断する", "自分が全部決めて進める", "「どんなことが気になりますか?」と意見を出しやすい問いかけを選んでいる"], "scores": [2, 2, 2, 5], "exp": "「意見を出しやすい問いかけの形式を選ぶ」ことがCQ Actionの包摂的な言語調整力です。「はっきり言ってほしい」は相手のスタイルを変えることを求めており、 function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ★ 選択肢と点数をセットでシャッフル
function shuffleOpts(q){
  const pairs=shuffle(q.opts.map((o,i)=>({o,s:q.scores[i]})));
  return {...q,opts:pairs.map(p=>p.o),scores:pairs.map(p=>p.s)};
}

function pickQuestions(){
  const cats=[...new Set(BANK.map(q=>q.cat))];
  let sel=[];
  cats.forEach(c=>{const pool=shuffle(BANK.filter(q=>q.cat===c));sel.push(...pool.slice(0,CAT_PER));});
  return shuffle(sel).map(q=>shuffleOpts(q));
}

function fmtDate(iso){const d=new Date(iso);return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function loadResults(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch{return[];}}
function saveResult(r){const all=loadResults();all.push(r);localStorage.setItem(STORAGE_KEY,JSON.stringify(all));}
async function sendToServer(record){
  try{await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(record)});return true;}
  catch(e){return false;}
}

function showIntro(){
  const all=loadResults();
  const urlName=new URLSearchParams(window.location.search).get('name')||'';
  const storedName=localStorage.getItem('test_player_name')||'';
  const recentName=urlName||storedName||(all.length?all[all.length-1].name:'');
  const histHTML=all.length===0?`<p class="hist-empty">まだ記録がありません</p>`
    :all.slice().reverse().slice(0,5).map(r=>`
      <div class="hist-item">
        <span class="hist-eq">${r.eq}</span>
        <div class="hist-meta"><div class="hist-name">${r.name}</div><div class="hist-date">${fmtDate(r.date)}</div></div>
        <div class="hist-score">${r.score}/${PER_SESSION*5}点<br><span style="color:var(--text3);font-size:11px">${r.level}</span></div>
      </div>`).join('');

  document.getElementById('s-intro').innerHTML=`
    <div class="card">
      <div class="intro-header">
        <div class="intro-logo">🏢</div>
        <div>
          <div class="intro-title">CQ テスト</div>
          <div class="intro-sub">文化的知性テスト 国内版（Cultural Intelligence）</div>
        </div>
      </div>
      <div class="meta-grid">
        <div class="meta-box"><div class="meta-n">${PER_SESSION}</div><div class="meta-l">出題数</div></div>
        <div class="meta-box"><div class="meta-n">100</div><div class="meta-l">満点</div></div>
        <div class="meta-box"><div class="meta-n">4択</div><div class="meta-l">回答形式</div></div>
      </div>
      <div class="cats-row"><span class="cat-pill">CQ Drive</span><span class="cat-pill">CQ Knowledge</span><span class="cat-pill">CQ Strategy</span><span class="cat-pill">CQ Action</span></div>
      <div class="notice-box">
        ✔ 選択肢の順番は毎回ランダムです<br>
        ✔ 点数は最後まで表示されません<br>
        ✔ <strong>「正しそう」ではなく「実際の自分」を選んでください</strong><br>
        ✔ どれも正解に見える問題が多いです
      </div>
      <div class="name-section">
        <div class="name-row-input">
          <span class="name-label">名前</span>
          <input class="name-input" id="name-input" type="text" maxlength="30" placeholder="山田 太郎"
            value="${recentName.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}"
            oninput="document.getElementById('name-err').style.display='none'"
            onkeydown="if(event.key==='Enter')startTest()">
        </div>
        <p id="name-err" class="name-error">名前を入力してください</p>
      </div>
      <button class="btn-primary" onclick="startTest()">テストを開始する →</button>
    </div>
    <div class="card-sm">
      <div class="hist-hdr">
        <span class="hist-ttl">過去の記録${all.length?`（${all.length}件）`:''}</span>
        ${all.length?`<button class="btn-sm" onclick="exportCSV()">CSV出力</button>`:''}
      </div>
      ${histHTML}
    </div>
    <p class="note-sm">このテストは簡易的な目安です。正式な評価は専門家にご相談ください。<br>Created by S.O.Y</p>`;
  show('s-intro');
}

function startTest(){
  const input=document.getElementById('name-input');
  const name=(input?input.value:'').trim();
  if(!name){const err=document.getElementById('name-err');if(err)err.style.display='block';input&&input.focus();return;}
  currentName=name;questions=pickQuestions();cur=0;totalScore=0;elapsed=0;catScores={};
  questions.forEach(q=>{if(!catScores[q.cat])catScores[q.cat]=0;});
  startTime=Date.now();show('s-test');
  timerID=setInterval(()=>{elapsed=Math.floor((Date.now()-startTime)/1000);const t=document.getElementById('timer-el');if(t)t.textContent=fmt(elapsed);},500);
  renderQ();
}

function renderQ(){
  const q=questions[cur];
  const pct=Math.round((cur/PER_SESSION)*100);
  const lbls=['A','B','C','D'];
  document.getElementById('s-test').innerHTML=`
    <div class="test-hdr">
      <div class="hdr-row">
        <span class="q-label">問題 ${cur+1} <span style="color:var(--text3)">/ ${PER_SESSION}</span></span>
        <span class="timer" id="timer-el">${fmt(elapsed)}</span>
      </div>
      <div class="sub-row">
        <span class="name-badge">${currentName}</span>
        <span style="font-size:11px;color:var(--text3)">${q.cat}</span>
      </div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-card">
      <span class="cat-badge">${q.cat}</span>
      <p class="q-text">${q.text}</p>
    </div>
    <div class="opts" id="opts-area">
      ${q.opts.map((o,i)=>`
        <button class="opt" onclick="answer(${i})">
          <span class="opt-lbl">${lbls[i]}</span>
          <span style="flex:1">${o}</span>
        </button>`).join('')}
    </div>
    <div id="expl-area"></div>`;
}

function answer(idx){
  const q=questions[cur];
  const pts=q.scores[idx];
  totalScore+=pts;catScores[q.cat]=(catScores[q.cat]||0)+pts;
  document.querySelectorAll('.opt').forEach((b,i)=>{b.classList.add('disabled');if(i===idx)b.classList.add('selected');});
  // ★ 点数は非表示・解説のみ
  document.getElementById('expl-area').innerHTML=`
    <div class="expl">${q.exp}</div>
    <div class="next-wrap">
      <button class="btn-ghost" onclick="nextQ()">${cur+1<PER_SESSION?'次の問題へ →':'結果を見る →'}</button>
    </div>`;
}

function nextQ(){
  cur++;
  if(cur>=PER_SESSION){clearInterval(timerID);elapsed=Math.floor((Date.now()-startTime)/1000);showResult();}
  else renderQ();
}

function showResult(){
  const eq=totalScore;
  const lvl=LEVELS.find(l=>eq>=l.min)||LEVELS[LEVELS.length-1];
  const catMax=CAT_PER*5;
  const catResults=Object.entries(catScores).map(([cat,sc])=>({
    cat,sc,pct:Math.round((sc/catMax)*100),
    comment:sc/catMax>=0.8?CAT_COMMENTS[cat].hi:sc/catMax>=0.6?CAT_COMMENTS[cat].mid:CAT_COMMENTS[cat].lo
  }));
  const catBreakdown={};catResults.forEach(r=>{catBreakdown[r.cat]={score:r.sc,max:catMax,pct:r.pct};});
  const record={testType:'CQ_DOM',name:currentName,eq,score:totalScore,maxScore:PER_SESSION*5,acc:Math.round((totalScore/(PER_SESSION*5))*100),secs:elapsed,level:lvl.label,date:new Date().toISOString(),catBreakdown};
  saveResult(record);
  sendToServer(record).then(ok=>{
    const el=document.getElementById('save-status');
    if(el)el.innerHTML=ok
      ?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Googleスプレッドシートに送信しました'
      :'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ローカルに保存（送信失敗）';
  });
  document.getElementById('s-result').innerHTML=`
    <div class="card">
      <div class="result-hero">
        <p class="result-name">${currentName} さんの結果</p>
        <div class="eq-ring"><span class="eq-lbl-sm">CQ</span><span class="eq-val">${eq}</span></div>
        <h2 class="result-title">${lvl.label}</h2>
        <p class="result-desc">${lvl.desc}</p>
        <div id="save-status" class="save-notice" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          送信中...
        </div>
      </div>
      <div class="stats">
        <div class="stat-box"><div class="stat-n">${eq}</div><div class="stat-l">CQスコア（/100）</div></div>
        <div class="stat-box"><div class="stat-n">${Math.round((totalScore/(PER_SESSION*5))*100)}%</div><div class="stat-l">達成率</div></div>
        <div class="stat-box"><div class="stat-n">${fmt(elapsed)}</div><div class="stat-l">所要時間</div></div>
      </div>
    </div>
    <div class="card">
      <p class="bkdn-ttl">カテゴリ別スコアと改善ポイント</p>
      ${catResults.map(r=>`
        <div class="cat-result">
          <div class="cat-result-row">
            <span class="cat-name">${r.cat}</span>
            <span class="cat-pts">${r.sc}/${catMax}点（${r.pct}%）</span>
          </div>
          <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${r.pct}%"></div></div>
          <p class="cat-comment">${r.comment}</p>
        </div>`).join('')}
    </div>
    <div class="retry-wrap">
      <button class="btn-primary" onclick="startTest()">もう一度挑戦する（新しい20問）→</button>
      <button class="btn-ghost" onclick="exportCSV()">結果をCSVでダウンロード</button>
      <button class="btn-ghost" onclick="showIntro()">トップへ戻る</button>
      <button class="btn-ghost" onclick="goToResults()">📊 結果をまとめて確認する →</button>
    </div>
    <p class="note-sm" style="margin-top:12px">※このテストは簡易的な目安です。正式な評価は専門家にご相談ください。<br>Created by S.O.Y</p>`;
  show('s-result');
}

function goToResults(){
  const name = currentName || localStorage.getItem('test_player_name') || '';
  window.location.href = 'results.html' + (name ? '?name=' + encodeURIComponent(name) : '');
}
function exportCSV(){
  const all=loadResults();if(!all.length){alert('まだ記録がありません。');return;}
  const header='名前,CQスコア,達成率(%),所要時間(秒),レベル,実施日時';
  const rows=all.map(r=>[`"${(r.name||'').replace(/"/g,'""')}"`,r.eq,r.acc,r.secs,`"${(r.level||'').replace(/"/g,'""')}"`,`"${fmtDate(r.date)}"`].join(','));
  const csv='\uFEFF'+header+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`CQテスト結果_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

showIntro();
</script>
</body>
</html>
